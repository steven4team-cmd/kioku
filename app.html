<script>
  if (window.pdfjsLib) {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  }
  /* ============================================================
     PRE-REACT AUTH GUARD (fail-safe)
     An account is required. Before React even mounts, check for a
     cached Supabase session in localStorage. If there's no sign-in
     token at all, redirect straight to the auth page — so a signed-out
     visitor can never see the app, even if React/the SDK is slow or
     blocked. (When a token IS present, React + Supabase verify it for
     real and will bounce expired sessions to auth too.)
     ============================================================ */
  (function () {
    try {
      var onAuthPage = /auth\.html$/i.test(location.pathname);
      if (onAuthPage) return;
      var hasToken = false;
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        // Supabase stores its session under e.g. "sb-<projectref>-auth-token"
        if (k && /^sb-.*-auth-token$/.test(k) && localStorage.getItem(k)) { hasToken = true; break; }
      }
      // OAuth redirects come back with #access_token=... in the hash — let those through
      var hasOAuthHash = /access_token=|code=/.test(location.hash) || /code=/.test(location.search);
      if (!hasToken && !hasOAuthHash) {
        location.replace("auth.html");
      }
    } catch (e) { /* if storage is unavailable, the React gate still applies */ }
  })();
</script>

<script type="text/babel" data-presets="react">
/* ============================================================
   CONFIG — point Kioku at your Cloudflare Worker.

   Paste your Worker URL below (e.g. https://kioku.<you>.workers.dev).
   Your Anthropic API key now lives ONLY inside the Worker — it is NOT
   in this file — so this file is safe to host publicly (GitHub Pages,

     • return  the Anthropic /v1/messages JSON (content[], stop_reason)
     • send CORS headers so the browser can call it cross-origin:
         Access-Control-Allow-Origin: *
         Access-Control-Allow-Methods: POST, OPTIONS
         Access-Control-Allow-Headers: Content-Type
       and reply to an OPTIONS preflight with HTTP 204.
   ============================================================ */
const WORKER_URL = "https://hidden-moon-64a4.steven4team.workers.dev";   // ← your Cloudflare Worker

/* ============================================================

   The app never holds Stripe secret keys. It only asks the Worker
   to create a Checkout Session, then redirects to Stripe's page.
   - STRIPE_CHECKOUT_PATH: route on your Worker that creates the session
   - To enable: deploy the Worker routes (see guide at bottom of file),
     then this turns on automatically once WORKER_URL is real.
   ============================================================ */
const STRIPE_CHECKOUT_PATH = "/checkout";   // Worker route that returns { url }
const STRIPE_PORTAL_PATH = "/portal";       // Worker route for managing/cancelling a sub
const PRO_PRICE_LABEL = "$4.99/mo";         // display only
const WORKER_CONFIGURED = !!WORKER_URL && !/YOUR-WORKER/.test(WORKER_URL);

/* ============================================================
   SUPABASE — accounts + cloud sync
   These two values are safe to expose (the anon key is designed
   for client code; Row Level Security protects each user's rows).
   ============================================================ */
const SUPABASE_URL = "https://dqyyqblvkfemfqqylarl.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxeXlxYmx2a2ZlbWZxcXlsYXJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NDIxNzksImV4cCI6MjA5NTQxODE3OX0.qyOHEXXPxSU8DONUN0CKtIZiN0U71QG9gUjeGudvIQM";
// Is this build wired to a real Supabase project? (config present, not a placeholder)
const SUPABASE_CONFIGURED = !!(SUPABASE_URL && SUPABASE_ANON_KEY && !/YOUR-/.test(SUPABASE_URL));
// An account is REQUIRED whenever we're configured for it. This does NOT depend on
// the SDK having loaded — if the SDK is missing/blocked we must fail safe (send the
// visitor to the auth page), never silently open the app to anonymous use.
const AUTH_REQUIRED = SUPABASE_CONFIGURED;
const SUPABASE_ENABLED = !!(window.supabase && window.supabase.createClient && SUPABASE_CONFIGURED);
const sb = SUPABASE_ENABLED ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;


const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ============================================================
   STORAGE — IndexedDB-backed key/value store.
   Drop-in for the old localStorage shim: same async interface
   (get -> {value} | null, set, plus remove/keys), but backed by
   IndexedDB so capacity is gigabytes instead of ~5MB. This is what
   lets decks with embedded images grow without hitting a wall.
   On first run it migrates any existing kioku_* localStorage keys
   in, then clears them, so current users keep their data seamlessly.
   If IndexedDB is unavailable (rare/private modes), it transparently
   falls back to localStorage.
   ============================================================ */
const STORAGE_KEYS = ["decks", "log", "settings", "stats"];
window.storage = (function () {
  const DB_NAME = "kioku", STORE = "kv", DB_VERSION = 1;
  let dbPromise = null;
  let useFallback = false;

  function openDB() {
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      let req;
      try { req = indexedDB.open(DB_NAME, DB_VERSION); }
      catch (e) { return reject(e); }
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
      req.onblocked = () => reject(new Error("IndexedDB blocked"));
    });
    return dbPromise;
  }

  async function idbGet(key) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readonly");
      const r = tx.objectStore(STORE).get(key);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }
  async function idbSet(key, value) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).put(value, key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error || new Error("write aborted"));
    });
  }
  async function idbDel(key) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  const lsGet = (k) => { const v = localStorage.getItem("kioku_" + k); return v == null ? null : { value: v }; };
  const lsSet = (k, v) => { localStorage.setItem("kioku_" + k, v); return { ok: true }; };

  // One-time migration of any existing localStorage data into IndexedDB.
  let migrated = false;
  async function migrateOnce() {
    if (migrated || useFallback) return;
    migrated = true;
    try {
      for (const k of STORAGE_KEYS) {
        const existing = await idbGet(k);
        if (existing != null) continue;                 // already in IDB
        const ls = localStorage.getItem("kioku_" + k);
        if (ls != null) { await idbSet(k, ls); localStorage.removeItem("kioku_" + k); }
      }
    } catch (e) { /* non-fatal: fall through */ }
  }

  return {
    async get(key) {
      try {
        await migrateOnce();
        const v = await idbGet(key);
        return v == null ? null : { value: v };
      } catch (e) {
        useFallback = true;
        return lsGet(key);
      }
    },
    async set(key, value) {
      try {
        await migrateOnce();
        await idbSet(key, value);
        return { ok: true };
      } catch (e) {
        useFallback = true;
        return lsSet(key, value);              // last-ditch; may still throw on quota
      }
    },
    async remove(key) {
      try { await idbDel(key); } catch (e) { try { localStorage.removeItem("kioku_" + key); } catch {} }
      return { ok: true };
    },
  };
})();

/* ============================================================
   ACCOUNT-AWARE STORAGE
   `localStore` (above) is the on-device IndexedDB store.
   `window.storage` wraps it: when a user is signed in, the four
   app keys (decks/log/settings/stats) read/write a single cloud
   row in Supabase so data follows the account across devices;
   when signed out it uses the device store as before. Everything
   else (userId, usage, etc.) always stays on-device.
   The rest of the app calls window.storage.get/set unchanged.
   ============================================================ */
const localStore = window.storage;
const CLOUD_KEYS = new Set(["decks", "log", "settings", "stats", "examHistory"]);
const accountStore = (function () {
  let user = null;          // current Supabase user (or null)
  let cache = null;         // in-memory copy of the cloud row's data object
  let loaded = false;
  let saveTimer = null;
  let autoSync = true;      // when false, changes stay local until "Sync now"
  let pending = false;      // unsynced changes exist
  const listeners = new Set(); // notified on pending/sync state change

  function notify() { listeners.forEach((fn) => { try { fn({ pending, autoSync, syncing }); } catch (e) {} }); }
  let syncing = false;

  async function loadCloud() {
    if (!user || !sb) { cache = null; loaded = false; return; }
    try {
      const { data, error } = await sb.from("user_data").select("data").eq("user_id", user.id).maybeSingle();
      if (error) throw error;
      cache = (data && data.data) ? data.data : {};
      loaded = true;
    } catch (e) { cache = cache || {}; loaded = true; }
  }
  async function flush() {
    if (!user || !sb || !cache) return;
    syncing = true; notify();
    try {
      await sb.from("user_data").upsert({ user_id: user.id, data: cache, updated_at: new Date().toISOString() });
      pending = false;
    } catch (e) { /* keep pending=true so a later sync retries */ }
    syncing = false; notify();
  }
  function scheduleFlush() { clearTimeout(saveTimer); saveTimer = setTimeout(flush, 400); }
  async function flushNow() { clearTimeout(saveTimer); saveTimer = null; await flush(); }

  return {
    // called by the auth layer when sign-in state changes
    async setUser(u) {
      // flush any pending writes for the OUTGOING user before we swap accounts
      if (user && sb) { try { await flushNow(); } catch (e) {} }
      user = u;
      cache = null; loaded = false; pending = false;
      clearTimeout(saveTimer); saveTimer = null;
      if (user) await loadCloud();
      notify();
    },
    isCloud() { return !!user && !!sb; },
    currentUser() { return user; },
    setAutoSync(on) {
      autoSync = !!on;
      if (autoSync && pending) scheduleFlush(); // turning it back on pushes queued changes
      notify();
    },
    getAutoSync() { return autoSync; },
    getSyncState() { return { pending, autoSync, syncing }; },
    onSyncChange(fn) { listeners.add(fn); return () => listeners.delete(fn); },
    async syncNow() {
      if (!this.isCloud()) return { ok: false, reason: "local" };
      await flushNow();
      return { ok: true };
    },
    // One-time migration: push the device's existing local data into a fresh
    // cloud account, BUT only the very first time anyone signs in on this device.
    async seedFromLocal() {
      if (!user || !sb) return false;
      try {
        const seeded = await localStore.get("cloudSeeded");
        if (seeded && seeded.value) return false; // already migrated once on this device
      } catch (e) {}
      await loadCloud();
      const has = cache && Object.keys(cache).length > 0 && (cache.decks || cache.log);
      if (has) {
        try { await localStore.set("cloudSeeded", "1"); } catch (e) {}
        return false; // cloud already has data — don't clobber it
      }
      const next = {};
      for (const k of CLOUD_KEYS) {
        const v = await localStore.get(k);
        if (v && v.value != null) next[k] = v.value;
      }
      try { await localStore.set("cloudSeeded", "1"); } catch (e) {}
      if (Object.keys(next).length) { cache = next; await flush(); return true; }
      cache = cache || {};
      return false;
    },
    async get(key) {
      if (this.isCloud() && CLOUD_KEYS.has(key)) {
        if (!loaded) await loadCloud();
        const v = cache ? cache[key] : null;
        return v == null ? null : { value: v };
      }
      return localStore.get(key);
    },
    async set(key, value) {
      if (this.isCloud() && CLOUD_KEYS.has(key)) {
        if (!loaded) await loadCloud();
        cache = cache || {};
        cache[key] = value;
        // always keep a local backup so nothing is lost if sync is off / fails
        try { localStore.set(key, value); } catch (e) {}
        if (autoSync) scheduleFlush();
        else { pending = true; notify(); }
        return { ok: true };
      }
      return localStore.set(key, value);
    },
    async remove(key) {
      if (this.isCloud() && CLOUD_KEYS.has(key)) {
        if (cache) { delete cache[key]; if (autoSync) scheduleFlush(); else { pending = true; notify(); } }
        return { ok: true };
      }
      return localStore.remove(key);
    },
    flushNow,
  };
})();
window.storage = accountStore;


/* =====================================================================
   Kioku — AI-powered spaced repetition (enhanced)
   ===================================================================== */

// ============================================================
//  Spaced repetition — Anki learning steps + FSRS-5 review
// ============================================================
const MIN = 60 * 1000, DAY = 24 * 60 * MIN;
const LEARN_STEPS_SEC = [60, 300, 600];
const RELEARN_STEPS_SEC = [600];
const EASY_INTERVAL = 4;          // days — new card graduated with Easy (Anki default)
const GRADUATING_INTERVAL = 2;    // days — new card graduated with Good (Anki uses 1; 2 is a gentle middle)
const DESIRED_RETENTION = 0.9;

const FSRS_W = [0.40255, 1.18385, 3.173, 15.69105, 7.1949, 0.5345, 1.4604, 0.0046,
                1.54575, 0.1192, 1.01925, 1.9395, 0.11, 0.29605, 2.2698, 0.2315,
                2.9898, 0.51655, 0.6621];
const FSRS_DECAY = -0.5;
const FSRS_FACTOR = Math.pow(0.9, 1 / FSRS_DECAY) - 1;

const clampD = (d) => Math.min(10, Math.max(1, d));
function fsrsR(t, s) { if (s <= 0) return 0; return Math.pow(1 + FSRS_FACTOR * t / s, FSRS_DECAY); }
function fsrsInterval(s) { return Math.max(1, Math.round(s / FSRS_FACTOR * (Math.pow(DESIRED_RETENTION, 1 / FSRS_DECAY) - 1))); }
const gOf = (q) => q + 1;
function fsrsInitS(g) { return Math.max(0.1, FSRS_W[g - 1]); }
function fsrsInitD(g) { return clampD(FSRS_W[4] - Math.exp(FSRS_W[5] * (g - 1)) + 1); }
function fsrsNextD(d, g) {
  const deltaD = -(FSRS_W[6] * (g - 3));
  const damped = d + (10 - d) * deltaD / 9;
  return clampD(FSRS_W[7] * fsrsInitD(4) + (1 - FSRS_W[7]) * damped);
}
function fsrsRecallS(d, s, r, g) {
  const hard = g === 2 ? FSRS_W[15] : 1;
  const easy = g === 4 ? FSRS_W[16] : 1;
  return s * (1 + Math.exp(FSRS_W[8]) * (11 - d) * Math.pow(s, -FSRS_W[9]) *
         (Math.exp((1 - r) * FSRS_W[10]) - 1) * hard * easy);
}
function fsrsForgetS(d, s, r) {
  const post = FSRS_W[11] * Math.pow(d, -FSRS_W[12]) * (Math.pow(s + 1, FSRS_W[13]) - 1) * Math.exp((1 - r) * FSRS_W[14]);
  return Math.max(0.1, Math.min(post, s));
}

function learningOutcomes(card, steps, isRelearn) {
  const step = Math.min(card.step || 0, steps.length - 1);
  const isLastStep = step + 1 >= steps.length;
  const phaseName = isRelearn ? "relearning" : "learning";
  const out = {};

  const carry = {};
  if (card.stability != null) carry.stability = card.stability;
  if (card.difficulty != null) carry.difficulty = card.difficulty;

  const againSec = steps[0];
  let hardSec;
  if (step === 0) hardSec = steps.length === 1 ? Math.round(steps[0] * 1.5) : Math.round((againSec + steps[1]) / 2);
  else hardSec = steps[step];

  out[0] = { ms: againSec * 1000, next: { phase: phaseName, step: 0, steps, ...carry } };
  out[1] = { ms: hardSec * 1000,  next: { phase: phaseName, step, steps, ...carry } };

  if (isLastStep) {
    if (isRelearn) {
      const s = card.stability || fsrsInitS(3), d = card.difficulty || fsrsInitD(3), ivl = fsrsInterval(s);
      out[2] = { ms: ivl * DAY, next: { phase: "review", stability: s, difficulty: d, interval: ivl } };
    } else {
      // Good graduates a NEW card like Anki's graduating interval (a day or two),
      // not the larger raw FSRS initial stability — keeps the first jump believable.
      const d = fsrsInitD(3);
      const s = Math.min(fsrsInitS(3), GRADUATING_INTERVAL);
      const ivl = Math.max(1, Math.min(GRADUATING_INTERVAL, fsrsInterval(fsrsInitS(3))));
      out[2] = { ms: ivl * DAY, next: { phase: "review", stability: s, difficulty: d, interval: ivl } };
    }
  } else {
    out[2] = { ms: steps[step + 1] * 1000, next: { phase: phaseName, step: step + 1, steps, ...carry } };
  }

  if (isRelearn) {
    const s = card.stability || fsrsInitS(3), d = card.difficulty || fsrsInitD(3);
    const ie = Math.max(EASY_INTERVAL, fsrsInterval(s));
    out[3] = { ms: ie * DAY, next: { phase: "review", stability: s, difficulty: d, interval: ie } };
  } else {
    // Easy graduates a NEW card to a fixed, believable interval (Anki default = 4d)
    // instead of FSRS's ~16d initial-Easy stability. Stability is set to match, so
    // the next interval grows naturally from 4 days rather than snapping back up.
    const de = fsrsInitD(4);
    const ie = EASY_INTERVAL;
    out[3] = { ms: ie * DAY, next: { phase: "review", stability: ie, difficulty: de, interval: ie } };
  }
  return out;
}

function project(card) {
  const phase = card.phase || "new";
  if (phase === "new" || phase === "learning")
    return learningOutcomes(card, card.steps || LEARN_STEPS_SEC, false);
  if (phase === "relearning")
    return learningOutcomes(card, card.steps || RELEARN_STEPS_SEC, true);

  const out = {};
  const s = card.stability || fsrsInitS(3);
  const d = card.difficulty || fsrsInitD(3);
  const elapsed = card.lastReview ? Math.max(0, (Date.now() - card.lastReview) / DAY) : (card.interval || s);
  const r = fsrsR(elapsed, s);

  const sAgain = fsrsForgetS(d, s, r);
  out[0] = { ms: RELEARN_STEPS_SEC[0] * 1000, next: { phase: "relearning", step: 0, steps: RELEARN_STEPS_SEC.slice(), stability: sAgain, difficulty: fsrsNextD(d, 1), interval: 0 } };

  [[1, 2], [2, 3], [3, 4]].forEach(([q, g]) => {
    const ns = fsrsRecallS(d, s, r, g);
    const nd = fsrsNextD(d, g);
    let ivl = fsrsInterval(ns);
    if (q === 1) ivl = Math.max(1, ivl);
    if (q === 3) ivl = Math.max(ivl, fsrsInterval(s) + 1);
    out[q] = { ms: ivl * DAY, next: { phase: "review", stability: ns, difficulty: nd, interval: ivl } };
  });
  return out;
}

function applyGrade(card, q) {
  const proj = project(card)[q];
  const wasReview = (card.phase || "new") === "review";
  const lapses = (card.lapses || 0) + (q === 0 && wasReview ? 1 : 0);
  const reps = (card.reps || 0) + 1;
  return { ...card, ...proj.next, due: Date.now() + proj.ms, lastReview: Date.now(), lastGrade: q, lapses, reps };
}

function fmtInterval(ms) {
  const mins = ms / MIN;
  if (mins < 1) return "<1m";
  if (mins < 60) return `${Math.round(mins)}m`;
  const days = ms / DAY;
  if (days < 1) return `${Math.round(mins / 60)}h`;
  if (days < 31) return `${Math.round(days)}d`;
  const months = days / 30;
  if (months < 12) return `${months.toFixed(months < 2 ? 1 : 0)}mo`;
  return `${(days / 365).toFixed(1)}y`;
}

function masteryOf(card) {
  if ((card.phase || "new") !== "review") return Math.min(0.25, (card.reps || 0) * 0.05);
  const s = card.stability || card.interval || 1;
  return Math.max(0.25, Math.min(1, 0.25 + 0.75 * (Math.log(s + 1) / Math.log(61))));
}

// Leech: a card that has lapsed many times — treat as a structural problem, not bad luck.
const LEECH_THRESHOLD = 8;
const isLeech = (card) => (card.lapses || 0) >= LEECH_THRESHOLD;

function examReadyState(card, daysUntilExam) {
  const phase = card.phase || "new";
  if (phase !== "review") return "notlearned";
  const s = card.stability || 0;
  if (s <= 0) return "notlearned";
  const lastReview = card.lastReview || Date.now();
  const daysFromLastToExam = Math.max(0, (Date.now() - lastReview) / DAY + daysUntilExam);
  const rExam = fsrsR(daysFromLastToExam, s);
  if (rExam >= 0.9) return "ready";
  if (rExam >= 0.7) return "borderline";
  return "atrisk";
}
function examSummary(cards, days) {
  const counts = { ready: 0, borderline: 0, atrisk: 0, notlearned: 0 };
  cards.forEach((c) => { counts[examReadyState(c, days)]++; });
  const total = cards.length || 1;
  const pct = Math.round((counts.ready / total) * 100);
  return { counts, pct, total: cards.length };
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const [y, m, d] = dateStr.split("-").map(Number);
  const exam = new Date(y, m - 1, d);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  return Math.round((exam - today) / DAY);
}

const uid = () => Math.random().toString(36).slice(2, 10);
const todayKey = (d = new Date()) => {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
};

const XP_PER_GRADE = { 0: 1, 1: 3, 2: 5, 3: 8 };
const LEVEL_XP = (lvl) => Math.round(50 * Math.pow(Math.max(1, lvl - 1), 1.5));
function xpToLevel(xp) {
  let lvl = 1, acc = 0;
  while (true) {
    const need = LEVEL_XP(lvl + 1);
    if (acc + need > xp) break;
    acc += need; lvl++;
    if (lvl > 200) break;
  }
  return { lvl, intoLevel: xp - acc, levelNeeds: LEVEL_XP(lvl + 1), totalAtLevelStart: acc };
}
const totalXpFromLog = (log) => log.reduce((s, e) => s + (XP_PER_GRADE[e.q] || 0), 0);

function computeStats(log, decks, flags) {
  const cards = []; Object.values(decks).forEach((d) => d.cards.forEach((c) => cards.push(c)));
  const days = new Set(log.map((e) => todayKey(new Date(e.t))));
  let streak = 0; let cur = new Date();
  if (!days.has(todayKey(cur))) cur.setDate(cur.getDate() - 1);
  while (days.has(todayKey(cur))) { streak++; cur.setDate(cur.getDate() - 1); }

  const dayCounts = {};
  log.forEach((e) => { const k = todayKey(new Date(e.t)); dayCounts[k] = (dayCounts[k] || 0) + 1; });
  const maxDayReviews = Math.max(0, ...Object.values(dayCounts));

  const recent = log.slice(-100);
  const retention100 = recent.length ? Math.round((recent.filter((e) => e.q >= 2).length / recent.length) * 100) : 0;

  // longest consecutive Good/Easy streak in the log
  let run = 0, best = 0;
  for (const e of log) { if (e.q >= 2) { run++; best = Math.max(best, run); } else run = 0; }

  // hit-the-daily-goal streak (settings.dailyGoal in flags)
  let goalStreak = 0;
  const goal = (flags && flags.dailyGoal) || 20;
  let walk = new Date();
  if (!days.has(todayKey(walk))) walk.setDate(walk.getDate() - 1);
  while (true) {
    const k = todayKey(walk);
    if ((dayCounts[k] || 0) >= goal) { goalStreak++; walk.setDate(walk.getDate() - 1); } else break;
  }

  const decksStudied = new Set(log.map((e) => e.deckId)).size;
  const studiedNight = log.some((e) => { const h = new Date(e.t).getHours(); return h >= 0 && h < 4; });
  const studiedEarly = log.some((e) => { const h = new Date(e.t).getHours(); return h < 7; });

  // weekend pair: did the user study on Sat AND Sun in the same calendar weekend?
  let weekendDouble = false;
  const dayDates = Array.from(days).map((k) => new Date(k));
  for (const d of dayDates) {
    if (d.getDay() === 6) { // Saturday
      const sun = new Date(d); sun.setDate(d.getDate() + 1);
      if (days.has(todayKey(sun))) { weekendDouble = true; break; }
    }
  }

  // average ms per card on the day with most reviews — proxy for "are you focused?"
  let fastDay = false;
  for (const k of Object.keys(dayCounts)) {
    const entries = log.filter((e) => todayKey(new Date(e.t)) === k && (e.ms || 0) > 0);
    if (entries.length >= 30) {
      const avg = entries.reduce((s, e) => s + e.ms, 0) / entries.length;
      if (avg < 5000) { fastDay = true; break; }
    }
  }

  // mature cards = review state with interval >= 21 days (Anki convention)
  const matureCards = cards.filter((c) => (c.phase || "new") === "review" && (c.interval || 0) >= 21).length;
  // very mature (interval >= 100 days)
  const ancientCards = cards.filter((c) => (c.phase || "new") === "review" && (c.interval || 0) >= 100).length;

  // detect any cloze and any card-image use in the library
  const usedCloze = cards.some((c) => c.type === "cloze");
  const usedCardImages = cards.some((c) => !!c.frontImage || !!c.backImage);

  // total distinct days studied (lifetime)
  const distinctDays = days.size;

  // a "perfect day": 20+ reviews in a day, all Good/Easy
  let perfectDay = false;
  for (const k of Object.keys(dayCounts)) {
    if ((dayCounts[k] || 0) >= 20) {
      const es = log.filter((e) => todayKey(new Date(e.t)) === k);
      if (es.length >= 20 && es.every((e) => e.q >= 2)) { perfectDay = true; break; }
    }
  }

  // distinct weekends studied (Sat+Sun both)
  let weekendCount = 0;
  for (const d of dayDates) {
    if (d.getDay() === 6) { const sun = new Date(d); sun.setDate(d.getDate() + 1); if (days.has(todayKey(sun))) weekendCount++; }
  }

  // comeback: studied today after a gap of 14+ days since the previous study day
  let comeback = false;
  if (days.has(todayKey(new Date()))) {
    const sorted = dayDates.map((d) => d.getTime()).sort((a, b) => a - b);
    for (let i = 1; i < sorted.length; i++) {
      if ((sorted[i] - sorted[i - 1]) / 86400000 >= 14) { comeback = true; break; }
    }
  }

  // studied across all parts of the day (morning <12, afternoon 12-18, evening 18-24, night 0-4) lifetime
  const hoursSeen = new Set(log.map((e) => new Date(e.t).getHours()));
  const partsSeen = new Set();
  hoursSeen.forEach((h) => { if (h < 4) partsSeen.add("night"); else if (h < 12) partsSeen.add("morning"); else if (h < 18) partsSeen.add("afternoon"); else partsSeen.add("evening"); });
  const aroundClock = partsSeen.size >= 4;

  // distinct subjects across decks
  const subjects = new Set(); Object.values(decks).forEach((d) => { if (d.subject) subjects.add(d.subject); });
  const subjectCount = subjects.size;

  return {
    totalReviews: log.length,
    totalCards: cards.length,
    totalDecks: Object.keys(decks).length,
    matureCards, ancientCards,
    streak, maxDayReviews, retention100,
    longestGoodRun: best, goalStreak,
    decksStudied, studiedNight, studiedEarly, fastDay, weekendDouble,
    usedCloze, usedCardImages,
    distinctDays, perfectDay, weekendCount, comeback, aroundClock, subjectCount,
    importedPdf: !!(flags && flags.importedPdf),
    importedImage: !!(flags && flags.importedImage),
    tutorUses: (flags && flags.tutorUses) || 0,
    bestExamPct: (flags && flags.bestExamPct) || 0,

/* ============================================================

   Still auto-detects language from script (Hiragana → ja,
   Hangul → ko, Cyrillic → ru, …) so language-learning cards

       Neural" voices and prioritizes them
     - lets the user pick a specific voice + gender in Settings
     - applies tone/pacing presets (calm / energetic / professional)

  if (/[一-鿿]/.test(text)) return "zh-CN";
  if (/[؀-ۿ]/.test(text)) return "ar-SA";
  if (/[Ѐ-ӿ]/.test(text)) return "ru-RU";

  if (/[฀-๿]/.test(text)) return "th-TH";

  energetic:    { label: "Energetic",    rate: 1.18, pitch: 1.12 },

const MALE_HINTS   = ["male","guy","david","mark","daniel","alex","fred","oliver","james","ryan","george","thomas","matthew","brian","arthur","liam","william","eric","aaron"," tom","gordon","ravi","prabhat"];

    if (la !== lb) return lb - la;

// Module-level prefs, synced from Settings so every speak() call uses them

  const voices = window.speechSynthesis.getVoices() || [];
  if (!voices.length) return null;
  // honour the user's chosen voice — unless the card is in a different script
  if (TTS_PREFS.voiceURI) {
    const chosen = voices.find((v) => v.voiceURI === TTS_PREFS.voiceURI);
    if (chosen && (!detected || (chosen.lang || "").slice(0, 2) === detected.slice(0, 2))) return chosen;
  }
  // otherwise the best-quality voice that matches the detected language
  if (detected) {
    const m = voices.filter((v) => (v.lang || "").slice(0, 2) === detected.slice(0, 2));
    if (m.length) { m.sort((a, b) => voiceQuality(b) - voiceQuality(a)); return m[0]; }
  }
  // fall back to the best natural voice in the UI language
  const pl = (navigator.language || "en").slice(0, 2);
  const ui = voices.filter((v) => (v.lang || "").slice(0, 2) === pl);
  if (ui.length) { ui.sort((a, b) => voiceQuality(b) - voiceQuality(a)); return ui[0]; }
  return null;

  if (!window.speechSynthesis || !text) return;

    window.speechSynthesis.cancel();

    const detected = lang || detectLang(text);
    const voice = pickVoice(detected);
    if (voice) { u.voice = voice; u.lang = voice.lang; }
    else if (detected) u.lang = detected;
    const style = VOICE_STYLES[TTS_PREFS.style] || VOICE_STYLES.natural;
    u.rate = style.rate;
    u.pitch = style.pitch;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}

/* ============================================================
   FUZZY ANSWER MATCHING — for type-the-answer mode.
   Accepts comma-separated alternatives in the back ("autumn, fall"),
   tolerates ~15% Levenshtein distance for typos.
   ============================================================ */
function normalizeAns(s) {
  return String(s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/[^\p{L}\p{N}\s]/gu, " ").replace(/\s+/g, " ").trim();
}
function levenshtein(a, b) {
  if (a === b) return 0;
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  let dp = new Array(n + 1); for (let i = 0; i <= n; i++) dp[i] = i;
  for (let i = 1; i <= m; i++) {
    let prev = dp[0]; dp[0] = i;
    for (let j = 1; j <= n; j++) {
      const tmp = dp[j];
      dp[j] = a[i - 1] === b[j - 1] ? prev : 1 + Math.min(prev, dp[j], dp[j - 1]);
      prev = tmp;
    }
  }
  return dp[n];
}
function matchAnswer(typed, expected) {
  const t = normalizeAns(typed);
  if (!t) return { ok: false, exact: false, close: false };
  const alts = String(expected || "").split(/[,/;]/).map((x) => normalizeAns(x)).filter(Boolean);
  if (!alts.length) return { ok: false, exact: false, close: false };
  if (alts.some((a) => a === t)) return { ok: true, exact: true, close: false };
  const best = Math.min(...alts.map((a) => levenshtein(t, a)));
  const target = alts[0];
  const tol = Math.max(1, Math.floor(target.length * 0.15));
  if (best <= tol) return { ok: true, exact: false, close: true };
  return { ok: false, exact: false, close: false };
}

/* ============================================================
   MATH RENDERING — KaTeX. Cards may contain LaTeX between
   delimiters: $$…$$ or \[…\] (display/block), $…$ or \(…\)
   (inline). Everything outside delimiters stays plain text.
   hasMath() lets callers skip the work entirely for ordinary cards.
   ============================================================ */
function hasMath(text) {
  if (!text) return false;
  if (/\$\$[\s\S]+?\$\$|\\\[[\s\S]+?\\\]|\\\([\s\S]+?\\\)/.test(text)) return true;
  // inline $…$ only counts if the content looks like math, so "$5 and $10"
  // (currency) doesn't render as a formula.

  const re = /(\$\$[\s\S]+?\$\$)|(\\\[[\s\S]+?\\\])|(\$[^$\n]+?\$)|(\\\([\s\S]+?\\\))/g;

  while ((m = re.exec(src)) !== null) {
    // a single-$ run that isn't math-like (e.g. currency) is left as text
    if (m[3] && !looksLikeMath(m[3].slice(1, -1))) continue;
    if (m.index > last) out.push({ text: src.slice(last, m.index) });
    const tok = m[0];
    if (m[1]) out.push({ math: true, display: true, value: tok.slice(2, -2) });
    else if (m[2]) out.push({ math: true, display: true, value: tok.slice(2, -2) });
    else if (m[3]) out.push({ math: true, display: false, value: tok.slice(1, -1) });
    else if (m[4]) out.push({ math: true, display: false, value: tok.slice(2, -2) });

          return <span key={i} style={{ display: s.display ? "block" : "inline" }} dangerouslySetInnerHTML={{ __html: html }} />;

  return { num, answer: answer.trim(), hint };

  return text.replace(clozeTokenRe(), (full, inner) => {

/* ============================================================
   TOKEN USAGE TRACKING + DAILY LIMIT
   Tracks Claude (Haiku 4.5) token usage per day and enforces a
   daily cap. Two layers:
     • Client (here): counts real tokens from each response's
       `usage` object, shows a live meter, self-enforces the cap.
       Accurate per response, but per-device and bypassable.
     • Server (your Worker + Cloudflare KV): the authoritative,
       tamper-proof enforcement. When the Worker returns
       X-Usage-Today / X-Usage-Limit headers, the client trusts
       those over its local count. See the Worker code in the
       comment at the bottom of this file.
   "User" without a login system = one anonymous id per browser.
   Real per-account limits across devices need real auth.
   ============================================================ */
const DAILY_TOKEN_LIMIT = 100000;     // Free: Haiku 4.5 tokens per user per day
const PRO_DAILY_TOKEN_LIMIT = 1000000; // Pro: 10x higher daily AI allowance

// Id sent to the Worker so it can meter tokens per user. When signed in we use
// the real account id (so the limit follows the account across devices); when
// signed out, a stable anonymous per-browser id.
let USER_ID = null;
async function getUserId() {
  // signed-in account id takes priority — this is what makes limits per-account
  try {
    const au = authManager && authManager.get && authManager.get().user;
    if (au && au.id) return "acct_" + au.id;
  } catch (e) {}
  if (USER_ID) return USER_ID;
  try { const v = await window.storage.get("userId"); if (v && v.value) { USER_ID = v.value; return USER_ID; } } catch (e) {}
  USER_ID = (window.crypto && crypto.randomUUID) ? "u_" + crypto.randomUUID() : "u_" + uid() + uid() + uid();
  try { await window.storage.set("userId", USER_ID); } catch (e) {}
  return USER_ID;
}

const usageTracker = (function () {
  let state = { date: todayKey(), tokens: 0, limit: DAILY_TOKEN_LIMIT, serverEnforced: false, history: {} };
  let loaded = false;
  const subs = new Set();
  const emit = () => subs.forEach((fn) => { try { fn(getState()); } catch (e) {} });

  function rollIfNeeded() {
    const t = todayKey();
    if (state.date !== t) { state.date = t; state.tokens = 0; }
  }
  function getState() { rollIfNeeded(); const remaining = Math.max(0, state.limit - state.tokens); return { ...state, remaining, over: state.tokens >= state.limit, usedPct: Math.min(100, Math.round((state.tokens / Math.max(1, state.limit)) * 100)) }; }
  async function persist() {
    try {
      // keep ~30 days of history for the usage display, trimmed
      const hist = state.history || {};
      const keys = Object.keys(hist).sort();
      while (keys.length > 35) delete hist[keys.shift()];
      await window.storage.set("usage", JSON.stringify({ date: state.date, tokens: state.tokens, history: hist }));
    } catch (e) {}
  }

  return {
    async init() {
      if (loaded) return getState();
      try {
        const v = await window.storage.get("usage");
        if (v && v.value) {
          const p = JSON.parse(v.value);
          state.history = p.history || {};
          if (p.date === todayKey()) state.tokens = p.tokens || 0;
          else state.tokens = 0;
        }
      } catch (e) {}
      loaded = true; emit();
      return getState();
    },
    get: getState,
    // accurate token count taken from a response's usage object (client estimate)
    addLocal(tokens) {
      rollIfNeeded();
      if (state.serverEnforced) return; // server is authoritative; don't double count
      state.tokens += tokens;
      state.history[state.date] = state.tokens;
      persist(); emit();
    },
    // authoritative cumulative total reported by the Worker
    setFromServer(today, limit) {
      state.date = todayKey();
      state.tokens = today;
      if (limit) state.limit = limit;
      state.serverEnforced = true;
      state.history[state.date] = today;
      persist(); emit();
    },
    // raise/lower the client-side limit (e.g. when the user is Pro). The Worker
    // remains the real enforcer; this just keeps the % bar honest before a call.
    setLimit(limit) {
      if (limit && !state.serverEnforced) { state.limit = limit; persist(); emit(); }
    },
    subscribe(fn) { subs.add(fn); return () => subs.delete(fn); },
  };
})();

// React hook for live usage display
function useUsage() {
  const [u, setU] = useState(() => usageTracker.get());
  useEffect(() => {
    let mounted = true;
    usageTracker.init().then((s) => { if (mounted) setU(s); });
    const unsub = usageTracker.subscribe((s) => { if (mounted) setU(s); });
    return () => { mounted = false; unsub(); };
  }, []);
  return u;
}

/* ============================================================
   BILLING — Stripe Pro subscription.
   The plan lives in the user's synced data under the "plan" key
   ("pro" or undefined). The Worker's webhook writes it after a
   successful Stripe payment; the app only READS it (so a user
   can't grant themselves Pro by editing local data — the source
   of truth is the cloud row the webhook controls).
   ============================================================ */
const STRIPE_ENABLED = WORKER_CONFIGURED && SUPABASE_CONFIGURED;
const billingManager = (function () {
  let plan = "free";
  const subs = new Set();
  const emit = () => subs.forEach((fn) => { try { fn(plan); } catch (e) {} });

  return {
    isPro() { return plan === "pro"; },
    plan() { return plan; },
    subscribe(fn) { subs.add(fn); return () => subs.delete(fn); },
    // Read the authoritative plan from the cloud row.
    async refresh() {
      const u = authManager.get().user;
      if (!sb || !u) { plan = "free"; emit(); return plan; }
      try {
        const { data } = await sb.from("user_data").select("plan").eq("user_id", u.id).maybeSingle();
        plan = (data && data.plan === "pro") ? "pro" : "free";
      } catch (e) { /* keep last known */ }
      try { usageTracker.setLimit(plan === "pro" ? PRO_DAILY_TOKEN_LIMIT : DAILY_TOKEN_LIMIT); } catch (e) {}
      emit();
      return plan;
    },
    // Start Stripe Checkout: ask the Worker for a session URL, then redirect.
    async startCheckout() {
      const u = authManager.get().user;
      if (!u) throw new Error("Please sign in first.");
      if (!STRIPE_ENABLED) throw new Error("Billing isn't set up yet.");
      const res = await fetch(WORKER_URL + STRIPE_CHECKOUT_PATH, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          userId: u.id,
          email: u.email,
          returnUrl: window.location.href.split("?")[0].split("#")[0],
        }),
      });
      if (!res.ok) throw new Error("Couldn't start checkout. Try again.");
      const data = await res.json();
      if (!data || !data.url) throw new Error("Checkout unavailable right now.");
      window.location.href = data.url; // hand off to Stripe's hosted page
    },
    // Open Stripe's customer portal to update card / cancel.
    async openPortal() {
      const u = authManager.get().user;
      if (!u) throw new Error("Please sign in first.");
      const res = await fetch(WORKER_URL + STRIPE_PORTAL_PATH, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId: u.id, returnUrl: window.location.href.split("?")[0].split("#")[0] }),
      });
      if (!res.ok) throw new Error("Couldn't open the billing portal.");
      const data = await res.json();
      if (data && data.url) window.location.href = data.url;
    },
  };
})();

function useBilling() {
  const [plan, setPlan] = useState(() => billingManager.plan());
  useEffect(() => {
    const unsub = billingManager.subscribe(setPlan);
    return () => unsub();
  }, []);
  return { plan, isPro: plan === "pro" };
}

// Error thrown when the daily token cap is reached — callers show a friendly message.
function DailyLimitError() {
  const e = new Error("Daily AI limit reached. It resets tomorrow.");
  e.code = "DAILY_LIMIT";
  return e;
}

/* ---- AI (via your Cloudflare Worker) ----
   callAI(prompt)              -> returns the text (back-compat)
   callAIDetailed(prompt,opts) -> { text, stopReason, truncated }
   The Worker holds the Anthropic key and returns the Anthropic
   /v1/messages JSON unchanged, so parsing stays identical and
   truncation detection (stop_reason === "max_tokens") still works.
*/
const MAX_OUTPUT_TOKENS = 2867;

async function callAIDetailed(prompt, opts = {}) {
  const maxTokens = Math.min(MAX_OUTPUT_TOKENS, opts.maxTokens || MAX_OUTPUT_TOKENS);
  const retries = opts.retries != null ? opts.retries : 2;

  if (!WORKER_CONFIGURED) {
    throw new Error('AI isn\u2019t connected yet. Open this file and set WORKER_URL (near the top) to your Cloudflare Worker URL.');
  }

  // pre-check the daily cap so we don't even make a doomed request
  await usageTracker.init();
  if (usageTracker.get().over) throw DailyLimitError();
  const userId = await getUserId();

  let lastErr = null;
  for (let attempt = 0; attempt <= retries; attempt++) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 180000);
    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, maxTokens, userId }),
        signal: ctrl.signal,
      });

      // server-enforced limit: surface usage + stop without retrying
      const limitHit = res.headers.get("X-Limit-Reached");
      const sToday = res.headers.get("X-Usage-Today");
      const sLimit = res.headers.get("X-Usage-Limit");
      if (sToday != null) usageTracker.setFromServer(parseInt(sToday, 10) || 0, parseInt(sLimit, 10) || 0);
      if (res.status === 429 && limitHit) throw DailyLimitError();

      let data = null;
      try { data = await res.json(); } catch { data = null; }

      if (!res.ok) {
        const status = res.status;
        const msg = (data && data.error && (data.error.message || data.error)) || `AI error (${status})`;
        // 429 (rate limit) and 5xx (overloaded) are worth retrying with backoff
        if ((status === 429 || status === 529 || status >= 500) && attempt < retries) {
          await new Promise((r) => setTimeout(r, 900 * (attempt + 1)));
          lastErr = new Error(msg);
          continue;
        }
        throw new Error(typeof msg === "string" ? msg : "AI error");
      }
      if (!data) throw new Error("The Worker returned an unreadable response.");

      // count tokens locally if the server didn't already report an authoritative total
      if (sToday == null && data.usage) {
        usageTracker.addLocal((data.usage.input_tokens || 0) + (data.usage.output_tokens || 0));
      }

      const text = (data.content || [])
        .filter((b) => b && b.type === "text")
        .map((b) => b.text)
        .join("")
        .trim();

      const stopReason = data.stop_reason || null;
      if (!text) throw new Error("Empty response from the AI.");

      return { text, stopReason, truncated: stopReason === "max_tokens" };
    } catch (e) {
      if (e && e.code === "DAILY_LIMIT") throw e; // never retry a limit
      lastErr = e;
      // network/abort/CORS: retry a couple of times before giving up
      if (attempt < retries) { await new Promise((r) => setTimeout(r, 700 * (attempt + 1))); continue; }
      throw lastErr;
    } finally {
      clearTimeout(timer);
    }
  }
  throw lastErr || new Error("AI request failed");
}

async function callAI(prompt, opts = {}) {
  const { text } = await callAIDetailed(prompt, opts);
  return text;
}

// Caps long side at 900px and uses JPEG ~0.8 quality to keep stored decks small.
async function fileToCompressedDataUrl(file, maxSide = 900, quality = 0.8) {
  if (!file || !file.type || !file.type.startsWith("image/")) throw new Error("Not an image file.");
  const dataUrl = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(String(r.result));
    r.onerror = () => rej(new Error("Couldn't read image."));
    r.readAsDataURL(file);
  });
  const img = await new Promise((res, rej) => {
    const im = new Image();
    im.onload = () => res(im);
    im.onerror = () => rej(new Error("Couldn't decode image."));
    im.src = dataUrl;
  });
  const w = img.width, h = img.height;
  if (!w || !h) throw new Error("Image has zero dimensions.");
  const scale = Math.min(1, maxSide / Math.max(w, h));
  const tw = Math.round(w * scale), th = Math.round(h * scale);
  const canvas = document.createElement("canvas");
  canvas.width = tw; canvas.height = th;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, tw, th);
  ctx.drawImage(img, 0, 0, tw, th);
  const isPng = file.type === "image/png";
  return canvas.toDataURL(isPng ? "image/png" : "image/jpeg", quality);
}

/* ============================================================
   AUDIO ATTACHMENTS — attach a sound file or record from the mic,
   stored as a data URL on the card (frontAudio / backAudio).
   IndexedDB makes this safe to keep on-device. Real recorded
   pronunciation beats live TTS for language decks.
   ============================================================ */
const MAX_AUDIO_BYTES = 5 * 1024 * 1024; // ~5MB per clip
async function audioFileToDataUrl(file) {
  if (!file) throw new Error("No file selected.");
  const okType = (file.type && file.type.startsWith("audio/")) || /\.(mp3|wav|ogg|oga|m4a|aac|webm|opus|flac)$/i.test(file.name || "");
  if (!okType) throw new Error("That doesn't look like an audio file.");
  if (file.size > MAX_AUDIO_BYTES) throw new Error("Audio is too large (max ~5MB). Trim it or use a lower bitrate.");
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(String(r.result));
    r.onerror = () => rej(new Error("Couldn't read that audio file."));
    r.readAsDataURL(file);
  });
}

// Single shared <audio> element so playing a new clip stops the previous one.
let _audioEl = null;
function playAudio(src) {
  if (!src) return;
  try {
    if (!_audioEl) _audioEl = new Audio();
    _audioEl.pause();
    _audioEl.src = src;
    _audioEl.currentTime = 0;
    _audioEl.play().catch(() => {});
  } catch (e) {}
}
// Stop any in-flight clip and TTS — used when leaving a study/exam screen so
// audio doesn't keep playing over the next view.
function stopAllPlayback() {
  try { if (_audioEl) _audioEl.pause(); } catch (e) {}
  try { if (window.speechSynthesis) window.speechSynthesis.cancel(); } catch (e) {}
}

// Reusable attach-or-record control. value is a data URL (or null).
// onChange(dataUrl|null) is called when it changes.
function AudioAttach({ label, value, onChange }) {
  const [recording, setRecording] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [err, setErr] = useState("");
  const fileRef = useRef();
  const recRef = useRef(null);       // MediaRecorder
  const chunksRef = useRef([]);
  const streamRef = useRef(null);
  const timerRef = useRef(null);
  const canRecord = typeof window !== "undefined" && window.MediaRecorder && navigator.mediaDevices && navigator.mediaDevices.getUserMedia;

  useEffect(() => () => {           // cleanup on unmount
    try { if (recRef.current && recRef.current.state !== "inactive") recRef.current.stop(); } catch {}
    if (streamRef.current) streamRef.current.getTracks().forEach((t) => t.stop());
    clearInterval(timerRef.current);
  }, []);

  const pickFile = async (e) => {
    const f = e.target.files[0]; e.target.value = ""; if (!f) return;
    setErr("");
    try { onChange(await audioFileToDataUrl(f)); }
    catch (er) { setErr(er.message || "Couldn't attach audio."); }
  };

  const startRec = async () => {
    setErr("");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      streamRef.current = stream;
      const mr = new MediaRecorder(stream);
      chunksRef.current = [];
      mr.ondataavailable = (ev) => { if (ev.data && ev.data.size) chunksRef.current.push(ev.data); };
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: mr.mimeType || "audio/webm" });
        if (blob.size > MAX_AUDIO_BYTES) { setErr("Recording too long (max ~5MB). Try a shorter clip."); }
        else {
          const r = new FileReader();
          r.onload = () => onChange(String(r.result));
          r.readAsDataURL(blob);
        }
        if (streamRef.current) streamRef.current.getTracks().forEach((t) => t.stop());
      };
      mr.start();
      recRef.current = mr;
      setRecording(true); setElapsed(0);
      timerRef.current = setInterval(() => setElapsed((s) => {
        const n = s + 1;
        if (n >= 60) stopRec();   // hard cap at 60s
        return n;
      }), 1000);
    } catch (e) {
      setErr("Couldn't access the microphone. Check browser permissions.");
    }
  };
  const stopRec = () => {
    clearInterval(timerRef.current);
    setRecording(false);
    try { if (recRef.current && recRef.current.state !== "inactive") recRef.current.stop(); } catch {}
  };

  return (
    <div style={S.audioSlot}>
      <div style={S.hint}>{label}</div>
      {value ? (
        <div style={S.audioRow}>
          <button className="ghost" style={{ padding: "5px 10px" }} onClick={() => playAudio(value)}>▶ Play</button>
          <button className="icon danger" title="remove audio" onClick={() => onChange(null)}>✕</button>
        </div>
      ) : recording ? (
        <div style={S.audioRow}>
          <span style={{ ...S.recDot }} /> <span style={{ fontSize: 13, color: "var(--danger-text)" }}>Recording {elapsed}s</span>
          <button className="primary" style={{ padding: "5px 12px" }} onClick={stopRec}>Stop</button>
        </div>
      ) : (
        <div style={S.audioRow}>
          <button className="ghost" style={{ padding: "5px 10px" }} onClick={() => fileRef.current.click()}>🎵 File</button>
          {canRecord && <button className="ghost" style={{ padding: "5px 10px" }} onClick={startRec}>🎙 Record</button>}
          <input ref={fileRef} type="file" accept="audio/*" hidden onChange={pickFile} />
        </div>
      )}
      {err && <div style={{ ...S.hint, color: "var(--danger-text)" }}>{err}</div>}
    </div>
  );
}

function makeCards(spec) {
  const tags = spec.tags || [];
  if (spec.type === "cloze") {
    const src = (spec.front || "").trim();
    if (!hasCloze(src)) return [];
    const noteId = uid();
    const nums = clozeNumbers(src);
    const list = nums.length ? nums : [1];
    return list.map((n) => newCard(src, "", { type: "cloze", tags, clozeNum: n, noteId, hint: spec.hint || "" }));
  }
  if (spec.type === "reverse") {
    const f = (spec.front || "").trim(), b = (spec.back || "").trim();
    if (!f || !b) return [];
    const noteId = uid();
    const base = newCard(f, b, { type: "basic", tags, noteId, hint: spec.hint || "" });
    return [base, newCard(b, f, { type: "basic", tags, reverseOf: base.id, noteId, hint: spec.hint || "" })];
  }
  const f = (spec.front || "").trim(), b = (spec.back || "").trim();
  if (!f || !b) return [];
  return [newCard(f, b, { type: "basic", tags, hint: spec.hint || "" })];
}
