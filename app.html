      <div style={{ ...S.panelBox, maxWidth: 380, margin: "0 auto" }}>
        <button className="ghost" style={{ width: "100%", marginBottom: 9 }} onClick={() => oauth("google")}>Continue with Google</button>
        <button className="ghost" style={{ width: "100%", marginBottom: 14 }} onClick={() => oauth("github")}>Continue with GitHub</button>
        <div style={{ textAlign: "center", color: "var(--muted3)", fontSize: 12, margin: "2px 0 14px" }}>or with email</div>

        <input className="ta" type="email" placeholder="you@example.com" value={email} onChange={(e) => setEmail(e.target.value)}
               onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
               autoComplete="email" style={{ marginBottom: 8 }} />
        <input className="ta" type="password" placeholder="password" value={pw} onChange={(e) => setPw(e.target.value)}
               onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
               autoComplete={mode === "signup" ? "new-password" : "current-password"} style={{ marginBottom: 12 }} />

        {err && <div style={S.errorBox}>{err}</div>}
        {msg && <div style={{ ...S.errorBox, background: "var(--success-bg)", borderColor: "var(--success-border)", color: "var(--success-text)" }}>{msg}</div>}

        <button className="primary" style={{ width: "100%" }} disabled={busy} onClick={submit}>
          {busy ? "Working…" : (mode === "signup" ? "Create account" : "Sign in")}
        </button>

        <div style={{ textAlign: "center", marginTop: 14, fontSize: 13 }}>
          {mode === "signup"
            ? <span style={S.hint}>Already have an account? <button className="linklike" onClick={() => { setMode("signin"); setErr(""); setMsg(""); }}>Sign in</button></span>
            : <span style={S.hint}>New here? <button className="linklike" onClick={() => { setMode("signup"); setErr(""); setMsg(""); }}>Create an account</button></span>}
        </div>
      </div>
      <p style={S.hint}>Google/GitHub buttons work once you enable those providers in Supabase. Email works right away.</p>
    </div>
  );
}

function App() {
  const [decks, setDecks] = useState({});
  const [log, setLog] = useState([]);
  const [settings, setSettings] = useState({
    dailyGoal: 20, newPerDay: 20, darkMode: false, ttsAuto: false,
    typeAnswer: false, soundOn: true, ttsVoice: "", ttsStyle: "natural",
  });
  const [stats, setStats] = useState({ xp: 0, achievements: [], freezesUsed: 0, freezesUsedAt: [], importedPdf: false, importedImage: false, tutorUses: 0, bestExamPct: 0, examAce: false, examCount: 0, lectureUsed: false, linkImported: false, deckShared: false, deckImported: false, worldLinked: false, freezeRefillMonth: "" });
  const [examHistory, setExamHistory] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("home");
  const [activeId, setActiveId] = useState(null);
  const [studyMode, setStudyMode] = useState("due");
  const { user, ready: authReady } = useAuth();

  const persistWarned = useRef(false);

  // initialize auth once on mount
  useEffect(() => { authManager.init(); }, []);

  // Returning from Stripe Checkout (?upgraded=1): confirm the plan from the
  // cloud (the webhook may take a second), show a thank-you, and clean the URL.
  useEffect(() => {
    if (!authReady || !user) return;
    const params = new URLSearchParams(window.location.search);
    if (params.get("upgraded") === "1") {
      let tries = 0;
      const poll = async () => {
        const plan = await billingManager.refresh();
        if (plan === "pro" || tries >= 5) {
          if (plan === "pro") { toast({ icon: "★", title: "Welcome to Pro!", body: "Your higher AI limits are active.", tone: "gold", ms: 6000 }); fireConfetti(); }
          else toast({ icon: "⏳", title: "Almost there", body: "Payment received — Pro activates in a moment.", ms: 6000 });
          window.history.replaceState({}, "", window.location.pathname);
          return;
        }
        tries++; setTimeout(poll, 1500);
      };
      poll();
    }
  }, [authReady, user]);

  // AUTH GATE — an account is required to use Kioku. When auth has resolved and
  // there's no signed-in user, send them to the dedicated auth page. This is keyed
  // on AUTH_REQUIRED (not SDK availability): if Supabase failed to load we still
  // fail safe to the auth page rather than opening the app to anonymous use.
  useEffect(() => {
    if (!AUTH_REQUIRED) return;
    if (!authReady) return;
    if (!user) {
      window.location.replace("auth.html");
    }
  }, [authReady, user]);

  // (re)load all data whenever auth becomes ready or the signed-in user changes.
  // Reset to defaults first so signing out doesn't leak the previous account's data.
  useEffect(() => {
    if (!authReady) return;
    let alive = true;
    (async () => {
      setLoaded(false);
      try {
        const d = await window.storage.get("decks");
        const l = await window.storage.get("log");
        const s = await window.storage.get("settings");
        const st = await window.storage.get("stats");
        const eh = await window.storage.get("examHistory");
        if (!alive) return;
        setDecks(d && d.value ? JSON.parse(d.value) : {});
        setLog(l && l.value ? JSON.parse(l.value) : []);
        setSettings((cur) => ({ dailyGoal: 20, newPerDay: 20, darkMode: cur.darkMode, ttsAuto: false, typeAnswer: false, soundOn: true, ttsVoice: "", ttsStyle: "natural", autoSync: true, ...(s && s.value ? JSON.parse(s.value) : {}) }));
        setStats({ xp: 0, achievements: [], freezesUsed: 0, freezesUsedAt: [], importedPdf: false, importedImage: false, tutorUses: 0, bestExamPct: 0, examAce: false, examCount: 0, lectureUsed: false, linkImported: false, deckShared: false, deckImported: false, worldLinked: false, freezeRefillMonth: "", ...(st && st.value ? JSON.parse(st.value) : {}) });
        setExamHistory(eh && eh.value ? JSON.parse(eh.value) : []);
      } catch (e) {}
      if (alive) setLoaded(true);
    })();
    return () => { alive = false; };
  }, [authReady, user ? user.id : null]);

  // apply theme
  useEffect(() => {
    document.body.classList.toggle("dark", !!settings.darkMode);
  }, [settings.darkMode]);

  // apply auto-sync preference to the storage layer
  useEffect(() => {
    if (typeof accountStore.setAutoSync === "function") accountStore.setAutoSync(settings.autoSync !== false);
  }, [settings.autoSync]);

  // keep the TTS engine in sync with the chosen voice + style
  useEffect(() => {
    ttsSetPrefs({ voiceURI: settings.ttsVoice || "", style: settings.ttsStyle || "natural" });
  }, [settings.ttsVoice, settings.ttsStyle]);

  // tab title reflects how many cards are due now — a quiet nudge to come back
  useEffect(() => {
    const now = Date.now();
    let due = 0;
    Object.values(decks).forEach((d) => d.cards.forEach((c) => {
      if (!c.suspended && (!c.due || c.due <= now)) due++;
    }));
    document.title = due > 0 ? `(${due}) Kioku — cards due` : "Kioku — AI flashcards";
  }, [decks]);

  // ---- streak freeze auto-refill (2 freezes/month) ----
  useEffect(() => {
    if (!loaded) return;
    const m = todayKey().slice(0, 7);
    if (stats.freezeRefillMonth !== m) {
      persistStats({ ...stats, freezeRefillMonth: m, freezesUsed: 0, freezesUsedAt: [] });
    }
    // eslint-disable-next-line
  }, [loaded]);

  // ---- streak freeze auto-apply ----
  //  Only spend a freeze when yesterday is a genuine ONE-DAY gap inside an
  //  active streak: the day before yesterday had real reviews, yesterday had
  //  none, and today does. Without the "day-before" check it would waste a
  //  freeze (and show an alarming toast) for new users or anyone whose last
  //  session was days ago — there's no streak to protect in those cases.
  useEffect(() => {
    if (!loaded) return;
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    const dayBefore = new Date(); dayBefore.setDate(dayBefore.getDate() - 2);
    const yKey = todayKey(yesterday);
    const dbKey = todayKey(dayBefore);
    const todayK = todayKey();
    const real = (e) => !e.freeze; // count only genuine reviews, not prior freezes
    const yReviews = log.filter((e) => real(e) && todayKey(new Date(e.t)) === yKey).length;
    const tReviews = log.filter((e) => real(e) && todayKey(new Date(e.t)) === todayK).length;
    // an active streak only exists if the day before yesterday was studied
    // (or already covered by a freeze)
    const dbActive = log.some((e) => todayKey(new Date(e.t)) === dbKey);
    const alreadyFroze = stats.freezesUsedAt && stats.freezesUsedAt.includes(yKey);
    const curLevel = xpToLevel(totalXpFromLog(log.filter((e) => !e.freeze))).lvl;
    const maxFreezes = freezesPerMonth(curLevel);
    const freezesLeft = maxFreezes - (stats.freezesUsed || 0);
    if (dbActive && yReviews === 0 && tReviews > 0 && !alreadyFroze && freezesLeft > 0) {
      // synthesize a tiny "freeze" log entry on yesterday so the streak counter
      // (which uses days from the log) treats yesterday as active
      const freezeEntry = { t: new Date(yesterday.setHours(12, 0, 0, 0)).getTime(), cardId: "__freeze", deckId: "__freeze", q: 2, ms: 0, freeze: true };
      persist(null, [...log, freezeEntry].sort((a, b) => a.t - b.t));
      persistStats({ ...stats, freezesUsed: (stats.freezesUsed || 0) + 1, freezesUsedAt: [...(stats.freezesUsedAt || []), yKey] });
      toast({ icon: "🧊", title: "Streak freeze used", body: `Yesterday was skipped — streak safe (${freezesLeft - 1} of ${maxFreezes} left this month)`, tone: "gold", ms: 5000 });
    }
    // eslint-disable-next-line
  }, [loaded]);

  // ---- daily goal hit detector ----
  const dailyGoalHitRef = useRef(false);
  useEffect(() => {
    if (!loaded) return;
    const today = todayKey();
    const todayReviews = log.filter((e) => todayKey(new Date(e.t)) === today && !e.freeze).length;
    if (todayReviews >= settings.dailyGoal && !dailyGoalHitRef.current) {
      dailyGoalHitRef.current = true;
      // only celebrate if it just crossed (the LAST log entry took us past)
      if (todayReviews - (XP_PER_GRADE[log[log.length - 1]?.q] ? 1 : 0) < settings.dailyGoal) {
        toast({ icon: "🎯", title: "Daily goal hit!", body: `${settings.dailyGoal} cards today — nice.`, tone: "gold", ms: 5000 });
        fireConfetti();
      }
    }
  }, [log, settings.dailyGoal, loaded]);

  // ---- compute level + check for new achievements / level-ups ----
  const xpTotal = useMemo(() => totalXpFromLog(log.filter((e) => !e.freeze)), [log]);
  const levelInfo = useMemo(() => xpToLevel(xpTotal), [xpTotal]);
  const lastLevelRef = useRef(null);
  useEffect(() => {
    if (!loaded) return;
    if (lastLevelRef.current === null) { lastLevelRef.current = levelInfo.lvl; return; }
    if (levelInfo.lvl > lastLevelRef.current) {
      toast({ icon: "⬆️", title: `Level ${levelInfo.lvl}!`, body: "You leveled up", tone: "gold", ms: 5000 });
      fireConfetti();
      lastLevelRef.current = levelInfo.lvl;
    }
  }, [levelInfo.lvl, loaded]);

  const liveStats = useMemo(() => computeStats(log.filter((e) => !e.freeze), decks, {
    dailyGoal: settings.dailyGoal, importedPdf: stats.importedPdf, importedImage: stats.importedImage,
    tutorUses: stats.tutorUses, bestExamPct: stats.bestExamPct, examAce: stats.examAce,
    examCount: stats.examCount, lectureUsed: stats.lectureUsed, linkImported: stats.linkImported,
    deckShared: stats.deckShared, deckImported: stats.deckImported, worldLinked: stats.worldLinked,
  }), [log, decks, settings.dailyGoal, stats.importedPdf, stats.importedImage, stats.tutorUses, stats.bestExamPct, stats.examAce, stats.examCount, stats.lectureUsed, stats.linkImported, stats.deckShared, stats.deckImported, stats.worldLinked]);

  const lastAchsRef = useRef(null);
  useEffect(() => {
    if (!loaded) return;
    const earned = earnedAchievements(liveStats);
    if (lastAchsRef.current === null) {
      lastAchsRef.current = new Set(earned);
      if (earned.length !== (stats.achievements || []).length) persistStats({ ...stats, achievements: earned });
      return;
    }
    const newly = earned.filter((id) => !lastAchsRef.current.has(id));
    if (newly.length) {
      newly.forEach((id) => {
        const a = ACHIEVEMENTS.find((x) => x.id === id);
        if (a) toast({ icon: a.icon, title: `Achievement unlocked`, body: `${a.name} — ${a.desc}`, tone: "gold", ms: 5000 });
      });
      fireConfetti();
      lastAchsRef.current = new Set(earned);
      persistStats({ ...stats, achievements: earned });
    }
    // eslint-disable-next-line
  }, [liveStats, loaded]);

  const persist = useCallback(async (nextDecks, nextLog) => {
    let failed = false;
    if (nextDecks) { setDecks(nextDecks); try { await window.storage.set("decks", JSON.stringify(nextDecks)); } catch (e) { failed = true; } }
    if (nextLog) { setLog(nextLog); try { await window.storage.set("log", JSON.stringify(nextLog)); } catch (e) { failed = true; } }
    if (failed && !persistWarned.current) {
      persistWarned.current = true;
      alert("Couldn't save your latest changes. This is rare — it usually means the browser blocked storage (private/incognito mode) or ran very low on disk space. Export a backup from Settings to be safe, and avoid private-browsing mode for daily use.");
    }
  }, []);
  const persistSettings = useCallback(async (next) => {
    setSettings(next);
    try { await window.storage.set("settings", JSON.stringify(next)); }
    catch (e) {
      if (!persistWarned.current) {
        persistWarned.current = true;
        alert("Couldn't save your latest changes. This is rare — it usually means the browser blocked storage (private/incognito mode) or ran very low on disk space. Export a backup from Settings to be safe.");
      }
    }
  }, []);
  const persistStats = useCallback(async (next) => {
    setStats(next);
    try { await window.storage.set("stats", JSON.stringify(next)); } catch (e) {}
  }, []);

  const saveDeck = (d) => persist({ ...decks, [d.id]: d });
  const createDeck = () => {
    const id = uid();
    persist({ ...decks, [id]: { id, name: "Untitled deck", subject: "", cards: [] } });
    setActiveId(id); setView("edit");
  };
  const deleteDeck = (id) => { const n = { ...decks }; delete n[id]; persist(n); };
  const saveGenerated = (name, rawCards, subject = "", fromPdf = false, fromImage = false) => {
    const id = uid();
    const cards = rawCards.flatMap((c) =>
      makeCards({ type: c.type || "basic", front: c.front, back: c.back, tags: c.tags || [] }));
    persist({ ...decks, [id]: { id, name, subject, cards } });
    const patch = {};
    if (fromPdf && !stats.importedPdf) patch.importedPdf = true;
    if (fromImage && !stats.importedImage) patch.importedImage = true;
    if (Object.keys(patch).length) persistStats({ ...stats, ...patch });
    setActiveId(id); setView("edit");
  };
  // Add a shared deck WITHOUT navigating away (used by the Share screen so the
  // success confirmation stays visible). Returns the new deck id.
  const importDeckOnly = (name, rawCards, subject = "") => {
    const id = uid();
    const cards = rawCards.flatMap((c) =>
      makeCards({ type: c.type || "basic", front: c.front, back: c.back, tags: c.tags || [] }));
    persist({ ...decks, [id]: { id, name, subject, cards } });
    return id;
  };
  const noteExamResult = (pct, qCount) => {
    const patch = {};
    if (pct > (stats.bestExamPct || 0)) patch.bestExamPct = pct;
    if (pct === 100 && qCount >= 5) patch.examAce = true;
    if (Object.keys(patch).length) persistStats({ ...stats, ...patch });
  };
  // set a boolean (or increment) achievement flag once
  const markFlag = useCallback((key, inc = false) => {
    setStats((prev) => {
      if (inc) { const next = { ...prev, [key]: (prev[key] || 0) + 1 }; window.storage.set("stats", JSON.stringify(next)).catch(() => {}); return next; }
      if (prev[key]) return prev;
      const next = { ...prev, [key]: true }; window.storage.set("stats", JSON.stringify(next)).catch(() => {}); return next;
    });
  }, []);
  const logReview = (entry) => {
    const next = [...log, entry];
    persist(null, next.length > 10000 ? next.slice(-10000) : next);
  };
  const popLastReview = () => {
    // remove the latest non-freeze entry
    const idx = (() => { for (let i = log.length - 1; i >= 0; i--) if (!log[i].freeze) return i; return -1; })();
    if (idx === -1) return null;
    const removed = log[idx];
    const next = log.slice(0, idx).concat(log.slice(idx + 1));
    persist(null, next);
    return removed;
  };
  const noteTutorUse = () => persistStats({ ...stats, tutorUses: (stats.tutorUses || 0) + 1 });

  const persistExamHistory = useCallback(async (next) => {
    setExamHistory(next);
    try { await window.storage.set("examHistory", JSON.stringify(next)); } catch (e) {}
  }, []);

  const openStudy = (id, mode = "due") => { setActiveId(id); setStudyMode(mode); setView("study"); };

  // header values
  const todayK = todayKey();
  const todayReviews = log.filter((e) => todayKey(new Date(e.t)) === todayK && !e.freeze).length;

  // While auth is resolving (or we're about to redirect a signed-out visitor),
  // show a clean branded splash rather than flashing the app UI.
  if (AUTH_REQUIRED && (!authReady || !user)) {
    return (
      <div style={S.root}>
        <style>{CSS}</style>
        <div style={{ minHeight: "100vh", display: "grid", placeItems: "center" }}>
          <div style={{ textAlign: "center" }}>
            <div style={{ width: 60, height: 60, borderRadius: 16, background: "var(--accent)", color: "#fff", display: "grid", placeItems: "center", fontSize: 32, fontWeight: 600, margin: "0 auto 16px", boxShadow: "var(--shadow-md)" }}>記</div>
            <div className="splash-spin" />
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={S.root}>
      <style>{CSS}</style>
      <ToastHost />
      <div className="app-shell" style={S.shell}>
        <header style={S.header}>
          <div style={S.brand} onClick={() => setView("home")}>
            <span style={S.mark}>記</span> Kioku
          </div>
          <div style={S.headerRight}>
            <DailyChip done={todayReviews} goal={settings.dailyGoal} />
            <LevelChip level={levelInfo.lvl} xp={levelInfo.intoLevel} next={levelInfo.levelNeeds} />
            <StreakChip streak={liveStats.streak} freezesLeft={freezesPerMonth(levelInfo.lvl) - (stats.freezesUsed || 0)} maxFreezes={freezesPerMonth(levelInfo.lvl)} />
            {SUPABASE_ENABLED && <ProChip />}
            {SUPABASE_ENABLED && (
              <button className="icon" title={user ? (user.email || "Account") : "Account"} onClick={() => setView("account")}>👤</button>
            )}
            <button className="icon" title="Settings" onClick={() => setView("settings")}>⚙</button>
          </div>
        </header>
        <nav className="app-nav" style={S.nav}>
          <button className={navCls(view, "home")} onClick={() => setView("home")}>Decks</button>
          <button className={navCls(view, "library")} onClick={() => setView("library")}>Library</button>
          <button className={navCls(view, "exams")} onClick={() => setView("exams")}>Exams</button>
          <button className={navCls(view, "share")} onClick={() => setView("share")}>Share</button>
          <button className={navCls(view, "dashboard")} onClick={() => setView("dashboard")}>Stats</button>
          <button className={navCls(view, "achievements")} onClick={() => setView("achievements")}>Achievements</button>
        </nav>

        {!loaded ? (
          <div style={S.muted}>loading…</div>
        ) : view === "home" ? (
          <Home decks={decks} log={log} settings={settings} stats={stats} levelInfo={levelInfo}
                onCreate={createDeck} onOpen={(id) => { setActiveId(id); setView("edit"); }}
                onStudy={openStudy} onDelete={deleteDeck}
                onImport={(d) => persist(d)} onGenerate={() => setView("generate")} onImportDoc={() => setView("import")} onAIImport={() => setView("aiimport")} onLecture={() => setView("lecture")} />
        ) : view === "generate" ? (
          <Generate onSave={(n, c) => saveGenerated(n, c)} onCancel={() => setView("home")} />
        ) : view === "import" ? (
          <ImportDoc onSave={(n, c, fromPdf, fromImage) => saveGenerated(n, c, "", fromPdf, fromImage)} onCancel={() => setView("home")} />
        ) : view === "aiimport" ? (
          <AIImport onSave={(n, c, subject) => { markFlag("linkImported"); saveGenerated(n, c, subject || ""); }} onCancel={() => setView("home")} />
        ) : view === "lecture" ? (
          <LectureRecorder onSave={(n, c, subject) => { markFlag("lectureUsed"); saveGenerated(n, c, subject || ""); }} onCancel={() => setView("home")} />
        ) : view === "exams" ? (
          <ExamSim decks={decks} examHistory={examHistory}
                   onSaveHistory={(h) => { persistExamHistory(h); markFlag("examCount", true); }}
                   onBack={() => setView("home")} />
        ) : view === "share" ? (
          <ShareDecks decks={decks}
                  onImportDeck={(n, c, subject) => { markFlag("deckImported"); return importDeckOnly(n, c, subject || ""); }}
                  onOpenDeck={(id) => { setActiveId(id); setView("edit"); }}
                  onShareDeck={() => markFlag("deckShared")}
                  onBack={() => setView("home")} />
        ) : view === "library" ? (
          <Library decks={decks} onOpenDeck={(id) => { setActiveId(id); setView("edit"); }} onSaveDeck={saveDeck} />
        ) : view === "dashboard" ? (
          <Dashboard decks={decks} log={log} settings={settings} stats={stats} levelInfo={levelInfo} liveStats={liveStats} />
        ) : view === "achievements" ? (
          <Achievements stats={liveStats} earned={earnedAchievements(liveStats)} levelInfo={levelInfo} xpTotal={xpTotal} />
        ) : view === "settings" ? (
          <Settings settings={settings} onSave={persistSettings} onBack={() => setView("home")} decks={decks} log={log} stats={stats}
                    onClearLog={() => { persist(null, []); }} onResetStats={() => { persistStats({ ...stats, achievements: [] }); }} />
        ) : view === "account" ? (
          <AccountScreen user={user} onBack={() => setView("home")} />
        ) : view === "edit" ? (
          decks[activeId]
            ? <Editor key={activeId} deck={decks[activeId]} onSave={saveDeck} onStudy={(mode) => openStudy(activeId, mode)} />
            : <div style={S.muted}>Deck not found.</div>
        ) : (
          decks[activeId]
            ? (studyMode === "exam"
                ? <ExamMode key={activeId + ":exam"} deck={decks[activeId]} onDone={() => setView("home")} onExamResult={noteExamResult} />
                : <Study key={activeId + ":" + studyMode} deck={decks[activeId]} mode={studyMode} settings={settings}
                         onSave={saveDeck} onLog={logReview} onUndo={popLastReview} onTutorUsed={noteTutorUse}
                         onDone={() => setView("home")} />)
            : <div style={S.muted}>Deck not found.</div>
        )}
      </div>
    </div>
  );
}

function navCls(view, t) {
  return "navbtn" + (view === t ? " active" : "");
}

/* ---- chips in the header ---- */
function DailyChip({ done, goal }) {
  const pct = Math.min(100, Math.round((done / Math.max(1, goal)) * 100));
  const hit = done >= goal;
  return (
    <div title={`${done} / ${goal} today`} style={{ ...S.chip, ...(hit ? S.chipHit : {}) }}>
      <span style={S.chipIcon}>🎯</span>
      <span style={S.chipText}>{done}/{goal}</span>
      <div style={S.chipBar}><div style={{ ...S.chipBarFill, width: `${pct}%`, background: hit ? "var(--success)" : "var(--accent)" }} /></div>
    </div>
  );
}
function LevelChip({ level, xp, next }) {
  const pct = Math.min(100, Math.round((xp / Math.max(1, next)) * 100));
  const title = titleForLevel(level);
  return (
    <div title={`${title} · ${xp} / ${next} XP to level ${level + 1}`} style={S.chip}>
      <span style={S.chipIcon}>✦</span>
      <span style={S.chipText}>Lv {level} · {title}</span>
      <div style={S.chipBar}><div style={{ ...S.chipBarFill, width: `${pct}%`, background: "var(--gold)" }} /></div>
    </div>
  );
}
function StreakChip({ streak, freezesLeft, maxFreezes }) {
  return (
    <div title={`${streak} day streak · ${freezesLeft} of ${maxFreezes} streak freezes left this month`} style={S.chip}>
      <span style={S.chipIcon}>{streak > 0 ? "🔥" : "·"}</span>
      <span style={S.chipText}>{streak}</span>
    </div>
  );
}

/* ---------------- HOME ---------------- */
function Home({ decks, log, settings, stats, levelInfo, onCreate, onOpen, onStudy, onDelete, onImport, onGenerate, onImportDoc, onAIImport, onLecture }) {
  const list = Object.values(decks);
  const now = Date.now();
  const fileRef = useRef();
  const dueCount = (d) => d.cards.filter((c) => !c.suspended && (!c.due || c.due <= now)).length;

  const todayK = todayKey();
  const todayReviews = log.filter((e) => todayKey(new Date(e.t)) === todayK && !e.freeze).length;
  const goalPct = Math.min(100, Math.round((todayReviews / Math.max(1, settings.dailyGoal)) * 100));

  const exportDeck = (d) => {
    const blob = new Blob([JSON.stringify(d, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = `${d.name.replace(/\s+/g, "_")}.json`; a.click();
  };
  const importDeck = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (!d || typeof d !== "object" || Array.isArray(d)) throw new Error("bad");
        // Accept either a single deck, or a full backup {decks:{…}} — import all decks found.
        const incoming = (d.decks && typeof d.decks === "object") ? Object.values(d.decks) : [d];
        const next = { ...decks };
        let added = 0;
        for (const raw of incoming) {
          if (!raw || typeof raw !== "object") continue;
          const id = uid();
          const deck = {
            id,
            name: typeof raw.name === "string" && raw.name.trim() ? raw.name : "Imported deck",
            subject: typeof raw.subject === "string" ? raw.subject : "",
            examDate: typeof raw.examDate === "string" ? raw.examDate : "",
            cards: Array.isArray(raw.cards)
              ? raw.cards.filter((c) => c && typeof c === "object").map((c) => ({ ...c, id: uid() }))
              : [],
          };
          next[id] = deck; added++;
        }
        if (!added) { alert("That file didn't contain any decks."); return; }
        onImport(next);
      } catch { alert("Couldn't read that file — it may not be a valid Kioku deck export."); }
    };
    r.readAsText(f); e.target.value = "";
  };

  const bySubject = {};
  list.forEach((d) => { const s = d.subject || "Uncategorized"; (bySubject[s] = bySubject[s] || []).push(d); });

  return (
    <div className="fade">
      <div style={S.homeTop}>
        <div>
          <h1 className="app-h1" style={S.h1}>Your decks</h1>
          <p style={S.sub}>{list.length === 0 ? "Let's create your first deck below." : "Spaced repetition that adapts. Tap a word in review to look it up."}</p>
        </div>
        {list.length > 0 && (
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button className="ghost" onClick={() => fileRef.current.click()}>Import file</button>
          <button className="ghost" onClick={onImportDoc}>From notes / PDF</button>
          <button className="ghost" onClick={onAIImport}>From a link</button>
          <button className="ghost" onClick={onLecture}>🎙 Record lecture</button>
          <button className="ghost" onClick={onGenerate}>Generate with AI</button>
          <button className="primary" onClick={onCreate}>+ New deck</button>
        </div>
        )}
        <input ref={fileRef} type="file" accept=".json" hidden onChange={importDeck} />
      </div>

      {/* Daily goal banner — only once the user actually has decks */}
      {list.length > 0 && (
      <div style={S.goalBanner}>
        <div style={S.goalBannerTop}>
          <div>
            <div style={S.goalBannerLabel}>Today</div>
            <div style={S.goalBannerNum}>
              {todayReviews} <span style={S.goalBannerSlash}>/ {settings.dailyGoal} cards</span>
            </div>
          </div>
          <div style={S.goalBannerRight}>
            <div style={S.goalBannerLabel}>Level {levelInfo.lvl}</div>
            <div style={S.goalBannerNum}>{levelInfo.intoLevel}<span style={S.goalBannerSlash}>/{levelInfo.levelNeeds} XP</span></div>
          </div>
        </div>
        <div style={S.goalBigBar}><div style={{ ...S.goalBigBarFill, width: `${goalPct}%` }} /></div>
        <div style={S.goalBannerFoot}>
          {todayReviews >= settings.dailyGoal
            ? "🎯 Daily goal hit — anything more is bonus."
            : `${settings.dailyGoal - todayReviews} more to hit your daily goal.`}
        </div>
      </div>
      )}

      {list.length === 0 ? (
        <div className="onboard">
          <div className="onboard-hero">
            <div className="onboard-badge">記 Welcome to Kioku</div>
            <h2 className="onboard-h">Let's build your first deck.</h2>
            <p className="onboard-p">Pick how you'd like to start. You can always add more cards, edit anything, or mix methods later.</p>
          </div>
          <div className="onboard-grid">
            <button className="onboard-card feature" onClick={onGenerate}>
              <div className="onboard-ic">✨</div>
              <div className="onboard-ct">Generate with AI</div>
              <div className="onboard-cd">Describe a topic and get a ready-made deck in seconds.</div>
              <span className="onboard-go">Start →</span>
            </button>
            <button className="onboard-card" onClick={onImportDoc}>
              <div className="onboard-ic">📄</div>
              <div className="onboard-ct">Import notes or a PDF</div>
              <div className="onboard-cd">Turn your own material into cards automatically.</div>
              <span className="onboard-go">Import →</span>
            </button>
            <button className="onboard-card" onClick={onAIImport}>
              <div className="onboard-ic">🔗</div>
              <div className="onboard-ct">Import from a link</div>
              <div className="onboard-cd">Paste a YouTube video or website and get a full study pack.</div>
              <span className="onboard-go">Paste a link →</span>
            </button>
            <button className="onboard-card" onClick={onLecture}>
              <div className="onboard-ic">🎙</div>
              <div className="onboard-ct">Record a lecture</div>
              <div className="onboard-cd">Kioku transcribes it live, then makes a guide or cards.</div>
              <span className="onboard-go">Start recording →</span>
            </button>
            <button className="onboard-card" onClick={onCreate}>
              <div className="onboard-ic">✏️</div>
              <div className="onboard-ct">Create manually</div>
              <div className="onboard-cd">Write your own cards, one at a time.</div>
              <span className="onboard-go">Create →</span>
            </button>
          </div>
          <div className="onboard-sample">
            <span>Just want to see how it works?</span>
            <button className="linklike" onClick={() => onImport({ ...decks, ...makeSampleDeck() })}>Load a sample deck →</button>
          </div>
        </div>
      ) : (
        Object.keys(bySubject).sort().map((subject) => (
          <div key={subject} style={{ marginBottom: 22 }}>
            <div style={S.subjectLabel}>{subject}</div>
            <div style={S.grid}>
              {bySubject[subject].map((d) => {
                const due = dueCount(d);
                const leeches = d.cards.filter((c) => isLeech(c) && !c.suspended).length;
                return (
                  <div key={d.id} style={S.card} className="deckcard">
                    <div style={{ flex: 1 }} onClick={() => onOpen(d.id)}>
                      <div style={S.deckName}>{d.name}</div>
                      <div style={S.deckMeta}>
                        {d.cards.length} cards
                        {due > 0 && <span style={S.dueBadge}>{due} due</span>}
                        {leeches > 0 && <span style={S.leechBadge}>🐛 {leeches} leech{leeches === 1 ? "" : "es"}</span>}
                      </div>
                    </div>
                    <div style={S.deckActions}>
                      <button className="study deck-study" disabled={d.cards.length === 0} onClick={() => onStudy(d.id, "due")}>Study →</button>
                      <button className="icon" title="export" onClick={() => exportDeck(d)}>↓</button>
                      <button className="icon danger" title="delete"
                              onClick={() => confirm(`Delete "${d.name}"?`) && onDelete(d.id)}>✕</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

/* ---------------- EDITOR ---------------- */
function Editor({ deck, onSave, onStudy }) {
  const [name, setName] = useState(deck.name);
  const [subject, setSubject] = useState(deck.subject || "");
  const [cards, setCards] = useState(deck.cards);
  const [front, setFront] = useState("");
  const [back, setBack] = useState("");
  const [frontImage, setFrontImage] = useState(null);
  const [backImage, setBackImage] = useState(null);
  const [frontAudio, setFrontAudio] = useState(null);
  const [backAudio, setBackAudio] = useState(null);
  const [imgBusy, setImgBusy] = useState(null); // "front" | "back" | null
  const [imgErr, setImgErr] = useState("");
  const frontImgRef = useRef();
  const backImgRef = useRef();
  const [tags, setTags] = useState("");
  const [hint, setHint] = useState("");
  const [type, setType] = useState("basic");
  const [examDate, setExamDate] = useState(deck.examDate || "");

  const pickFrontImage = async (e) => {
    const f = e.target.files[0]; e.target.value = ""; if (!f) return;
    setImgErr(""); setImgBusy("front");
    try { setFrontImage(await fileToCompressedDataUrl(f)); }
    catch (err) { setImgErr(err.message || "Couldn't attach image."); }
    setImgBusy(null);
  };
  const pickBackImage = async (e) => {
    const f = e.target.files[0]; e.target.value = ""; if (!f) return;
    setImgErr(""); setImgBusy("back");
    try { setBackImage(await fileToCompressedDataUrl(f)); }
    catch (err) { setImgErr(err.message || "Couldn't attach image."); }
    setImgBusy(null);
  };

  const saveTimer = useRef(null);
  const firstRun = useRef(true);
  const latest = useRef({ name, subject, cards, examDate });
  latest.current = { name, subject, cards, examDate };   // always hold the newest values
  useEffect(() => {
    if (firstRun.current) { firstRun.current = false; return; }
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => onSave({ ...deck, name, subject, cards, examDate }), 600);
    return () => clearTimeout(saveTimer.current);
    /* eslint-disable-next-line */
  }, [name, subject, cards, examDate]);
  // on unmount (e.g. navigating to Study), flush any pending edit immediately
  useEffect(() => () => {
    clearTimeout(saveTimer.current);
    if (!firstRun.current) onSave({ ...deck, ...latest.current });
    /* eslint-disable-next-line */
  }, []);

  const add = () => {
    const tagArr = tags.split(",").map((t) => t.trim()).filter(Boolean);
    if (type === "cloze") {
      if (!front.trim() || !hasCloze(front)) { alert("Cloze cards need {{braces}} around the hidden part — e.g. {{c1::Paris}}."); return; }
      const made = makeCards({ type: "cloze", front: front.trim(), tags: tagArr, hint: hint.trim() });
      if (!made.length) { alert("Couldn't read any cloze deletions in that text."); return; }
      // attach the same front image/audio to every cloze sub-card
      const withImg = made.map((c) => ({ ...c, frontImage: frontImage || null, backImage: backImage || null, frontAudio: frontAudio || null, backAudio: backAudio || null }));
      setCards([...withImg, ...cards]);
    } else {
      // allow card with only image/audio on a side
      if (!front.trim() && !frontImage && !frontAudio) return;
      if (!back.trim() && !backImage && !backAudio) return;
      const made = makeCards({ type, front: front.trim() || " ", back: back.trim() || " ", tags: tagArr, hint: hint.trim() });
      const withImg = made.map((c, idx) => {
        // for reverse type the second card swaps sides
        if (type === "reverse" && idx === 1) return { ...c, frontImage: backImage || null, backImage: frontImage || null, frontAudio: backAudio || null, backAudio: frontAudio || null };
        return { ...c, frontImage: frontImage || null, backImage: backImage || null, frontAudio: frontAudio || null, backAudio: backAudio || null };
      });
      setCards([...withImg, ...cards]);
    }
    setFront(""); setBack(""); setTags(""); setHint("");
    setFrontImage(null); setBackImage(null); setFrontAudio(null); setBackAudio(null);
  };
  const remove = (id) => setCards(cards.filter((c) => c.id !== id));
  const updateCard = (id, patch) => setCards(cards.map((c) => (c.id === id ? { ...c, ...patch } : c)));

  // ---- bad-card review ----
  const [reviewing, setReviewing] = useState(false);
  const [flags, setFlags] = useState(null);
  const [reviewMsg, setReviewMsg] = useState("");
  const [reviewErr, setReviewErr] = useState("");

  const runReview = async () => {
    setReviewing(true); setReviewErr(""); setFlags(null);
    const found = [];
    const total = cards.length;
    let scanned = 0, failedBatches = 0;
    for (let i = 0; i < cards.length; i += REVIEW_BATCH) {
      const batch = cards.slice(i, i + REVIEW_BATCH);
      setReviewMsg(`Checking ${Math.min(scanned + batch.length, total)} of ${total}…`);
      try {
        const batchFlags = await reviewBatch(batch);
        found.push(...batchFlags);
      } catch (e) { failedBatches++; }
      scanned += batch.length;
    }
    setReviewMsg("");
    setReviewing(false);
    if (failedBatches && found.length === 0) { setReviewErr("Couldn't reach the AI (or it returned nothing usable). Try again."); return; }
    setFlags(found);
  };

  const acceptFlag = (flag) => {
    const patch = {};
    if (flag.front != null) patch.front = flag.front;
    if (flag.back != null && flag.type !== "cloze") patch.back = flag.back;
    if (flag.type === "cloze" && flag.front != null) {
      const nums = clozeNumbers(flag.front);
      const cur = (cards.find((c) => c.id === flag.id) || {}).clozeNum;
      patch.clozeNum = nums.includes(cur) ? cur : (nums[0] || 1);
    }
    updateCard(flag.id, patch);
    setFlags((fs) => fs.filter((f) => f.id !== flag.id));
  };
  const rejectFlag = (flag) => setFlags((fs) => fs.filter((f) => f.id !== flag.id));

  const leechCount = cards.filter((c) => isLeech(c) && !c.suspended).length;
  const suspendedCount = cards.filter((c) => c.suspended).length;

  const suspendAllLeeches = () => {
    if (!confirm(`Suspend ${leechCount} leech card${leechCount === 1 ? "" : "s"}? They'll be hidden from study but stay in the deck — unsuspend any time.`)) return;
    setCards(cards.map((c) => (isLeech(c) && !c.suspended) ? { ...c, suspended: true } : c));
  };

  return (
    <div className="fade">
      <input style={S.titleInput} value={name} onChange={(e) => setName(e.target.value)} />
      <input style={S.subjectInput} placeholder="Subject (optional, groups decks on home)"
             value={subject} onChange={(e) => setSubject(e.target.value)} />

      <div style={S.addBox}>
        <div style={S.typeRow}>
          {["basic", "reverse", "cloze"].map((t) => (
            <button key={t} className={"type-chip" + (type === t ? " on" : "")} onClick={() => setType(t)}>{t}</button>
          ))}
        </div>
        {type === "cloze" ? (
          <>
            <textarea className="ta" rows={2} value={front} onChange={(e) => setFront(e.target.value)}
                      placeholder="Number blanks to make separate cards: The {{c1::mitochondria}} is the powerhouse of the {{c2::cell}}." />
            <span style={S.hint}>Each c1/c2/… becomes its own card. Add a hint with {`{{c1::answer::hint}}`}. A plain {`{{answer}}`} works too.</span>
          </>
        ) : (
          <>
            <textarea className="ta" rows={2} value={front} onChange={(e) => setFront(e.target.value)}
                      placeholder={type === "reverse" ? "Side A (also tested in reverse)" : "Front — question or term"} />
            <textarea className="ta" rows={2} value={back} onChange={(e) => setBack(e.target.value)}
                      placeholder={type === "reverse" ? "Side B" : "Back — answer (comma-separated for alternative answers)"}
                      onKeyDown={(e) => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) add(); }} />
          </>
        )}
        <input className="ta" placeholder="hint (optional — revealable nudge during study)" value={hint} onChange={(e) => setHint(e.target.value)} />
        <input className="ta" placeholder="tags, comma, separated" value={tags} onChange={(e) => setTags(e.target.value)} />

        {/* Image attach (user-controlled, never auto-added by AI) */}
        <div style={S.imgRow}>
          <div style={S.imgSlot}>
            <div style={S.hint}>Front image {type === "cloze" ? "(applied to all cloze sub-cards)" : ""}</div>
            {frontImage
              ? <div style={S.imgPreviewWrap}>
                  <img src={frontImage} alt="front" style={S.imgPreview} />
                  <button className="icon danger" title="remove" onClick={() => setFrontImage(null)}>✕</button>
                </div>
              : <button className="ghost" onClick={() => frontImgRef.current.click()} disabled={imgBusy === "front"}>
                  {imgBusy === "front" ? "Processing…" : "📷 Attach image"}
                </button>}
            <input ref={frontImgRef} type="file" accept="image/*" hidden onChange={pickFrontImage} />
          </div>
          {type !== "cloze" && (
            <div style={S.imgSlot}>
              <div style={S.hint}>Back image {type === "reverse" ? "(swapped on reverse card)" : ""}</div>
              {backImage
                ? <div style={S.imgPreviewWrap}>
                    <img src={backImage} alt="back" style={S.imgPreview} />
                    <button className="icon danger" title="remove" onClick={() => setBackImage(null)}>✕</button>
                  </div>
                : <button className="ghost" onClick={() => backImgRef.current.click()} disabled={imgBusy === "back"}>
                    {imgBusy === "back" ? "Processing…" : "📷 Attach image"}
                  </button>}
              <input ref={backImgRef} type="file" accept="image/*" hidden onChange={pickBackImage} />
            </div>
          )}
        </div>
        {imgErr && <div style={S.errorBox}>{imgErr}</div>}

        {/* Audio attach — file or mic recording (great for pronunciation) */}
        <div style={S.imgRow}>
          <AudioAttach label={`Front audio ${type === "cloze" ? "(all sub-cards)" : ""}`} value={frontAudio} onChange={setFrontAudio} />
          {type !== "cloze" && (
            <AudioAttach label={`Back audio ${type === "reverse" ? "(swapped on reverse)" : ""}`} value={backAudio} onChange={setBackAudio} />
          )}
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={S.hint}>Cmd/Ctrl+Enter to add · math: wrap LaTeX in $…$ (e.g. $E=mc^2$) or $$…$$ · images are yours</span>
          <button className="primary" onClick={add}>+ add card</button>
        </div>
      </div>

      {cards.length > 0 && (
        <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
          <button className="study big" onClick={() => onStudy("due")}>Study due →</button>
          <button className="study" onClick={() => onStudy("focus")}>Focus weak</button>
          <button className="study" onClick={() => onStudy("all")}>All cards</button>
          <button className="study" onClick={() => onStudy("cram")}>Cram</button>
          <button className="study" onClick={() => onStudy("exam")}>Exam</button>
          <button className="study" onClick={runReview} disabled={reviewing}>
            {reviewing ? "Checking…" : "Check cards (AI)"}
          </button>
        </div>
      )}

      {leechCount > 0 && (
        <div style={S.leechBox}>
          <span style={{ fontSize: 20 }}>🐛</span>
          <div style={{ flex: 1 }}>
            <b>{leechCount} leech{leechCount === 1 ? "" : "es"} in this deck.</b>
            <div style={S.hint}>Leeches are cards you've failed many times — usually the card is the problem, not you. Suspend them, then rewrite or break them apart.</div>
          </div>
          <button className="ghost" onClick={suspendAllLeeches}>Suspend all</button>
        </div>
      )}
      {suspendedCount > 0 && (
        <div style={{ ...S.hint, marginBottom: 10 }}>{suspendedCount} suspended card{suspendedCount === 1 ? "" : "s"} hidden from study (still in the deck).</div>
      )}

      {cards.length > 0 && <ExamPanel cards={cards.filter((c) => !c.suspended)} examDate={examDate} setExamDate={setExamDate} onStudy={onStudy} />}

      {reviewMsg && <p style={S.tinyNote}>{reviewMsg}</p>}
      {reviewErr && <div style={S.errorBox}>{reviewErr}</div>}
      {flags && flags.length === 0 && !reviewing && (
        <div style={S.goodBox}>✓ No issues found — these cards look solid.</div>
      )}
      {flags && flags.length > 0 && (
        <div style={S.reviewPanel}>
          <div style={S.reviewHead}>
            <span>{flags.length} card{flags.length === 1 ? "" : "s"} flagged</span>
            <button className="icon" title="dismiss all" onClick={() => setFlags(null)}>✕</button>
          </div>
          {flags.map((flag) => (
            <div key={flag.id} style={S.flagCard}>
              <div style={S.flagIssue}>{flag.issue}{flag.reason ? " — " + flag.reason : ""}</div>
              <div style={S.diffRow}>
                <div style={S.diffCol}>
                  <div style={S.diffLabel}>original</div>
                  <div style={S.diffOld}>{flag.origFront}</div>
                  {flag.type !== "cloze" && <div style={S.diffOldBack}>{flag.origBack}</div>}
                </div>
                <div style={S.diffCol}>
                  <div style={S.diffLabel}>suggested</div>
                  <div style={S.diffNew}>{flag.front != null ? flag.front : flag.origFront}</div>
                  {flag.type !== "cloze" && <div style={S.diffNewBack}>{flag.back != null ? flag.back : flag.origBack}</div>}
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                <button className="primary" style={{ padding: "6px 14px" }} onClick={() => acceptFlag(flag)}>Accept rewrite</button>
                <button className="ghost" style={{ padding: "6px 14px" }} onClick={() => rejectFlag(flag)}>Keep original</button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div>
        {cards.map((c) => (
          <EditableCardRow key={c.id} card={c} onChange={(patch) => updateCard(c.id, patch)} onRemove={() => remove(c.id)} />
        ))}
      </div>
    </div>
  );
}

/* exam readiness panel */
function ExamPanel({ cards, examDate, setExamDate, onStudy }) {
  const days = daysUntil(examDate);
  const sum = examDate && days != null ? examSummary(cards, days) : null;

  let verdict = null, vstyle = S.examNeutral;
  if (sum) {
    if (days < 0) { verdict = "That date has passed — set a new exam date."; vstyle = S.examNeutral; }
    else if (days === 0) { verdict = `Exam is today. ${sum.pct}% projected ready.`; vstyle = sum.pct >= 80 ? S.examGood : S.examBad; }
    else {
      const notReady = sum.counts.atrisk + sum.counts.notlearned;
      const perDay = Math.ceil(notReady / Math.max(1, days));
      if (sum.pct >= 85) { verdict = `On track — ${sum.pct}% projected ready by exam day. Keep up your normal reviews.`; vstyle = S.examGood; }
      else if (sum.pct >= 60) { verdict = `Slightly behind — ${sum.pct}% projected ready. Studying ~${perDay} at-risk cards/day closes the gap.`; vstyle = S.examWarn; }
      else { verdict = `Behind — only ${sum.pct}% projected ready by exam day. Focus on the ${notReady} unready cards (~${perDay}/day).`; vstyle = S.examBad; }
    }
  }

  return (
    <div style={S.examBox}>
      <div style={S.examTop}>
        <div>
          <div style={S.examTitle}>Exam mode</div>
          <div style={S.hint}>Set your exam date for an honest readiness projection.</div>
        </div>

            {sum.counts.borderline > 0 && <div title={`${sum.counts.borderline} borderline`} style={{ ...S.seg, background: "var(--warn)", flex: sum.counts.borderline }} />}
            {sum.counts.atrisk > 0 && <div title={`${sum.counts.atrisk} at risk`} style={{ ...S.seg, background: "#d97a55", flex: sum.counts.atrisk }} />}

          </div>

            <span><b style={{ color: "var(--success)" }}>●</b> {sum.counts.ready} ready</span>
            <span><b style={{ color: "var(--warn)" }}>●</b> {sum.counts.borderline} borderline</span>

function EditableCardRow({ card, onChange, onRemove }) {
  const [editing, setEditing] = useState(false);
  const [f, setF] = useState(card.front);
  const [b, setB] = useState(card.back);
  const [h, setH] = useState(card.hint || "");
  const [tg, setTg] = useState((card.tags || []).join(", "));
  const [imgErr, setImgErr] = useState("");
  const frontImgRef = useRef();
  const backImgRef = useRef();

  const pickImg = async (e, side) => {
    const file = e.target.files[0]; e.target.value = ""; if (!file) return;
    setImgErr("");
    try { onChange(side === "front" ? { frontImage: await fileToCompressedDataUrl(file) } : { backImage: await fileToCompressedDataUrl(file) }); }
    catch (err) { setImgErr(err.message || "Couldn't attach image."); }
  };

  const save = () => {
    if (card.type === "cloze") {
      if (!f.trim() || !hasCloze(f)) { alert("Cloze cards need {{braces}}."); return; }
      const nums = clozeNumbers(f);
      const clozeNum = nums.includes(card.clozeNum) ? card.clozeNum : (nums[0] || 1);
      onChange({ front: f.trim(), clozeNum, hint: h.trim(), tags: tg.split(",").map((x) => x.trim()).filter(Boolean) });
    } else {
      if (!f.trim()) return;
      onChange({ front: f.trim(), back: b.trim(), hint: h.trim(), tags: tg.split(",").map((x) => x.trim()).filter(Boolean) });
    }
    setEditing(false);
  };
  const cancel = () => { setF(card.front); setB(card.back); setH(card.hint || ""); setTg((card.tags || []).join(", ")); setEditing(false); };
  const toggleSuspend = (e) => { e.stopPropagation(); onChange({ suspended: !card.suspended }); };

  if (editing) {
    return (
      <div style={S.cardRow}>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6 }}>
          <input className="gen-in front" value={f} onChange={(e) => setF(e.target.value)}
                 placeholder={card.type === "cloze" ? "Text with {{c1::blank}}" : "Front"} />
          {card.type !== "cloze" && <input className="gen-in back" value={b} onChange={(e) => setB(e.target.value)} placeholder="Back" />}
          <input className="gen-in" value={h} onChange={(e) => setH(e.target.value)} placeholder="hint (optional)" style={{ fontSize: 13 }} />
          <input className="gen-in" value={tg} onChange={(e) => setTg(e.target.value)} placeholder="tags, comma, separated" style={{ fontSize: 13 }} />

          {/* Image attach controls — for both sides */}
          <div style={S.imgRow}>
            <div style={S.imgSlot}>
              <div style={S.hint}>Front image</div>
              {card.frontImage
                ? <div style={S.imgPreviewWrap}>
                    <img src={card.frontImage} alt="front" style={S.imgPreview} />
                    <button className="icon danger" title="remove" onClick={() => onChange({ frontImage: null })}>✕</button>
                  </div>
                : <button className="ghost" onClick={() => frontImgRef.current.click()}>📷 Attach</button>}
              <input ref={frontImgRef} type="file" accept="image/*" hidden onChange={(e) => pickImg(e, "front")} />
            </div>
            {card.type !== "cloze" && (
              <div style={S.imgSlot}>
                <div style={S.hint}>Back image</div>
                {card.backImage
                  ? <div style={S.imgPreviewWrap}>
                      <img src={card.backImage} alt="back" style={S.imgPreview} />
                      <button className="icon danger" title="remove" onClick={() => onChange({ backImage: null })}>✕</button>
                    </div>
                  : <button className="ghost" onClick={() => backImgRef.current.click()}>📷 Attach</button>}
                <input ref={backImgRef} type="file" accept="image/*" hidden onChange={(e) => pickImg(e, "back")} />
              </div>
            )}
          </div>
          {imgErr && <div style={S.errorBox}>{imgErr}</div>}

          {/* Audio attach — file or recording */}
          <div style={S.imgRow}>
            <AudioAttach label="Front audio" value={card.frontAudio} onChange={(v) => onChange({ frontAudio: v })} />
            {card.type !== "cloze" && (
              <AudioAttach label="Back audio" value={card.backAudio} onChange={(v) => onChange({ backAudio: v })} />
            )}
          </div>

          <div style={{ display: "flex", gap: 6 }}>
            <button className="primary" onClick={save} style={{ padding: "6px 14px" }}>Save</button>
            <button className="ghost" onClick={cancel} style={{ padding: "6px 14px" }}>Cancel</button>
          </div>
        </div>
      </div>
    );
  }

  const faces = card.type === "cloze" ? clozeCardFaces(card) : { front: card.front, back: card.back };
  const leech = isLeech(card);
  return (
    <div style={{ ...S.cardRow, opacity: card.suspended ? 0.5 : 1 }}>
      <div style={{ flex: 1, cursor: "pointer" }} onClick={() => setEditing(true)} title="click to edit">
        <div style={S.cf}>
          <MathText text={faces.front} />
          <span style={S.typeTag}>{card.type}{card.type === "cloze" && card.clozeNum ? "·c" + card.clozeNum : ""}{card.reverseOf ? "·rev" : ""}</span>
          <PhaseBadge card={card} />
          {leech && <span style={{ ...S.tag, background: "var(--warn-bg)", color: "var(--warn-text)" }}>🐛 leech</span>}
          {card.suspended && <span style={{ ...S.tag, background: "var(--surface-2)", color: "var(--muted)" }}>suspended</span>}
          {(card.frontImage || card.backImage) && <span style={S.tag} title="has images">🖼️</span>}
          {(card.frontAudio || card.backAudio) && <span style={S.tag} title="has audio">🔊</span>}
        </div>
        {card.frontImage && <img src={card.frontImage} alt="front" style={S.cardRowThumb} />}
        {card.frontAudio && <button className="ghost" style={{ padding: "3px 9px", fontSize: 12, marginTop: 4 }} onClick={(e) => { e.stopPropagation(); playAudio(card.frontAudio); }}>▶ front audio</button>}
        <div style={S.cb}><MathText text={faces.back} /></div>
        {card.backImage && <img src={card.backImage} alt="back" style={S.cardRowThumb} />}
        {card.backAudio && <button className="ghost" style={{ padding: "3px 9px", fontSize: 12, marginTop: 4 }} onClick={(e) => { e.stopPropagation(); playAudio(card.backAudio); }}>▶ back audio</button>}
        {card.hint && <div style={{ ...S.cb, fontStyle: "italic", color: "var(--muted2)" }}>💡 {card.hint}</div>}
        {card.tags && card.tags.length > 0 && (
          <div style={S.tagRow}>{card.tags.map((t) => <span key={t} style={S.tag}>{t}</span>)}</div>
        )}
      </div>
      <button className="icon" title={card.suspended ? "unsuspend" : "suspend"} onClick={toggleSuspend}>{card.suspended ? "▶" : "⏸"}</button>
      <button className="icon" title="edit" onClick={() => setEditing(true)}>✎</button>
      <button className="icon danger" title="delete" onClick={onRemove}>✕</button>
    </div>
  );

const PHASE_META = {
  new:        { label: "new",        bg: "var(--accent-bg)",  fg: "var(--accent)" },
  learning:   { label: "learning",   bg: "var(--warn-bg)",    fg: "var(--warn-text)" },
  relearning: { label: "relearning", bg: "var(--danger-bg)",  fg: "var(--danger-text)" },
  review:     { label: "review",     bg: "var(--success-bg)", fg: "var(--success-text)" },
};
function PhaseBadge({ card }) {
  const meta = PHASE_META[card.phase || "new"] || PHASE_META.new;
  return <span style={{ ...S.phaseBadge, background: meta.bg, color: meta.fg }}>{meta.label}</span>;
}

/* ---------------- STUDY ---------------- */
const DEFAULT_NEW_PER_DAY = 20;
function buildQueue(deck, mode, settings) {
  const now = Date.now();
  let cards = deck.cards.filter((c) => !c.suspended).slice();
  if (mode === "due") {
    cards = cards.filter((c) => !c.due || c.due <= now);
    const limit = deck.newPerDay || settings.newPerDay || DEFAULT_NEW_PER_DAY;
    const fresh = cards.filter((c) => (c.reps || 0) === 0);
    const seen = cards.filter((c) => (c.reps || 0) > 0);
    cards = seen.concat(fresh.slice(0, limit));
  } else if (mode === "focus") {
    cards = cards.filter((c) => masteryOf(c) < 0.5);
  } else if (mode === "examprep") {
    const days = daysUntil(deck.examDate);
    const rank = { notlearned: 0, atrisk: 1, borderline: 2, ready: 3 };
    cards = cards
      .map((c) => ({ c, st: examReadyState(c, days == null ? 0 : days) }))
      .filter((x) => x.st !== "ready")
      .sort((a, b) => rank[a.st] - rank[b.st])
      .map((x) => x.c);
    return cards.map((c) => c.id);
  }

  const rankPhase = (c) => {
    const p = c.phase || "new";
    if (p === "learning" || p === "relearning") return 0;
    if (p === "review") return 1;
    return 2;
  };
  cards.sort((a, b) => {
    const ra = rankPhase(a), rb = rankPhase(b);
    if (ra !== rb) return ra - rb;
    return (a.due || 0) - (b.due || 0);
  });
  return cards.map((c) => c.id);
}

function Study({ deck, mode, settings, onSave, onLog, onUndo, onTutorUsed, onDone }) {
  const [session] = useState(() => {
    const byId = {};
    deck.cards.forEach((c) => { byId[c.id] = { ...c }; });
    return { byId };
  });
  // stop any audio/TTS when this study session unmounts
  useEffect(() => () => stopAllPlayback(), []);
  const [queue, setQueue] = useState(() => buildQueue(deck, mode, settings));
  const [flipped, setFlipped] = useState(false);
  const [help, setHelp] = useState(null);
  const [tutor, setTutor] = useState(null);
  const [lookup, setLookup] = useState(null);
  const [doneCount, setDoneCount] = useState(0);
  const [sessionXp, setSessionXp] = useState(0);
  const [showHint, setShowHint] = useState(false);
  const [typeMode, setTypeMode] = useState(!!settings.typeAnswer);
  const [typed, setTyped] = useState("");
  const [typedResult, setTypedResult] = useState(null);
  const [mcMode, setMcMode] = useState(false);
  const [mc, setMc] = useState(null);
  const [history, setHistory] = useState([]); // [{cardId, prevState, queueBefore}]
  const [swipeHint, setSwipeHint] = useState(null); // live grade label during a swipe
  const [editing, setEditing] = useState(false);    // inline "fix this card" overlay
  const [, forceTick] = useState(0);                 // re-render after mutating session.byId
  const burySiblings = useRef(new Set()); // noteIds buried in this session
  const shownAt = useRef(Date.now());
  const grading = useRef(false);
  const touch = useRef(null); // { x, y, moved }
  const lastTouchEnd = useRef(0); // timestamp, to suppress the synthetic click after a tap

  const curId = queue[0];
  const card = curId ? session.byId[curId] : null;
  useEffect(() => {
    shownAt.current = Date.now();
    setFlipped(false); setHelp(null); setTutor(null); setLookup(null);
    setShowHint(false); setTyped(""); setTypedResult(null); setMc(null); setSwipeHint(null); setEditing(false);
    // auto-play front: prefer attached audio, fall back to TTS
    if (card && settings.ttsAuto) {
      if (card.frontAudio) playAudio(card.frontAudio);
      else speak(viewCard(card).front);
    }
  }, [curId]);

  // when the answer is revealed, auto-play the back's audio if it has any
  useEffect(() => {
    if (flipped && card && settings.ttsAuto && card.backAudio) playAudio(card.backAudio);
    // eslint-disable-next-line
  }, [flipped]);

  const cram = mode === "cram";

  const askHelp = async (opt) => {
    setHelp({ title: opt.title, loading: true });
    try { setHelp({ title: opt.title, text: await callAI(opt.prompt(viewCard(card))) }); }
    catch { setHelp({ title: opt.title, text: "Couldn't reach the AI right now." }); }
  };
  const askTutor = async () => {
    setTutor({ loading: true });
    try {
      const vc = viewCard(card);
      const text = await callAI(`A student just got this flashcard WRONG. Teach it so they understand and remember — explain WHY the answer is what it is, not just restate it. Add one concrete example. Keep it under 5 sentences, warm and clear, no preamble.\n\nFront: ${vc.front}\nAnswer: ${vc.back}`);
      setTutor({ text });
      if (onTutorUsed) onTutorUsed();
    } catch { setTutor({ text: "Couldn't reach the AI right now." }); }
  };
  const lookupWord = async (raw) => {
    const word = cleanWord(raw); if (!word) return;
    setLookup({ word, loading: true });
    try {
      const text = await callAI(`Look up "${word}" (any language). If not English, identify language + English meaning. Respond EXACTLY:\nDefinition: <one concise English sentence>\nSynonyms: <3-5 comma-separated, or "none">`);
      setLookup({ word, text });
    } catch { setLookup({ word, text: "Couldn't look that up right now." }); }
  };

  // ---- AI multiple-choice mode ----
  const buildMC = async () => {
    setMc({ loading: true });
    try {
      const vc = viewCard(card);
      const txt = await callAI(
        `Generate 3 PLAUSIBLE BUT WRONG short answers for this flashcard. ` +
        `They must be the SAME type/category as the correct answer and similar in length and style — never unrelated, never near-duplicates of the correct one. ` +
        `Return ONLY a JSON array of 3 strings, no preamble.\n\nFront: ${vc.front}\nCorrect answer: ${vc.back}`,
        { maxTokens: 400, retries: 2 }
      );
      let arr = extractJSONArray(txt) || [];
      const distractors = cleanDistractorList(arr, vc.back);
      if (distractors.length < 3) { setMc({ error: true }); return; }
      const opts = [vc.back, ...distractors.slice(0, 3)];
      for (let i = opts.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [opts[i], opts[j]] = [opts[j], opts[i]]; }
      setMc({ options: opts, correct: vc.back, picked: null });
    } catch { setMc({ error: true }); }
  };
  useEffect(() => {
    if (mcMode && flipped === false && card && !mc) buildMC();
    // eslint-disable-next-line
  }, [mcMode, card]);

  const grade = (q) => {
    if (grading.current) return;
    if (!card) return;
    grading.current = true;

    // snapshot state for undo
    const prevState = { ...session.byId[card.id] };
    setHistory((h) => [...h, { cardId: card.id, prev: prevState, queueBefore: queue.slice(), q }].slice(-30));

    const ms = Date.now() - shownAt.current;
    const proj = project(card)[q];

    const np = proj.next.phase;
    const requeue = cram
      ? q === 0
      : ((np === "learning" || np === "relearning") && proj.ms < 20 * MIN);

    if (!cram) {
      const updated = applyGrade(card, q);
      session.byId[card.id] = updated;
      const freshCards = deck.cards.map((c) => session.byId[c.id] || c);
      onSave({ ...deck, cards: freshCards });
    }
    onLog({ t: Date.now(), cardId: card.id, deckId: deck.id, q, ms });

    setDoneCount((n) => n + 1);
    setSessionXp((x) => x + (XP_PER_GRADE[q] || 0));

    // bury sibling cards from the same note for the rest of this session
    if (card.noteId) burySiblings.current.add(card.noteId);

    setQueue((prevQ) => {
      let rest = prevQ.slice(1);
      // remove sibling cards (same noteId) from the remaining queue
      if (card.noteId) {
        rest = rest.filter((id) => {
          const c = session.byId[id];
          return !(c && c.noteId === card.noteId);
        });
      }
      return requeue ? [...rest, prevQ[0]] : rest;
    });

    grading.current = false;
  };

  const undo = () => {
    if (!history.length) return;
    const last = history[history.length - 1];
    setHistory((h) => h.slice(0, -1));
    // restore card state
    session.byId[last.cardId] = last.prev;
    const freshCards = deck.cards.map((c) => session.byId[c.id] || c);
    onSave({ ...deck, cards: freshCards });
    // restore the log entry
    if (onUndo) onUndo();
    // rebuild queue
    setQueue(last.queueBefore);
    setDoneCount((n) => Math.max(0, n - 1));
    setSessionXp((x) => Math.max(0, x - (XP_PER_GRADE[last.q] || 0)));
  };

  // type-mode answer check
  const submitTyped = () => {
    if (!card) return;
    const expected = card.type === "cloze" ? clozeExpectedAnswer(card) : card.back;
    const m = matchAnswer(typed, expected);
    setTypedResult({ ...m, expected });
    setFlipped(true);
  };

  /* ---- touch: tap card to flip, swipe to grade ----
     Mapping when flipped (chosen to match button order/colors):
       swipe left  → Again   swipe down → Hard
       swipe right → Good     swipe up   → Easy
     A swipe must travel > SWIPE_MIN px and be mostly along one axis.
     Word lookups call stopPropagation, so tapping a word never flips. */
  const SWIPE_MIN = 55;
  const swipeGrade = (dx, dy) => {
    if (Math.abs(dx) >= Math.abs(dy)) return dx < 0 ? 0 : 2;   // left=Again, right=Good
    return dy > 0 ? 1 : 3;                                     // down=Hard, up=Easy
  };
  const onTouchStart = (e) => {
    const t = e.touches && e.touches[0]; if (!t) return;
    // if the tap started on a word, let the word handle it — the card stays put
    const onWord = e.target && e.target.closest && e.target.closest(".word, .audio-play, .hint-btn, button, a, input, textarea");
    touch.current = { x: t.clientX, y: t.clientY, moved: false, ignore: !!onWord };
  };
  const onTouchMove = (e) => {
    if (!touch.current || touch.current.ignore) return;
    const t = e.touches && e.touches[0]; if (!t) return;
    const dx = t.clientX - touch.current.x, dy = t.clientY - touch.current.y;
    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) touch.current.moved = true;
    // live hint only matters once the answer is visible
    if (flipped && (Math.abs(dx) > 20 || Math.abs(dy) > 20)) {
      setSwipeHint(["Again", "Hard", "Good", "Easy"][swipeGrade(dx, dy)]);
    } else if (swipeHint) setSwipeHint(null);
  };
  const onTouchEnd = (e) => {
    const start = touch.current; touch.current = null;
    if (!start) return;
    setSwipeHint(null);
    lastTouchEnd.current = Date.now(); // so the synthetic mouse-click that follows is ignored
    if (start.ignore) return;          // touch began on a word/button — leave it alone
    const t = e.changedTouches && e.changedTouches[0];
    const dx = t ? t.clientX - start.x : 0, dy = t ? t.clientY - start.y : 0;
    const dist = Math.hypot(dx, dy);
    // a tap (no real movement) flips the card from the front
    if (!start.moved && dist < 12) {
      if (!flipped && !typeMode && !mcMode) setFlipped(true);
      return;
    }
    // a swipe grades, but only once flipped and not in type/MC mode
    if (flipped && !mcMode && !typeMode && dist >= SWIPE_MIN) grade(swipeGrade(dx, dy));
  };
  // mouse click flips the card (front → answer). Touch is handled above, so we
  // ignore the synthetic click a touchscreen fires right after a tap.
  const onCardClick = () => {
    if (Date.now() - lastTouchEnd.current < 600) return; // synthetic click from a tap
    if (!flipped && !typeMode && !mcMode) setFlipped(true);
  };

  /* ---- inline "fix this card" during study ----
     Edits the card's content (front/back/cloze text/hint) without leaving the
     session. Scheduling state (due, stability, reps…) is left untouched — this
     only fixes wording. Persists to the deck and re-renders the current face. */
  const saveEdit = (patch) => {
    if (!card) return;
    const cur = session.byId[card.id] || card;
    const next = { ...cur, ...patch };
    if (next.type === "cloze") {
      if (!next.front || !hasCloze(next.front)) { alert("Cloze cards need {{braces}} — e.g. {{c1::Paris}}."); return; }
      const nums = clozeNumbers(next.front);
      if (!nums.includes(next.clozeNum)) next.clozeNum = nums[0] || 1;
      next.back = "";
    } else {
      if (!String(next.front || "").trim()) { alert("Front can't be empty."); return; }
    }
    session.byId[card.id] = next;
    const freshCards = deck.cards.map((c) => session.byId[c.id] || c);
    onSave({ ...deck, cards: freshCards });
    setEditing(false);
    forceTick((n) => n + 1); // session.byId is mutated in place; nudge a re-render
  };

  // keyboard shortcuts
  useEffect(() => {
    const onKey = (e) => {
      if (!card) return;
      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) {
        if (typeMode && e.key === "Enter" && !flipped) { e.preventDefault(); submitTyped(); }
        return;
      }
      if (editing) return; // overlay open: let its own inputs handle keys
      if (e.key === "e" || e.key === "E") { e.preventDefault(); setEditing(true); return; }
      if (document.activeElement && document.activeElement.tagName === "BUTTON") document.activeElement.blur();
      if (!flipped) {
        if (e.key === " " || e.key === "Enter") { e.preventDefault(); setFlipped(true); }
        return;
      }
      if (e.key === "1") grade(0);
      else if (e.key === "2") grade(1);
      else if (e.key === "3" || e.key === " ") { e.preventDefault(); grade(2); }
      else if (e.key === "4") grade(3);
      else if (e.key === "u" || e.key === "U") undo();
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
    // eslint-disable-next-line
  }, [card, flipped, queue, typeMode, typed, history, editing]);

  if (!card) {
    return (
      <div className="fade" style={S.finish}>
        <div style={S.finishMark}>✓</div>

          <button className="audio-play" style={S.faceAudioBtn}

        <div style={S.tapHint}>{flipped ? "swipe to grade · tap a word to look it up" : "tap card to flip · tap a word to look it up"}</div>
        {swipeHint && <div style={S.swipeHint}>{swipeHint}</div>}
      </div>

        <StudyEditCard card={session.byId[card.id] || card} onSave={saveEdit} onCancel={() => setEditing(false)} />

        <div style={S.lookup} className="fade">
          <div style={S.lookupHead}><span style={S.lookupWord}>{lookup.word}</span>

        <div style={S.typeBox}>
          <input className="ta" autoFocus value={typed} onChange={(e) => setTyped(e.target.value)} placeholder="Type your answer…"

        </div>
      )}

      {!flipped && mcMode && (
        <div style={S.mcBox}>
          {!mc || mc.loading ? <div style={S.muted2}>generating options…</div>
            : mc.error ? <div style={S.errorBox}>Couldn't build MC options. Flip the card normally.</div>
            : (
              <div className="mc-grid" style={S.mcGrid}>
                {mc.options.map((o, i) => (

                          disabled={mc.picked != null}

                    {o}

      {flipped && typedResult && (

          }
        </div>
      )}

      {!flipped ? (
        !typeMode && !mcMode && <button className="show" onClick={() => setFlipped(true)}>Show answer</button>
      ) : (
        <>
          <div style={S.helpRow}>
            {HELP_OPTIONS.map((opt) => (
              <button key={opt.key} className="help" onClick={() => askHelp(opt)} disabled={help && help.loading}>{opt.label}</button>
            ))}
          </div>
          {help && (
            <div style={S.example} className="fade"><span style={S.exLabel}>{help.title}</span>
              {help.loading ? <span style={S.muted2}>thinking…</span> : help.text}</div>
          )}

          {tutor && (
            <div style={S.tutor} className="fade"><span style={S.tutorLabel}>tutor</span>
              {tutor.loading ? <span style={S.muted2}>teaching…</span> : tutor.text}</div>
          )}

          <div className="swipe-legend" style={S.swipeLegend}>swipe ← Again · ↓ Hard · ↑ Easy · → Good</div>
          <div style={S.gradeRow}>
            <button className="grade again" onClick={() => grade(0)}>
              <span className="gl">Again</span><span className="gi">{cram ? "retry" : fmtInterval(proj[0].ms)}</span></button>
            <button className="grade hard" onClick={() => grade(1)}>
              <span className="gl">Hard</span><span className="gi">{cram ? "" : fmtInterval(proj[1].ms)}</span></button>
            <button className="grade good" onClick={() => grade(2)}>
              <span className="gl">Good</span><span className="gi">{cram ? "" : fmtInterval(proj[2].ms)}</span></button>
            <button className="grade easy" onClick={() => grade(3)}>
              <span className="gl">Easy</span><span className="gi">{cram ? "" : fmtInterval(proj[3].ms)}</span></button>

          {failedRecently && !tutor && (
            <button className="tutor-btn" onClick={askTutor}>Didn't get it? Teach me this →</button>
          )}
        </>
      )}
    </div>
  );
}

function viewCard(card) {
  if (card.type === "cloze") return clozeCardFaces(card);
  return { front: card.front, back: card.back };
}
