/* ---------- shared: pull JSON object out of a model reply ---------- */
function extractJSONObject(text) {
  if (!text) return null;
  let t = String(text).trim().replace(/^```(?:json)?/i, "").replace(/```$/i, "").trim();
  const s = t.indexOf("{"), e = t.lastIndexOf("}");
  if (s === -1 || e === -1 || e < s) return null;
  try { return JSON.parse(t.slice(s, e + 1)); } catch { return null; }
}


/* Minimal, safe markdown -> HTML for AI-generated study guides.
   Escapes HTML first, then renders headings, bold/italic, and bullet/number lists. */
function mdToHtml(md) {
  const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const inline = (s) => esc(s)
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>")
    .replace(/`([^`]+)`/g, "<code>$1</code>");
  const lines = String(md || "").split("\n");
  let html = "", listType = null;
  const closeList = () => { if (listType) { html += `</${listType}>`; listType = null; } };
  for (let raw of lines) {
    const line = raw.replace(/\s+$/, "");
    let m;
    if ((m = line.match(/^\s*#{3,}\s+(.*)/))) { closeList(); html += `<h4>${inline(m[1])}</h4>`; }
    else if ((m = line.match(/^\s*##\s+(.*)/))) { closeList(); html += `<h3>${inline(m[1])}</h3>`; }
    else if ((m = line.match(/^\s*#\s+(.*)/))) { closeList(); html += `<h2>${inline(m[1])}</h2>`; }
    else if ((m = line.match(/^\s*[-*•]\s+(.*)/))) { if (listType !== "ul") { closeList(); html += "<ul>"; listType = "ul"; } html += `<li>${inline(m[1])}</li>`; }
    else if ((m = line.match(/^\s*\d+[.)]\s+(.*)/))) { if (listType !== "ol") { closeList(); html += "<ol>"; listType = "ol"; } html += `<li>${inline(m[1])}</li>`; }
    else if (line.trim() === "") { closeList(); }
    else { closeList(); html += `<p>${inline(line)}</p>`; }
  }
  closeList();
  return html;
}

/* =========================================================
   0) LECTURE RECORDER — hear a lecture live, transcribe every word,
   then turn the transcript into a study guide or flashcards.
   Uses the browser SpeechRecognition API for on-device live captions.
   ========================================================= */
function LectureRecorder({ onSave, onCancel }) {
  const supported = typeof window !== "undefined" &&
    (window.SpeechRecognition || window.webkitSpeechRecognition);

  const [recording, setRecording] = useState(false);
  const [paused, setPaused] = useState(false);
  const [finalText, setFinalText] = useState("");     // committed transcript
  const [interim, setInterim] = useState("");         // live, not-yet-final words
  const [elapsed, setElapsed] = useState(0);
  const [phase, setPhase] = useState("record");       // record | building | result
  const [buildKind, setBuildKind] = useState("");     // guide | cards
  const [error, setError] = useState("");
  const [guide, setGuide] = useState("");
  const [cards, setCards] = useState([]);
  const [title, setTitle] = useState("");
  const [subject, setSubject] = useState("");
  const usage = useUsage();

  const recogRef = useRef(null);
  const wantOnRef = useRef(false);     // should we keep restarting (Chrome stops every ~minute)
  const timerRef = useRef(null);
  const startedAtRef = useRef(0);
  const baseElapsedRef = useRef(0);
  const finalRef = useRef("");

  useEffect(() => () => { stopAll(); }, []);

  function startTimer() {
    if (timerRef.current) clearInterval(timerRef.current); // never stack timers
    startedAtRef.current = Date.now();
    timerRef.current = setInterval(() => {
      setElapsed(baseElapsedRef.current + Math.floor((Date.now() - startedAtRef.current) / 1000));
    }, 500);
  }
  function pauseTimer() {
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
    baseElapsedRef.current += Math.floor((Date.now() - startedAtRef.current) / 1000);
  }

  function makeRecognizer() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = (navigator.language || "en-US");
    r.onresult = (e) => {
      let interimStr = "";
      let added = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const res = e.results[i];
        if (res.isFinal) added += res[0].transcript;
        else interimStr += res[0].transcript;
      }
      if (added) {
        finalRef.current = (finalRef.current + " " + added).replace(/\s+/g, " ").trim();
        setFinalText(finalRef.current);
      }
      setInterim(interimStr);
    };
    r.onerror = (ev) => {
      if (ev.error === "not-allowed" || ev.error === "service-not-allowed") {
        setError("Microphone access was blocked. Allow the mic and try again.");
        wantOnRef.current = false; setRecording(false); pauseTimer();
      }
      // "no-speech"/"aborted"/"network" are transient — onend will restart if wanted
    };
    r.onend = () => {
      // Chrome ends the session periodically — restart if we still want to record.
      // small delay avoids an "already started" race on rapid restarts.
      if (wantOnRef.current) { setTimeout(() => { if (wantOnRef.current && recogRef.current === r) { try { r.start(); } catch (e) {} } }, 250); }
    };
    return r;
  }

  async function startRec() {
    setError("");
    if (!supported) { setError("Live transcription isn't supported in this browser. Try Chrome on desktop or Android."); return; }
    try {
      // prompt for mic permission up front for a clear UX
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        s.getTracks().forEach((t) => t.stop());
      }
    } catch (e) {
      setError("Microphone access was blocked. Allow the mic and try again."); return;
    }
    recogRef.current = makeRecognizer();
    wantOnRef.current = true;
    try { recogRef.current.start(); } catch (e) {}
    setRecording(true); setPaused(false); startTimer();
  }

  function pauseRec() {
    wantOnRef.current = false;
    if (recogRef.current) { try { recogRef.current.stop(); } catch (e) {} }
    setPaused(true); setRecording(false); pauseTimer(); setInterim("");
  }
  function resumeRec() {
    setError("");
    recogRef.current = makeRecognizer();
    wantOnRef.current = true;
    try { recogRef.current.start(); } catch (e) {}
    setRecording(true); setPaused(false); startTimer();
  }
  function stopAll() {
    wantOnRef.current = false;
    if (recogRef.current) { try { recogRef.current.stop(); } catch (e) {} recogRef.current = null; }
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
  }
  function finishRec() {
    stopAll(); setRecording(false); setPaused(false); setInterim("");
  }
  function reset() {
    finishRec();
    finalRef.current = ""; setFinalText(""); setInterim(""); setElapsed(0);
    baseElapsedRef.current = 0; setError(""); setPhase("record"); setGuide(""); setCards([]);
  }

  const wordCount = finalText ? finalText.trim().split(/\s+/).length : 0;
  const mmss = (s) => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;

  async function build(kind) {
    const transcript = finalRef.current.trim();
    if (transcript.length < 40) { setError("The transcript is too short. Record a bit more of the lecture first."); return; }
    finishRec();
    setError(""); setPhase("building"); setBuildKind(kind);
    try {
      // get a title/subject once
      if (!title) {
        try {
          const meta = await callAI(
`Give a short title and one-word subject for a lecture with this transcript start:\n"""${transcript.slice(0, 500)}"""\nReturn ONLY JSON: {"title":"...","subject":"..."}`,
            { maxTokens: 200 });
          const m = extractJSONObject(meta);
          if (m) { setTitle(m.title || "Lecture"); setSubject(m.subject || ""); }
        } catch (e) {}
      }
      const chunk = transcript.slice(0, 5000); // keep prompt within limits
      if (kind === "guide") {
        const g = await callAI(
`You are a study assistant. Turn this lecture transcript into a clear, well-structured study guide a student can revise from.
Use markdown: a short overview, then sections with ## headings, bullet points for key facts, **bold** for key terms, and a "Key takeaways" list at the end. Be accurate to the transcript; fix obvious speech-to-text errors silently.

Transcript:
"""${chunk}"""`,
          { maxTokens: 1400 });
        setGuide(g); setPhase("result");
      } else {
        const arr = extractJSONArray(await callAI(
`Turn this lecture transcript into study flashcards covering everything important.
Each card: concise front (question/term), concise accurate back (answer). 15-25 cards. Fix speech-to-text errors silently.
Return ONLY a JSON array, no markdown: [{"front":"...","back":"..."}]

Transcript:
"""${chunk}"""`,
          { maxTokens: 1400 })) || [];
        const clean = arr.filter((c) => c && c.front && c.back).map((c) => ({ front: String(c.front), back: String(c.back) }));
        if (!clean.length) throw new Error("Couldn't build cards from this transcript. Try recording more.");
        setCards(clean); setPhase("result");
      }
    } catch (e) {
      setError((e && e.code === "DAILY_LIMIT") ? "You've hit today's AI usage limit. It resets tomorrow." : (e && e.message) || "Couldn't process the transcript.");
      setPhase("record");
    }
  }

  function downloadGuide() {
    const blob = new Blob([guide], { type: "text/markdown" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = (title || "lecture") + " — study guide.md";
    a.click(); URL.revokeObjectURL(a.href);
  }

  // ---------- RESULT ----------
  if (phase === "result") {
    return (
      <div className="fade">
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
          <button className="ghost" onClick={() => setPhase("record")}>← Back to transcript</button>
          <h1 className="app-h1" style={S.h1}>{buildKind === "guide" ? "Study guide" : "Flashcards"}</h1>
        </div>
        <p style={S.sub}>{title || "Lecture"}{subject ? " · " + subject : ""} · from {wordCount.toLocaleString()} words</p>

        {buildKind === "guide" ? (
          <>
            <div className="panel-box" style={S.panelBox}>
              <div className="lecture-guide" dangerouslySetInnerHTML={{ __html: mdToHtml(guide) }} />
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <button className="primary" onClick={downloadGuide}>⬇ Download .md</button>
              <button className="ghost" onClick={() => build("cards")}>Also make flashcards →</button>
              <button className="ghost" onClick={reset}>New recording</button>
            </div>
          </>
        ) : (
          <>
            <div className="panel-box" style={S.panelBox}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                <div style={S.panelTitle}>{cards.length} flashcards ready</div>
                <button className="primary" onClick={() => onSave(title || "Lecture", cards, subject)}>Save as deck →</button>
              </div>
              <div style={{ marginTop: 8, maxHeight: 320, overflowY: "auto" }}>
                {cards.map((c, i) => (
                  <div key={i} style={S.aiCardPeek}>
                    <div style={{ fontWeight: 600, fontSize: 14 }}>{c.front}</div>
                    <div style={{ ...S.hint, marginTop: 2 }}>{c.back}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <button className="ghost" onClick={() => build("guide")}>Make a study guide instead →</button>
              <button className="ghost" onClick={reset}>New recording</button>
            </div>
          </>
        )}
      </div>
    );
  }

  // ---------- BUILDING ----------
  if (phase === "building") {
    return (
      <div className="fade">
        <h1 className="app-h1" style={S.h1}>Working…</h1>
        <div className="panel-box" style={{ ...S.panelBox, textAlign: "center" }}>
          <div className="splash-spin" style={{ margin: "6px auto 12px" }} />
          <div style={{ fontWeight: 600 }}>{buildKind === "guide" ? "Writing your study guide…" : "Building your flashcards…"}</div>
          <div style={S.hint}>Reading {wordCount.toLocaleString()} words of transcript.</div>
        </div>
      </div>
    );
  }

  // ---------- RECORD ----------
  return (
    <div className="fade">
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
        <button className="ghost" onClick={() => { finishRec(); onCancel(); }}>← Back</button>
        <h1 className="app-h1" style={S.h1}>Record a lecture</h1>
      </div>
      <p style={S.sub}>Kioku listens and writes down every word live. When you're done, turn the transcript into a study guide or flashcards.</p>

      {!supported && <div style={S.errorBox}>Live transcription needs the Web Speech API — it works in Chrome (desktop &amp; Android) and Edge. On unsupported browsers you can still paste notes via “From notes / PDF”.</div>}
      {!WORKER_CONFIGURED && <div style={S.errorBox}>AI isn't connected. Set your Worker URL to turn transcripts into study material.</div>}
      {error && <div style={S.errorBox}>{error}</div>}

      <div className="panel-box" style={{ ...S.panelBox, textAlign: "center" }}>
        <div className={"rec-orb" + (recording ? " live" : "")}>
          <span className="rec-dot" />
          <span className="rec-time">{mmss(elapsed)}</span>
        </div>
        <div style={{ ...S.hint, marginTop: 4 }}>
          {recording ? "Listening… keep this tab open and in focus." : paused ? "Paused" : "Ready when you are."} · {wordCount.toLocaleString()} words
        </div>
        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 14, flexWrap: "wrap" }}>
          {!recording && !paused && <button className="primary" disabled={!supported} onClick={startRec}>● Start recording</button>}
          {recording && <button className="danger-btn" onClick={pauseRec}>❚❚ Pause</button>}
          {paused && <button className="primary" onClick={resumeRec}>● Resume</button>}
          {(recording || paused) && <button className="ghost" onClick={finishRec}>■ Stop</button>}
          {(finalText || paused) && <button className="ghost" onClick={reset}>Clear</button>}
        </div>
      </div>

      <div className="panel-box" style={S.panelBox}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={S.panelTitle}>Live transcript</div>
          <span style={S.hint}>{wordCount.toLocaleString()} words</span>
        </div>
        <div className="lecture-transcript">
          {finalText || interim ? (
            <>{finalText} <span className="lecture-interim">{interim}</span></>
          ) : (
            <span style={S.hint}>Your transcript will appear here, word by word, as you record…</span>
          )}
        </div>
        <textarea className="ta" style={{ marginTop: 8, minHeight: 70 }} placeholder="Or paste / fix transcript text here"
          value={finalText} onChange={(e) => { finalRef.current = e.target.value; setFinalText(e.target.value); }} />
      </div>

      <div className="panel-box" style={S.panelBox}>
        <div style={S.panelTitle}>Turn it into study material</div>
        <div style={{ display: "flex", gap: 8, marginTop: 6, flexWrap: "wrap", alignItems: "center" }}>
          <button className="primary" disabled={!WORKER_CONFIGURED || wordCount < 8} onClick={() => build("guide")}>📝 Study guide</button>
          <button className="primary" disabled={!WORKER_CONFIGURED || wordCount < 8} onClick={() => build("cards")}>🃏 Flashcards</button>
          <div style={{ marginLeft: "auto" }}><UsageBar usage={usage} compact /></div>
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   1) AI CONTENT IMPORT  (YouTube + website links)
   ========================================================= */
/* --- fetch real content for link import (transcript / page text) --- */
function ytVideoId(url) {
  const u = String(url).trim();
  let m = u.match(/[?&]v=([\w-]{11})/) || u.match(/youtu\.be\/([\w-]{11})/) ||
          u.match(/youtube\.com\/(?:embed|shorts|live)\/([\w-]{11})/);
  return m ? m[1] : null;
}
// Try several CORS-friendly readers; return plain text or "".
async function fetchViaProxies(targetUrl, { json = false } = {}) {
  const encoded = encodeURIComponent(targetUrl);
  const candidates = [
    "https://api.allorigins.win/raw?url=" + encoded,
    "https://corsproxy.io/?url=" + encoded,
    "https://thingproxy.freeboard.io/fetch/" + targetUrl,
    "https://r.jina.ai/" + targetUrl, // returns clean readable text/markdown
  ];
  for (const c of candidates) {
    try {
      const res = await fetch(c, { headers: { "Accept": json ? "application/json,*/*" : "text/plain,*/*" } });
      if (!res.ok) continue;
      const txt = await res.text();
      if (txt && txt.length > 20) return txt;
    } catch (e) {}
  }
  return "";
}
// Pull a YouTube transcript by reading the watch page for caption tracks, then the timedtext XML.
async function fetchYouTubeTranscript(url) {
  const id = ytVideoId(url);
  if (!id) return { text: "", title: "" };
  let title = "";
  // 1) try r.jina.ai on the watch page — it often returns the transcript + title inline
  try {
    const page = await fetchViaProxies("https://www.youtube.com/watch?v=" + id);
    if (page) {
      const tm = page.match(/"title":"([^"]{3,200})"/) || page.match(/<title>([^<]+)<\/title>/);
      if (tm) title = tm[1].replace(/\s*-\s*YouTube\s*$/, "").trim();
      // find caption track baseUrl
      const trackMatch = page.match(/"captionTracks":(\[.*?\])/);
      if (trackMatch) {
        let tracks = null;
        try { tracks = JSON.parse(trackMatch[1].replace(/\\u0026/g, "&").replace(/\\\//g, "/")); } catch (e) {}
        if (tracks && tracks.length) {
          const track = tracks.find((t) => /en/i.test(t.languageCode)) || tracks[0];
          if (track && track.baseUrl) {
            const xml = await fetchViaProxies(track.baseUrl.replace(/\\u0026/g, "&"));
            const text = ttXmlToText(xml);
            if (text) return { text, title };
          }
        }
      }
      // some readers return the transcript as readable lines already
      if (/transcript/i.test(page) && page.length > 1500) {
        const stripped = page.replace(/\[[0-9:]+\]/g, " ").replace(/\s+/g, " ").trim();
        if (stripped.length > 600) return { text: stripped.slice(0, 5600), title };
      }
    }
  } catch (e) {}
  // 2) direct timedtext endpoints
  for (const u of [
    `https://video.google.com/timedtext?lang=en&v=${id}`,
    `https://www.youtube.com/api/timedtext?lang=en&v=${id}`,
  ]) {
    try {
      const xml = await fetchViaProxies(u);
      const text = ttXmlToText(xml);
      if (text) return { text, title };
    } catch (e) {}
  }
  return { text: "", title };
}
function ttXmlToText(xml) {
  if (!xml || xml.indexOf("<text") === -1) return "";
  const parts = [];
  const re = /<text[^>]*>([\s\S]*?)<\/text>/g; let m;
  while ((m = re.exec(xml)) !== null) {
    let s = m[1].replace(/&amp;/g, "&").replace(/&#39;/g, "'").replace(/&quot;/g, '"')
      .replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/<[^>]+>/g, "").replace(/\s+/g, " ").trim();
    if (s) parts.push(s);
  }
  return parts.join(" ").trim();
}
// Strip a fetched HTML page down to readable text.
function htmlToText(html) {
  if (!html) return "";
  // r.jina.ai already returns clean text/markdown
  if (!/[<][a-z!]/i.test(html.slice(0, 200))) return html.replace(/\s+\n/g, "\n").trim();
  let h = html
    .replace(/<script[\s\S]*?<\/script>/gi, " ")
    .replace(/<style[\s\S]*?<\/style>/gi, " ")
    .replace(/<noscript[\s\S]*?<\/noscript>/gi, " ")
    .replace(/<header[\s\S]*?<\/header>/gi, " ")
    .replace(/<footer[\s\S]*?<\/footer>/gi, " ")
    .replace(/<nav[\s\S]*?<\/nav>/gi, " ");
  h = h.replace(/<\/(p|div|li|h[1-6]|br|tr)>/gi, "\n").replace(/<[^>]+>/g, " ");
  h = h.replace(/&nbsp;/g, " ").replace(/&amp;/g, "&").replace(/&#39;/g, "'")
    .replace(/&quot;/g, '"').replace(/&lt;/g, "<").replace(/&gt;/g, ">");
  return h.replace(/[ \t]+/g, " ").replace(/\n{3,}/g, "\n\n").trim();
}
function pageTitleFromHtml(html) {
  if (!html) return "";
  const m = html.match(/<title[^>]*>([^<]+)<\/title>/i);
  return m ? m[1].trim() : "";
}

function AIImport({ onSave, onCancel }) {
  const [url, setUrl] = useState("");
  const [topic, setTopic] = useState("");
  const [status, setStatus] = useState("idle"); // idle | working | done | error
  const [step, setStep] = useState("");
  const [error, setError] = useState("");
  const [result, setResult] = useState(null); // { name, subject, summary, topics[], cards[], quiz[] }
  const usage = useUsage();

  const kind = (() => {
    const u = url.trim().toLowerCase();
    if (/youtube\.com|youtu\.be/.test(u)) return "youtube";
    if (/^https?:\/\//.test(u) || /\.[a-z]{2,}\//.test(u) || /\.[a-z]{2,}$/.test(u)) return "website";
    return "";
  })();

  async function run() {
    setError(""); setResult(null);
    let src = url.trim();
    if (!src) { setError("Paste a YouTube or website link first."); return; }
    // add a scheme if the user pasted a bare domain so fetches resolve
    if (!/^https?:\/\//i.test(src) && kind) src = "https://" + src.replace(/^\/+/, "");
    setStatus("working");
    try {
      // 0) ACTUALLY FETCH THE CONTENT — this is what was missing.
      let sourceText = "", fetchedTitle = "";
      if (kind === "youtube") {
        setStep("Fetching the video transcript…");
        const r = await fetchYouTubeTranscript(src);
        sourceText = r.text || ""; fetchedTitle = r.title || "";
        if (!sourceText) {
          // last resort: try reading the page text for description/title
          const page = await fetchViaProxies("https://r.jina.ai/https://www.youtube.com/watch?v=" + (ytVideoId(src) || ""));
          sourceText = htmlToText(page).slice(0, 5600);
        }
      } else {
        setStep("Fetching the page…");
        const raw = await fetchViaProxies(src);
        fetchedTitle = pageTitleFromHtml(raw);
        sourceText = htmlToText(raw).slice(0, 5600);
      }

      const haveContent = sourceText && sourceText.replace(/\s+/g, " ").trim().length > 200;
      if (!haveContent && kind === "youtube") {
        throw new Error("Couldn't get this video's transcript. It may have captions disabled. Try a video with captions, or paste the topic in the hint box and use “Generate with AI” instead.");
      }
      if (!haveContent && !topic) {
        throw new Error("Couldn't read that page (it may block automated access). Try another link, or add a focus hint describing what to study.");
      }

      const grounded = haveContent
        ? `Base everything ONLY on the following ${kind === "youtube" ? "video transcript" : "page content"}. Do not invent facts that aren't supported by it.\n\nCONTENT:\n"""${sourceText.slice(0, 5000)}"""`
        : `You could not read the source directly. Use the focus hint and your own knowledge of this subject; stay accurate.`;

      // 1) concepts + structure + summary  (grounded in the fetched text)
      setStep("Extracting key concepts…");
      const planPrompt =
`You are a study-material engine.${topic ? " Focus/topic hint: " + topic + "." : ""}
${grounded}

Produce a structured study pack. Return ONLY a JSON object (no markdown):
{
  "title": "<short deck name>",
  "subject": "<one or two word subject>",
  "summary": "<3-5 sentence plain-English summary of what this material covers>",
  "topics": ["<key topic 1>", "<key topic 2>", "..."],
  "explanations": [ {"topic":"<topic>","detail":"<2-3 sentence explanation a student can learn from>"} ]
}
Keep 4-8 topics. Be accurate to the content.`;
      const plan = extractJSONObject(await callAI(planPrompt, { maxTokens: 700 })) || {};
      const topics = Array.isArray(plan.topics) ? plan.topics.slice(0, 10) : [];

      // 2) flashcards grounded in the content
      setStep("Generating flashcards…");
      const cardPrompt =
`Create 18 study flashcards from this material${plan.subject ? " (subject: " + plan.subject + ")" : ""}.
${grounded}
Each card: a concise front (term or question) and a concise, accurate back (answer/definition) drawn from the content above. If mathematical, use $...$ LaTeX.
Return ONLY a JSON array, no markdown: [{"front":"...","back":"..."}]`;
      const cards = extractJSONArray(await callAI(cardPrompt, { maxTokens: 1400 })) || [];

      // 3) a short multiple-choice quiz
      setStep("Building a comprehension quiz…");
      const quizPrompt =
`Write 5 multiple-choice quiz questions testing understanding of this material.
${grounded}
Each question has exactly 4 options and one correct answer. Distractors must be plausible and the same type as the answer.
Return ONLY a JSON array, no markdown:
[{"q":"...","options":["a","b","c","d"],"answer":"<exact text of the correct option>"}]`;
      const quizRaw = extractJSONArray(await callAI(quizPrompt, { maxTokens: 900 })) || [];
      const quiz = quizRaw
        .filter((x) => x && x.q && Array.isArray(x.options) && x.options.length >= 2 && x.answer)
        .map((x) => ({ q: String(x.q), options: x.options.map(String), answer: String(x.answer) }));

      if (!cards.length) throw new Error("Couldn't build cards from that source. Try a more specific focus hint.");

      setResult({
        name: plan.title || fetchedTitle || topic || (kind === "youtube" ? "YouTube import" : "Web import"),
        subject: plan.subject || "",
        summary: plan.summary || "",
        sourced: haveContent,
        topics,
        explanations: Array.isArray(plan.explanations) ? plan.explanations : [],
        cards: cards.filter((c) => c && c.front && c.back).map((c) => ({ front: String(c.front), back: String(c.back) })),
        quiz,
      });
      setStatus("done");
    } catch (e) {
      setError((e && e.code === "DAILY_LIMIT")
        ? "You've reached today's AI limit. It resets tomorrow."
        : (e && e.message) || "Import failed. Try again or use a topic hint.");
      setStatus("error");
    }
    setStep("");
  }

  return (
    <div className="fade">
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
        <button className="ghost" onClick={onCancel}>← Back</button>
        <h1 className="app-h1" style={S.h1}>Import from a link</h1>
      </div>
      <p style={S.sub}>Paste a YouTube video (with captions) or a website. Kioku pulls the real transcript or page text and turns it into flashcards, a quiz, and a summary.</p>

      {!WORKER_CONFIGURED && (
        <div style={S.errorBox}>AI isn't connected. Set your Worker URL in the file to enable link import.</div>
      )}

      <div className="panel-box" style={S.panelBox}>
        <div style={S.panelTitle}>Source</div>
        <div className="ai-src-row">
          <span className="ai-src-ic">{kind === "youtube" ? "▶" : kind === "website" ? "🌐" : "🔗"}</span>
          <input className="ta" placeholder="https://youtube.com/watch?v=…  or  https://en.wikipedia.org/…"
                 value={url} onChange={(e) => setUrl(e.target.value)}
                 onKeyDown={(e) => { if (e.key === "Enter") run(); }} />
        </div>
        <input className="ta" style={{ marginTop: 8 }} placeholder="Optional: focus hint (e.g. 'only the causes of WWI')"
               value={topic} onChange={(e) => setTopic(e.target.value)} />
        <div style={{ display: "flex", gap: 8, marginTop: 12, alignItems: "center", flexWrap: "wrap" }}>
          <button className="primary" disabled={status === "working" || !WORKER_CONFIGURED} onClick={run}>
            {status === "working" ? "Working…" : "✨ Generate study pack"}
          </button>
          {kind && <span style={{ ...S.hint }}>{kind === "youtube" ? "YouTube video detected" : "Website detected"}</span>}
          <div style={{ marginLeft: "auto" }}><UsageBar usage={usage} compact /></div>
        </div>
      </div>

      {status === "working" && (
        <div className="panel-box" style={{ ...S.panelBox, textAlign: "center" }}>
          <div className="splash-spin" style={{ margin: "6px auto 12px" }} />
          <div style={{ fontWeight: 600 }}>{step || "Working…"}</div>
          <div style={S.hint}>This can take 20–40 seconds for a full pack.</div>
        </div>
      )}
      {error && <div style={S.errorBox}>{error}</div>}

      {result && (
        <>
          <div className="panel-box" style={S.panelBox}>
            <div style={S.panelTitle}>Summary</div>
            <div style={{ marginBottom: 8 }}>
              <span style={{ fontSize: 11.5, fontWeight: 600, padding: "3px 9px", borderRadius: 999,
                background: result.sourced ? "var(--success-bg)" : "var(--warn-bg)",
                color: result.sourced ? "var(--success-text)" : "var(--warn-text)" }}>
                {result.sourced ? "✓ Built from the actual content" : "⚠ Couldn't read source — used the topic hint"}
              </span>
            </div>
            <div style={{ fontSize: 15, lineHeight: 1.6 }}>{result.summary || "—"}</div>
            {result.topics.length > 0 && (
              <div style={{ marginTop: 12, display: "flex", flexWrap: "wrap", gap: 6 }}>
                {result.topics.map((t, i) => <span key={i} style={S.topicChip}>{t}</span>)}
              </div>
            )}
          </div>

          {result.explanations.length > 0 && (
            <div className="panel-box" style={S.panelBox}>
              <div style={S.panelTitle}>Key concepts</div>
              {result.explanations.slice(0, 8).map((e, i) => (
                <div key={i} style={{ marginBottom: 10 }}>
                  <div style={{ fontWeight: 600, fontSize: 14.5 }}>{e.topic}</div>
                  <div style={{ ...S.hint, marginTop: 2 }}>{e.detail}</div>
                </div>
              ))}
            </div>
          )}

          <div className="panel-box" style={S.panelBox}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
              <div style={S.panelTitle}>{result.cards.length} flashcards ready</div>
              <button className="primary" onClick={() => onSave(result.name, result.cards, result.subject)}>Save as deck →</button>
            </div>
            <div style={{ marginTop: 8, maxHeight: 260, overflowY: "auto" }}>
              {result.cards.slice(0, 40).map((c, i) => (
                <div key={i} style={S.aiCardPeek}>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{c.front}</div>
                  <div style={{ ...S.hint, marginTop: 2 }}>{c.back}</div>
                </div>
              ))}
            </div>
          </div>

          {result.quiz.length > 0 && (
            <div className="panel-box" style={S.panelBox}>
              <div style={S.panelTitle}>Comprehension quiz ({result.quiz.length})</div>
              <QuizPreview quiz={result.quiz} />
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* inline self-scoring quiz used by the importer */
function QuizPreview({ quiz }) {
  const [picks, setPicks] = useState({});
  const [checked, setChecked] = useState(false);
  const score = quiz.reduce((n, q, i) => n + (picks[i] === q.answer ? 1 : 0), 0);
  return (
    <div>
      {quiz.map((q, i) => (
        <div key={i} style={{ marginBottom: 14 }}>
          <div style={{ fontWeight: 600, fontSize: 14.5, marginBottom: 6 }}>{i + 1}. {q.q}</div>
          <div style={{ display: "grid", gap: 6 }}>
            {q.options.map((o, j) => {
              const picked = picks[i] === o;
              const right = checked && o === q.answer;
              const wrong = checked && picked && o !== q.answer;
              return (
                <button key={j}
                  className={"quiz-opt" + (picked ? " picked" : "") + (right ? " right" : "") + (wrong ? " wrong" : "")}
                  onClick={() => !checked && setPicks((p) => ({ ...p, [i]: o }))}>
                  {o}{right ? "  ✓" : wrong ? "  ✗" : ""}
                </button>
              );
            })}
          </div>
        </div>
      ))}
      {!checked
        ? <button className="ghost" onClick={() => setChecked(true)} disabled={Object.keys(picks).length < quiz.length}>Check answers</button>
        : <div style={{ fontWeight: 600 }}>You scored {score}/{quiz.length}.</div>}
    </div>
  );
}

/* =========================================================
   2) SMART EXAM SIMULATION  (adaptive, timed, predicted score)
   ========================================================= */
const EXAM_PROFILES = {
  sat:    { name: "SAT",        emoji: "📐", q: 20, minutes: 25, max: 1600, base: 400, blurb: "Reading, writing & math style. Scored on the 400–1600 scale." },
  ap:     { name: "AP Exam",    emoji: "🎓", q: 18, minutes: 30, max: 5,    base: 1,   blurb: "Multiple-choice in AP style. Predicted 1–5 score." },
  mcat:   { name: "MCAT",       emoji: "🧬", q: 20, minutes: 30, max: 528,  base: 472, blurb: "Passage-style science reasoning. 472–528 scale." },
  finals: { name: "Final Exam", emoji: "📝", q: 20, minutes: 25, max: 100,  base: 0,   blurb: "A comprehensive final from your decks. Scored as a %." },
};

// adaptive difficulty ladder
const DIFFS = ["easier", "medium", "harder"];
function nextDifficulty(cur, lastCorrect, msTaken) {
  let i = DIFFS.indexOf(cur); if (i < 0) i = 1;
  if (lastCorrect && msTaken < 12000) i += 1;       // fast + right => push up
  else if (lastCorrect) i += 0;                      // right but slow => hold
  else i -= 1;                                       // wrong => ease off
  return DIFFS[Math.max(0, Math.min(DIFFS.length - 1, i))];
}

async function genExamQuestion({ subject, difficulty, avoid, topics }) {
  const topicLine = (topics && topics.length)
    ? `Pick the question's topic from EXACTLY this list (use the closest one, copy its wording verbatim into "topic"): ${topics.join(", ")}.`
    : `Tag the question with a short topic.`;
  const prompt =
`You are an exam item-writer. Write ONE ${difficulty} multiple-choice question for a ${subject} exam.
- Exactly 4 options, one correct.
- Distractors plausible, same type/length as the answer; no "all/none of the above".
- ${topicLine}
- Avoid repeating any of these question stems: ${avoid.slice(-6).join(" | ") || "(none yet)"}
Return ONLY JSON, no markdown:
{"q":"...","options":["a","b","c","d"],"answer":"<exact correct option text>","why":"<one-sentence why the answer is correct>","topic":"<topic from the list>"}`;
  const obj = extractJSONObject(await callAI(prompt, { maxTokens: 450 }));
  if (!obj || !obj.q || !Array.isArray(obj.options) || !obj.answer) return null;
  // snap the returned topic to the nearest allowed topic so buckets actually group
  let topic = String(obj.topic || subject);
  if (topics && topics.length) {
    const lc = topic.toLowerCase();
    const exact = topics.find((t) => t.toLowerCase() === lc);
    const partial = topics.find((t) => lc.includes(t.toLowerCase()) || t.toLowerCase().includes(lc));
    topic = exact || partial || topics[0];
  }
  return {
    q: String(obj.q),
    options: obj.options.map(String),
    answer: String(obj.answer),
    why: String(obj.why || ""),
    topic,
    difficulty,
  };
}

// Derive a small fixed set of topics for the subject so per-topic analytics group.
async function genExamTopics(subject) {
  try {
    const t = await callAI(
`List 5-7 core topic areas a ${subject} exam would cover. Return ONLY a JSON array of short topic strings (2-4 words each), no markdown.`,
      { maxTokens: 250 });
    const arr = extractJSONArray(t);
    if (arr && arr.length) return arr.map((x) => String(x)).slice(0, 7);
  } catch (e) {}
  return [];
}

function ExamSim({ decks, examHistory, onSaveHistory, onBack }) {
  const [phase, setPhase] = useState("setup"); // setup | running | results
  const [profileKey, setProfileKey] = useState("sat");
  const [subject, setSubject] = useState("");
  const [error, setError] = useState("");

  // customization
  const [customQ, setCustomQ] = useState(null);        // null => use profile default
  const [customMin, setCustomMin] = useState(null);
  const [diffMode, setDiffMode] = useState("adaptive"); // adaptive | easier | medium | harder
  const [instantFeedback, setInstantFeedback] = useState(true); // reveal answer + why after each Q
  const [showAdvanced, setShowAdvanced] = useState(false);

  const profile = EXAM_PROFILES[profileKey];
  const qCount = customQ != null ? customQ : profile.q;
  const minutes = customMin != null ? customMin : profile.minutes;
  const subjectsFromDecks = useMemo(() => {
    const s = new Set(); Object.values(decks).forEach((d) => { if (d.subject) s.add(d.subject); }); return [...s];
  }, [decks]);

  // running state
  const [questions, setQuestions] = useState([]);     // answered+current
  const [current, setCurrent] = useState(null);
  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [answers, setAnswers] = useState([]);          // {q,correct,picked,ms,difficulty,topic,why,options,answer}
  const [secondsLeft, setSecondsLeft] = useState(0);
  const [genBusy, setGenBusy] = useState(false);
  const diffRef = useRef("medium");
  const qStartRef = useRef(0);
  const avoidRef = useRef([]);
  const topicsRef = useRef([]);
  const timerRef = useRef(null);
  const finishRef = useRef(null);

  const effSubject = subject || subjectsFromDecks[0] || "general knowledge";

  async function start() {
    if (!WORKER_CONFIGURED) { setError("AI isn't connected. Set your Worker URL to run AI exams."); return; }
    setError(""); setPhase("running");
    setAnswers([]); setQuestions([]); setIdx(0); setPicked(null);
    savedRef.current = false; // allow this attempt's result to be saved
    diffRef.current = diffMode === "adaptive" ? "medium" : diffMode;
    avoidRef.current = []; topicsRef.current = [];
    if (timerRef.current) clearInterval(timerRef.current); // never stack timers
    setSecondsLeft(minutes * 60);
    timerRef.current = setInterval(() => {
      setSecondsLeft((s) => {
        if (s <= 1) { clearInterval(timerRef.current); if (finishRef.current) finishRef.current(); return 0; }
        return s - 1;
      });
    }, 1000);
    // derive a fixed topic set first so per-topic analytics actually group
    setGenBusy(true);
    topicsRef.current = await genExamTopics(effSubject);
    await loadNext(true);
  }

  async function loadNext(first) {
    setGenBusy(true); setPicked(null);
    let q = null;
    for (let tries = 0; tries < 3 && !q; tries++) {
      try { q = await genExamQuestion({ subject: effSubject, difficulty: diffRef.current, avoid: avoidRef.current, topics: topicsRef.current }); }
      catch (e) { if (e && e.code === "DAILY_LIMIT") { setError("Daily AI limit reached."); finish(); return; } }
    }
    setGenBusy(false);
    if (!q) { setError("Couldn't generate a question. Ending the exam."); finish(); return; }
    avoidRef.current.push(q.q);
    setCurrent(q);
    qStartRef.current = Date.now();
  }

  function choose(opt) {
    if (picked != null) return;
    setPicked(opt);
    const ms = Date.now() - qStartRef.current;
    const correct = opt === current.answer;
    const rec = { ...current, picked: opt, correct, ms };
    setAnswers((a) => [...a, rec]);
    if (diffMode === "adaptive") diffRef.current = nextDifficulty(current.difficulty, correct, ms);
    // when instant feedback is OFF, jump straight to the next question
    if (!instantFeedback) { setTimeout(() => { advance([...answers, rec]); }, 120); }
  }

  async function advance(currentAnswers) {
    const answeredCount = (currentAnswers || answers).length;
    if (answeredCount >= qCount) { finish(); return; }
    setIdx((i) => i + 1);
    await loadNext(false);
  }

  function finish() {
    if (timerRef.current) clearInterval(timerRef.current);
    setPhase("results");
  }
  finishRef.current = finish;
  useEffect(() => () => { if (timerRef.current) clearInterval(timerRef.current); }, []);

  // ---- results math ----
  const results = useMemo(() => {
    if (phase !== "results") return null;
    const total = answers.length || 1;
    const correct = answers.filter((a) => a.correct).length;
    const pct = Math.round((correct / total) * 100);
    const avgMs = Math.round(answers.reduce((n, a) => n + a.ms, 0) / total);
    // predicted score on the exam's scale, lightly weighted by speed
    const speedBonus = avgMs < 12000 ? 0.03 : avgMs > 30000 ? -0.03 : 0;
    const frac = Math.max(0, Math.min(1, correct / total + speedBonus));
    const predicted = Math.round(profile.base + frac * (profile.max - profile.base));
    // weak topics
    const byTopic = {};
    answers.forEach((a) => { const t = a.topic || "General"; (byTopic[t] = byTopic[t] || { c: 0, n: 0 }); byTopic[t].n++; if (a.correct) byTopic[t].c++; });
    const weak = Object.entries(byTopic).map(([t, v]) => ({ t, pct: Math.round((v.c / v.n) * 100), n: v.n }))
      .sort((a, b) => a.pct - b.pct);
    return { total, correct, pct, avgMs, predicted, weak };
  }, [phase, answers, profile]);

  // persist a compact history record once, when results first show
  const savedRef = useRef(false);
  useEffect(() => {
    if (phase === "results" && results && !savedRef.current) {
      savedRef.current = true;
      const rec = { t: Date.now(), exam: profile.name, subject: effSubject, pct: results.pct, predicted: results.predicted, score_max: profile.max, q: results.total };
      onSaveHistory([...(examHistory || []), rec].slice(-50));
    }
    // eslint-disable-next-line
  }, [phase, results]);

  const mmss = (s) => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;

  // ---------- SETUP ----------
  if (phase === "setup") {
    const past = (examHistory || []).slice().reverse();
    return (
      <div className="fade">
        <div style={{ marginBottom: 6 }}>
          <h1 className="app-h1" style={S.h1}>Exam simulator</h1>
        </div>
        <p style={S.sub}>AI-generated mock exams that adapt to you in real time, with timing, scoring, and a predicted real-exam score.</p>

        {!WORKER_CONFIGURED && <div style={S.errorBox}>AI isn't connected. Set your Worker URL to run AI exams.</div>}
        {error && <div style={S.errorBox}>{error}</div>}

        <div className="exam-grid">
          {Object.entries(EXAM_PROFILES).map(([k, p]) => (
            <button key={k} className={"exam-card" + (profileKey === k ? " on" : "")} onClick={() => setProfileKey(k)}>
              <div className="exam-emoji">{p.emoji}</div>
              <div className="exam-name">{p.name}</div>
              <div className="exam-meta">{p.q} Q · {p.minutes} min</div>
              <div className="exam-blurb">{p.blurb}</div>
            </button>
          ))}
        </div>

        <div className="panel-box" style={{ ...S.panelBox, marginTop: 16 }}>
          <div style={S.panelTitle}>Subject</div>
          <input className="ta" placeholder={subjectsFromDecks[0] ? `e.g. ${subjectsFromDecks[0]}` : "e.g. AP Biology, Algebra II, US History"}
                 value={subject} onChange={(e) => setSubject(e.target.value)} />
          {subjectsFromDecks.length > 0 && (
            <div style={{ marginTop: 8, display: "flex", gap: 6, flexWrap: "wrap" }}>
              {subjectsFromDecks.slice(0, 8).map((s) => (
                <button key={s} className="type-chip" onClick={() => setSubject(s)}>{s}</button>
              ))}
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 18, marginBottom: 4 }}>
            <div style={S.panelTitle}>Customize</div>
            <button className="linklike" onClick={() => setShowAdvanced((v) => !v)}>{showAdvanced ? "Hide" : "Customize ▾"}</button>
          </div>

          {showAdvanced && (
            <div className="exam-custom">
              <div className="exam-custom-row">
                <label>Questions</label>
                <div className="seg">
                  {[5, 10, 20, 30, 50].map((n) => (
                    <button key={n} className={"seg-btn" + (qCount === n ? " on" : "")} onClick={() => setCustomQ(n)}>{n}</button>
                  ))}
                </div>
              </div>
              <div className="exam-custom-row">
                <label>Time limit</label>
                <div className="seg">
                  {[10, 20, 30, 45, 60].map((n) => (
                    <button key={n} className={"seg-btn" + (minutes === n ? " on" : "")} onClick={() => setCustomMin(n)}>{n}m</button>
                  ))}
                </div>
              </div>
              <div className="exam-custom-row">
                <label>Difficulty</label>
                <div className="seg">
                  {[["adaptive", "Adaptive"], ["easier", "Easy"], ["medium", "Medium"], ["harder", "Hard"]].map(([k, lbl]) => (
                    <button key={k} className={"seg-btn" + (diffMode === k ? " on" : "")} onClick={() => setDiffMode(k)}>{lbl}</button>
                  ))}
                </div>
              </div>
              <div className="exam-custom-row">
                <label>Feedback</label>
                <div className="seg">
                  <button className={"seg-btn" + (instantFeedback ? " on" : "")} onClick={() => setInstantFeedback(true)}>After each Q</button>
                  <button className={"seg-btn" + (!instantFeedback ? " on" : "")} onClick={() => setInstantFeedback(false)}>At the end</button>
                </div>
              </div>
            </div>
          )}

          <div style={{ ...S.hint, marginTop: 12 }}>
            {diffMode === "adaptive"
              ? `Adaptive: questions get harder when you're fast & accurate, and ease off when you miss.`
              : `Fixed ${diffMode} difficulty.`} {qCount} questions · {minutes} min · {profile.name} predicts a {profile.base}–{profile.max} score.
          </div>
          <button className="primary" style={{ marginTop: 14 }} disabled={!WORKER_CONFIGURED} onClick={start}>Start {profile.name} simulation →</button>
        </div>

        {past.length > 0 && (
          <div className="panel-box" style={S.panelBox}>
            <div style={S.panelTitle}>Recent attempts</div>
            {past.slice(0, 6).map((r, i) => (
              <div key={i} style={S.examHistRow}>
                <span style={{ fontWeight: 600 }}>{r.exam}</span>
                <span style={S.hint}>{r.subject}</span>
                <span style={{ marginLeft: "auto", fontWeight: 600 }}>{r.pct}%</span>
                <span style={S.examPred}>~{r.predicted}{r.score_max === 100 ? "%" : ""}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ---------- RUNNING ----------
  if (phase === "running") {
    const answeredCount = answers.length;
    const lowTime = secondsLeft <= 30;
    return (
      <div className="fade">
        <div className="exam-run-top">
          <button className="ghost" onClick={() => { if (confirm("End this exam now?")) finish(); }}>End</button>
          <div className="exam-progress-wrap"><div className="exam-progress" style={{ width: `${(answeredCount / qCount) * 100}%` }} /></div>
          <div className={"exam-timer" + (lowTime ? " low" : "")}>⏱ {mmss(secondsLeft)}</div>
        </div>
        <div style={S.examQNo}>Question {Math.min(answeredCount + 1, qCount)} of {qCount}
          <span style={S.examDiff}>{current ? current.difficulty : diffRef.current}</span>
        </div>

        {genBusy || !current ? (
          <div className="panel-box" style={{ ...S.panelBox, textAlign: "center", minHeight: 160, display: "grid", placeItems: "center" }}>
            <div><div className="splash-spin" style={{ margin: "0 auto 10px" }} /><div style={S.hint}>{answeredCount === 0 ? "Preparing your exam…" : "Writing your next question…"}</div></div>
          </div>
        ) : (
          <>
            <div className="exam-question">{current.q}</div>
            <div style={{ display: "grid", gap: 8 }}>
              {current.options.map((o, j) => {
                const isPicked = picked === o;
                const reveal = instantFeedback && picked != null;
                const right = reveal && o === current.answer;
                const wrong = reveal && isPicked && o !== current.answer;
                return (
                  <button key={j}
                    className={"exam-opt" + (isPicked ? " picked" : "") + (right ? " right" : "") + (wrong ? " wrong" : "")}
                    disabled={picked != null} onClick={() => choose(o)}>
                    <span className="exam-opt-letter">{String.fromCharCode(65 + j)}</span>{o}
                    {right ? <span className="exam-mark">✓</span> : wrong ? <span className="exam-mark">✗</span> : null}
                  </button>
                );
              })}
            </div>
            {instantFeedback && picked != null && (
              <div className={"exam-explain" + (picked === current.answer ? " ok" : " no")}>
                <b>{picked === current.answer ? "Correct." : "Not quite."}</b> {current.why}
              </div>
            )}
            {instantFeedback && picked != null && (
              <button className="primary" style={{ marginTop: 14, width: "100%" }} onClick={() => advance()}>
                {answeredCount >= qCount ? "Finish & see score →" : "Next question →"}
              </button>
            )}
          </>
        )}
      </div>
    );
  }

  // ---------- RESULTS ----------
  return (
    <div className="fade">
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
        <button className="ghost" onClick={onBack}>← Back</button>
        <h1 className="app-h1" style={S.h1}>{profile.name} results</h1>
      </div>

      <div className="exam-score-hero">
        <div className="exam-score-ring" style={{ background: `conic-gradient(var(--accent) ${results.pct * 3.6}deg, var(--surface-2) 0)` }}>
          <div className="exam-score-inner">
            <div className="exam-score-pct">{results.pct}%</div>
            <div className="exam-score-sub">{results.correct}/{results.total}</div>
          </div>
        </div>
        <div className="exam-pred-box">
          <div style={S.hint}>Predicted {profile.name} score</div>
          <div className="exam-pred-num">{results.predicted}{profile.max === 100 ? "%" : ""}</div>
          <div style={S.hint}>{profile.base}–{profile.max} scale · avg {(results.avgMs / 1000).toFixed(1)}s / question</div>
        </div>
      </div>

      <div className="panel-box" style={S.panelBox}>
        <div style={S.panelTitle}>Performance by topic</div>
        {results.weak.length === 0 ? (
          <div style={S.hint}>No topic data for this attempt.</div>
        ) : (
          <>
            {results.weak.map((w, i) => (
              <div key={i} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14, marginBottom: 4 }}>
                  <span style={{ fontWeight: 600 }}>{w.t}</span><span style={S.hint}>{w.pct}% · {w.n} q</span>
                </div>
                <div style={{ height: 8, background: "var(--surface-2)", borderRadius: 8, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${w.pct}%`, borderRadius: 8, background: w.pct < 50 ? "var(--danger)" : w.pct < 75 ? "var(--warn)" : "var(--success)" }} />
                </div>
              </div>
            ))}
            {results.weak.length > 1 && results.weak[0].pct < 75 && (
              <div style={{ ...S.hint, marginTop: 6 }}>💡 Focus your next sessions on <b>{results.weak[0].t}</b> — it's your weakest area.</div>
            )}
          </>
        )}
      </div>

      <div className="panel-box" style={S.panelBox}>
        <div style={S.panelTitle}>Review — answers &amp; explanations</div>
        {answers.map((a, i) => (
          <div key={i} style={S.examReviewItem}>
            <div style={{ fontWeight: 600, fontSize: 14.5 }}>
              <span style={{ color: a.correct ? "var(--success-text)" : "var(--danger-text)" }}>{a.correct ? "✓" : "✗"}</span> {a.q}
            </div>
            <div style={{ ...S.hint, marginTop: 3 }}>Correct: <b style={{ color: "var(--success-text)" }}>{a.answer}</b>{!a.correct && <> · You chose: <span style={{ color: "var(--danger-text)" }}>{a.picked}</span></>}</div>
            {a.why && <div style={{ ...S.hint, marginTop: 2 }}>{a.why}</div>}
          </div>
        ))}
      </div>

      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        <button className="primary" onClick={() => { savedRef.current = false; setPhase("setup"); }}>Take another →</button>
        <button className="ghost" onClick={onBack}>Done</button>
      </div>
    </div>
  );
}

/* =========================================================
   DECK TRADE CODES
   ========================================================= */
// ---- deck trade codes ----
// KIOKU2 (preferred): gzip-compressed, tab/newline-delimited payload -> URL-safe base64.
//   Much shorter than JSON. Falls back to KIOKU1 (json+base64) if gzip isn't available.
// First line: name\tsubject ; each following line: front\tback\ttype\ttag,tag
function b64urlFromBytes(bytes) {
  let bin = ""; for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function bytesFromB64url(s) {
  let b = String(s).replace(/-/g, "+").replace(/_/g, "/"); while (b.length % 4) b += "=";
  const bin = atob(b); const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
const ESC = (s) => String(s == null ? "" : s).replace(/\\/g, "\\\\").replace(/\t/g, "\\t").replace(/\n/g, "\\n");
const UNESC = (s) => String(s).replace(/\\t/g, "\t").replace(/\\n/g, "\n").replace(/\\\\/g, "\\");

function deckToText(deck) {
  const lines = [ESC(deck.name) + "\t" + ESC(deck.subject || "")];
  deck.cards.forEach((c) => {
    lines.push([ESC(c.front), ESC(c.back), c.type || "basic", (c.tags || []).join(",")].join("\t"));
  });
  return lines.join("\n");
}
function textToDeck(text) {
  const lines = String(text).split("\n");
  const head = (lines.shift() || "").split("\t");
  const cards = lines.filter((l) => l.length).map((l) => {
    const p = l.split("\t");
    return { front: UNESC(p[0] || ""), back: UNESC(p[1] || ""), type: p[2] || "basic", tags: (p[3] || "").split(",").filter(Boolean) };
  }).filter((c) => c.front && c.back);
  return { name: UNESC(head[0] || "Shared deck"), subject: UNESC(head[1] || ""), cards };
}

async function encodeDeckCode(deck) {
  // try gzip (CompressionStream) for a compact KIOKU2 code
  try {
    if (typeof CompressionStream !== "undefined") {
      const text = deckToText(deck);
      const cs = new CompressionStream("gzip");
      const writer = cs.writable.getWriter();
      writer.write(new TextEncoder().encode(text)); writer.close();
      const buf = await new Response(cs.readable).arrayBuffer();
      return "KIOKU2:" + b64urlFromBytes(new Uint8Array(buf));
    }
  } catch (e) {}
  // fallback: legacy JSON + base64
  try {
    const slim = { n: deck.name, s: deck.subject || "", c: deck.cards.map((c) => ({ f: c.front, b: c.back, t: c.type || "basic", g: c.tags || [] })) };
    return "KIOKU1:" + btoa(unescape(encodeURIComponent(JSON.stringify(slim))));
  } catch { return ""; }
}

async function decodeDeckCode(code) {
  const raw = String(code).trim();
  // KIOKU2: gzip
  if (/^KIOKU2:/.test(raw)) {
    try {
      const bytes = bytesFromB64url(raw.replace(/^KIOKU2:/, ""));
      const ds = new DecompressionStream("gzip");
      const writer = ds.writable.getWriter();
      writer.write(bytes); writer.close();
      const buf = await new Response(ds.readable).arrayBuffer();
      const text = new TextDecoder().decode(buf);
      const deck = textToDeck(text);
      return deck.cards.length ? deck : null;
    } catch { return null; }
  }
  // KIOKU1: legacy json+base64
  try {
    const obj = JSON.parse(decodeURIComponent(escape(atob(raw.replace(/^KIOKU1:/, "")))));
    if (!obj || !Array.isArray(obj.c)) return null;
    return {
      name: obj.n || "Shared deck", subject: obj.s || "",
      cards: obj.c.filter((c) => c && c.f && c.b).map((c) => ({ front: String(c.f), back: String(c.b), type: c.t || "basic", tags: c.g || [] })),
    };
  } catch { return null; }
}

function ShareDecks({ decks, onImportDeck, onOpenDeck, onShareDeck, onBack }) {
  const [shareDeckId, setShareDeckId] = useState(Object.keys(decks)[0] || "");
  const [shareCode, setShareCode] = useState("");
  const [copyMsg, setCopyMsg] = useState("");
  const [importCode, setImportCode] = useState("");
  const [importMsg, setImportMsg] = useState("");
  const [importedId, setImportedId] = useState(null);

  const makeCode = async () => {
    const d = decks[shareDeckId]; if (!d) return;
    setShareCode("…"); setCopyMsg("");
    const code = await encodeDeckCode(d);
    setShareCode(code || "");
    if (code && onShareDeck) onShareDeck();
  };
  const copyCode = async () => {
    if (!shareCode || shareCode === "…") return;
    try { await navigator.clipboard.writeText(shareCode); setCopyMsg("Copied! Send it to a friend."); }
    catch { setCopyMsg("Select the code and copy it manually."); }
  };
  const doImport = async () => {
    setImportMsg("Decoding…"); setImportedId(null);
    const deck = await decodeDeckCode(importCode);
    if (!deck || !deck.cards.length) { setImportMsg("That code isn't valid. Make sure you copied the whole thing."); return; }
    const id = onImportDeck(deck.name + " (shared)", deck.cards, deck.subject);
    setImportedId(id || null);
    setImportMsg(`Imported "${deck.name}" — ${deck.cards.length} cards added to your decks.`);
    setImportCode("");
  };

  const hasDecks = Object.keys(decks).length > 0;

  return (
    <div className="fade">
      <div style={{ marginBottom: 6 }}>
        <h1 className="app-h1" style={S.h1}>Share decks</h1>
      </div>
      <p style={S.sub}>Send any deck to a friend as a compact code, or paste one you've received to add it instantly.</p>

      <div className="panel-box" style={S.panelBox}>
        <div style={S.panelTitle}>Share one of your decks</div>
        <p style={S.hint}>Generate a code, send it to a friend, and they can add the whole deck — cards, tags and all — in one paste.</p>
        {hasDecks ? (
          <>
            <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
              <select className="sel" value={shareDeckId} onChange={(e) => { setShareDeckId(e.target.value); setShareCode(""); setCopyMsg(""); }}>
                {Object.values(decks).map((d) => <option key={d.id} value={d.id}>{d.name} ({d.cards.length})</option>)}
              </select>
              <button className="primary" disabled={!shareDeckId} onClick={makeCode}>Generate code</button>
            </div>
            {shareCode && (
              <div style={{ marginTop: 12 }}>
                <textarea className="ta" readOnly value={shareCode} rows={3} style={{ fontFamily: "monospace", fontSize: 12 }} onFocus={(e) => e.target.select()} />
                <div style={{ display: "flex", gap: 8, marginTop: 8, alignItems: "center" }}>
                  <button className="ghost" onClick={copyCode}>Copy code</button>
                  {copyMsg && <span style={{ ...S.hint, color: "var(--success-text)" }}>{copyMsg}</span>}
                </div>
              </div>
            )}
          </>
        ) : (
          <p style={{ ...S.hint, marginTop: 10 }}>You don't have any decks yet. Create one first, then come back to share it.</p>
        )}
      </div>

      <div className="panel-box" style={S.panelBox}>
        <div style={S.panelTitle}>Receive a deck</div>
        <p style={S.hint}>Paste a friend's deck code to add it to your collection.</p>
        <textarea className="ta" placeholder="Paste a deck code here (starts with KIOKU…)" value={importCode} onChange={(e) => setImportCode(e.target.value)} rows={3} style={{ fontFamily: "monospace", fontSize: 12, marginTop: 8 }} />
        <div style={{ display: "flex", gap: 8, marginTop: 8, alignItems: "center", flexWrap: "wrap" }}>
          <button className="primary" disabled={!importCode.trim()} onClick={doImport}>Import deck</button>
          {importedId && <button className="ghost" onClick={() => onOpenDeck(importedId)}>Open deck →</button>}
          {importMsg && <span style={{ ...S.hint, color: importMsg.startsWith("Imported") ? "var(--success-text)" : "var(--danger-text)" }}>{importMsg}</span>}
        </div>
      </div>
    </div>
  );
}

/* Top-level error boundary: if anything throws during render, show a calm
   recovery screen with a one-click backup export instead of a blank page.
   The user's data lives in IndexedDB and is untouched by a render crash. */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { try { console.error("Kioku crashed:", error, info); } catch (e) {} }
  async backup() {
    try {
      const out = {};
      for (const k of ["decks", "log", "settings", "stats"]) {
        const v = await window.storage.get(k);
        if (v && v.value) out[k] = JSON.parse(v.value);
      }
      const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob); a.download = `kioku_backup_${todayKey()}.json`; a.click();
    } catch (e) { alert("Couldn't export automatically — your data is still saved; reload and export from Settings."); }
  }
  render() {
    if (!this.state.error) return this.props.children;
    return (
      <div style={{ maxWidth: 520, margin: "60px auto", padding: 24, fontFamily: "-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif", color: "var(--text)", textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 8 }}>😕</div>
        <h2 style={{ margin: "0 0 8px" }}>Something went wrong</h2>
        <p style={{ color: "var(--muted)", lineHeight: 1.6 }}>
          The app hit an unexpected error, but your decks and progress are safe in storage. You can back them up, then reload.
        </p>
        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 16, flexWrap: "wrap" }}>
          <button className="primary" onClick={() => this.backup()}>Export backup</button>
          <button className="ghost" onClick={() => window.location.reload()}>Reload app</button>
        </div>
      </div>
    );
  }
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><App /></ErrorBoundary>);

<!--
  ============================================================
  SETUP — connect Kioku to your Cloudflare Worker
  ============================================================
  1) Set WORKER_URL near the top of this file to your Worker URL.

  2) Your Worker holds the Anthropic key, proxies requests, AND meters
     per-user token usage with a daily cap (100,000 Haiku 4.5 tokens/user/day).
     Replace your Worker's code with this (Workers & Pages → your Worker →
     Edit code → paste → Deploy):

     export default {
       async fetch(request, env) {
         const cors = {
           "Access-Control-Allow-Origin": "*",
           "Access-Control-Allow-Methods": "POST, OPTIONS",
           "Access-Control-Allow-Headers": "Content-Type",
           // let the browser read the usage headers we send back:
           "Access-Control-Expose-Headers": "X-Usage-Today, X-Usage-Limit, X-Limit-Reached",
         };
         if (request.method === "OPTIONS") return new Response(null, { status: 204, headers: cors });
         if (request.method !== "POST")   return new Response("POST only", { status: 405, headers: cors });

         const DAILY_LIMIT = 100000;                 // Haiku 4.5 tokens per user per day
         const { prompt, maxTokens, userId } = await request.json();
         const uid = (userId || "anon").slice(0, 64);
         const day = new Date().toISOString().slice(0, 10);  // UTC day
         const key = "usage:" + uid + ":" + day;

         // read today's usage (requires a KV namespace bound as USAGE — see step 4).
         // if KV isn't bound, the Worker still works but won't enforce limits.
         let used = 0;
         if (env.USAGE) { const v = await env.USAGE.get(key); used = v ? (parseInt(v, 10) || 0) : 0; }

         if (env.USAGE && used >= DAILY_LIMIT) {
           return new Response(JSON.stringify({ error: { type: "daily_limit", message: "Daily token limit reached." } }), {
             status: 429,
             headers: { ...cors, "Content-Type": "application/json",
                        "X-Limit-Reached": "daily", "X-Usage-Today": String(used), "X-Usage-Limit": String(DAILY_LIMIT) },
           });
         }

         const r = await fetch("https://api.anthropic.com/v1/messages", {
           method: "POST",
           headers: { "Content-Type": "application/json", "x-api-key": env.ANTHROPIC_KEY, "anthropic-version": "2023-06-01" },
           body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: maxTokens || 8192, messages: [{ role: "user", content: prompt }] }),
         });
         const body = await r.text();

         // add this call's real token usage to the daily counter
         let total = used;
         try {
           const data = JSON.parse(body);
           const u = data.usage || {};
           total = used + (u.input_tokens || 0) + (u.output_tokens || 0);
           if (env.USAGE) await env.USAGE.put(key, String(total), { expirationTtl: 60 * 60 * 48 }); // auto-clears after 48h
         } catch (e) {}

         return new Response(body, {
           status: r.status,
           headers: { ...cors, "Content-Type": "application/json",
                      "X-Usage-Today": String(total), "X-Usage-Limit": String(DAILY_LIMIT) },
         });
       },
     };

  3) Add your key as a Worker SECRET named ANTHROPIC_KEY:
     Worker → Settings → Variables and Secrets → Add → type Secret → name ANTHROPIC_KEY → paste your sk-ant-… key → Deploy.
     The key never appears in this file, so it's safe to host publicly.

  4) Create a KV namespace for usage tracking (this is what makes limits real):
     - Cloudflare dashboard → Storage & Databases → KV → Create namespace (name it e.g. "kioku-usage").
     - Then Worker → Settings → Bindings → Add → KV namespace → Variable name: USAGE → select that namespace → Deploy.
     Without this binding the app still works and shows a per-device estimate, but limits aren't enforced server-side.

  NOTES on usage limiting:
  - Server-enforced limit is keyed on an anonymous per-browser id the app generates. Clearing browser storage yields a new id,
    so for true per-ACCOUNT limits across devices you'd add real login/auth. KV counters are eventually consistent — fine for
    personal/low-traffic use; for strict accuracy under heavy concurrency use Durable Objects instead.
  - The server day is UTC; the client display rolls at local midnight. Minor cosmetic mismatch at the boundary only.

  WHAT'S NEW (Kioku v3):
  - Per-user token usage tracking + daily limit (100k Haiku 4.5 tokens/day), client meter + server enforcement via KV
  - AI generation via Cloudflare Worker (API key stays server-side; file is public-safe)
  - AI deck generation in three styles: Q&A, Reverse (⇄), and Cloze
  - Reliable exact-count generation (no more random short decks) + "Generate more" + Stop
  - Document/PDF import chunks long text so nothing is dropped
  - Context-aware AI exam distractors (with offline fallback)
  - Math (KaTeX) rendering on cards; multiple natural TTS voices + tone presets; per-card audio
  - Anki-like new-card intervals (Good ~2d, Easy 4d); activity heatmap with range tabs; error boundary
  - XP & levels, daily goal, streak freezes, achievements, dark mode, IndexedDB storage
  - Type-the-answer (fuzzy), MC quiz, inline edit, tap/swipe touch controls, undo, suspend, leech detection
  - Cloze + reverse cards, per-card hints & images, full backup export/import
