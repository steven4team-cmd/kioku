/* ---------------- EXAM MODE ----------------
   Builds a realistic multiple-choice test from the deck.
   - Picks up to 20 random non-suspended cards
   - Distractors are AI-generated to be CONTEXT-AWARE: same type/format
     as the correct answer, plausible-but-wrong, and on-topic — so the
     right answer can't be spotted by elimination. Falls back to
     same-deck answers (the old behaviour) if the AI is unreachable.
   - Times the user; scores at the end with a per-question review
   - Reports the best % into stats so achievements can fire
*/
function shuffleInPlace(a) {
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function examCorrect(c) {
  return c.type === "cloze" ? clozeExpectedAnswer(c) : String(c.back || "").split(/[,/;]/)[0].trim();
}
function examFace(c) {
  return c.type === "cloze" ? clozeCardFaces(c).front : c.front;
}
// Keep only clean, unique distractors that aren't the correct answer
function cleanDistractorList(list, correct) {
  const out = [];
  const seen = new Set([normalizeAns(correct)]);
  (Array.isArray(list) ? list : []).forEach((d) => {
    const str = String(d == null ? "" : d).trim();
    if (!str || str.length > 160) return;
    const key = normalizeAns(str);
    if (!key || seen.has(key)) return;
    seen.add(key);
    out.push(str);
  });
  return out;
}
// Pull the first JSON array out of a model response (tolerates ```fences / prose)
function extractJSONArray(text) {
  if (!text) return null;
  let t = String(text).trim().replace(/^```(?:json)?/i, "").replace(/```$/i, "").trim();
  const start = t.indexOf("["), end = t.lastIndexOf("]");
  if (start === -1 || end === -1 || end < start) return null;
  try { const v = JSON.parse(t.slice(start, end + 1)); return Array.isArray(v) ? v : null; }
  catch { return null; }
}
// Ask the AI for 3 context-aware distractors per question (one batch of items)
async function aiDistractorsBatch(items, subject) {
  const list = items.map((it, i) =>
    `${i + 1}. QUESTION: ${String(it.front).replace(/\s+/g, " ").trim()}\n   CORRECT ANSWER: ${it.correct}`
  ).join("\n");
  const prompt =
`You write multiple-choice exam questions${subject ? " for the subject: " + subject : ""}. For each numbered item below, write exactly 3 INCORRECT but believable answer options (distractors).

Hard rules:
- Each distractor must be the SAME TYPE and FORMAT as the correct answer. If the correct answer is a year, give other plausible years; a person -> other plausible people; a date, place, number, formula, or definition -> the same kind of thing, similar length and style.
- Distractors must logically fit THAT question and stay on-topic for the subject. Never use random, unrelated, or joke options ("None of the above", "Skip", etc. are banned).
- They must be clearly wrong to someone who studied, but tempting to someone who didn't. No near-duplicates or paraphrases of the correct answer.
- Do NOT reveal which is correct and do NOT add commentary.

Return ONLY a JSON array with one element per item, in order. Each element is an array of exactly 3 strings. No markdown, no keys, no extra text.

Items:
${list}`;
  const text = await callAI(prompt);
  const arr = extractJSONArray(text);
  if (!arr) return null;
  // normalize: each entry should be an array of strings
  return arr.map((e) => Array.isArray(e) ? e.map((x) => String(x)) : []);
}

// Synchronous fallback: distractors drawn from other cards in the deck (old behaviour)
function localDistractors(correct, answerPool) {
  const distractors = [];
  const pool = shuffleInPlace(answerPool.slice());
  const seen = new Set([normalizeAns(correct)]);
  for (const d of pool) {
    if (distractors.length >= 3) break;
    const key = normalizeAns(d);
    if (!key || seen.has(key)) continue;
    seen.add(key);
    distractors.push(d);
  }
  const generic = ["None of the above", "Not certain", "All of the above", "Skip"];
  let gi = 0;
  while (distractors.length < 3) distractors.push(generic[gi++] || ("Option " + distractors.length));
  return distractors;
}

function pickExamCards(deck, count) {
  const pool = deck.cards.filter((c) => !c.suspended);
  if (!pool.length) return { pool: [], picked: [] };
  const picked = shuffleInPlace(pool.slice()).slice(0, Math.min(count, pool.length));
  return { pool, picked };
}

function assembleQuestion(c, distractors) {
  const correct = examCorrect(c);
  const opts = [correct, ...distractors.slice(0, 3)];
  shuffleInPlace(opts);
  return { cardId: c.id, front: examFace(c), frontImage: c.frontImage || null, correct, options: opts };
}

// Local, instant exam (no AI). Used as fallback.
function buildExam(deck, count = 20) {
  const { pool, picked } = pickExamCards(deck, count);
  if (!picked.length) return [];
  const answerPool = pool.map(examCorrect).filter((s) => s && s.length > 0 && s.length < 120);
  return picked.map((c) => assembleQuestion(c, localDistractors(examCorrect(c), answerPool)));
}

// AI-powered exam: context-aware distractors, with graceful per-question fallback.
async function buildExamAI(deck, count = 20) {
  const { pool, picked } = pickExamCards(deck, count);
  if (!picked.length) return [];
  const answerPool = pool.map(examCorrect).filter((s) => s && s.length > 0 && s.length < 120);

  const base = picked.map((c) => ({ card: c, front: examFace(c), correct: examCorrect(c) }));

  // batch so responses stay reliable; one failed batch can't sink the others
  const CHUNK = 10;
  const chunks = [];
  for (let i = 0; i < base.length; i += CHUNK) chunks.push(base.slice(i, i + CHUNK));
  const results = await Promise.all(chunks.map(async (ch) => {
    try { return await aiDistractorsBatch(ch.map((b) => ({ front: b.front, correct: b.correct })), deck.subject); }
    catch { return null; }
  }));

  // flatten AI results aligned to `base`
  const aiByIndex = [];
  results.forEach((r, ci) => { chunks[ci].forEach((_, i) => aiByIndex.push(r && r[i] ? r[i] : null)); });

  return base.map((b, idx) => {
    let distractors = cleanDistractorList(aiByIndex[idx], b.correct);
    if (distractors.length < 3) {
      // top up with on-deck answers, then generic, so we always have 3
      const filler = localDistractors(b.correct, answerPool);
      for (const f of filler) {
        if (distractors.length >= 3) break;
        if (distractors.some((d) => normalizeAns(d) === normalizeAns(f))) continue;
        distractors.push(f);
      }
    }
    return assembleQuestion(b.card, distractors);
  });
}

function ExamMode({ deck, onDone, onExamResult }) {
  const [questions, setQuestions] = useState(null); // null = still generating
  const [usedFallback, setUsedFallback] = useState(false);
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({}); // cardId -> picked
  const [finished, setFinished] = useState(false);
  const [startedAt, setStartedAt] = useState(null);
  const [duration, setDuration] = useState(0);
  const [nonce, setNonce] = useState(0);   // bump to rebuild a fresh exam in place
  const tickRef = useRef(null);

  // stop any audio/TTS when leaving the exam
  useEffect(() => () => stopAllPlayback(), []);

  // build the exam (AI distractors, with local fallback) when mounted / on retry
  useEffect(() => {
    let cancelled = false;
    setQuestions(null); setIdx(0); setAnswers({}); setFinished(false);
    setStartedAt(null); setDuration(0);
    (async () => {
      let qs, fell = false;
      try { qs = await buildExamAI(deck, 20); }
      catch { qs = buildExam(deck, 20); fell = true; }
      if (cancelled) return;
      setUsedFallback(fell);
      setQuestions(qs);
      setStartedAt(Date.now()); // clock starts only once the exam is ready
    })();
    return () => { cancelled = true; };
  }, [nonce]);

  // timer
  useEffect(() => {
    if (finished || startedAt == null) return;
    tickRef.current = setInterval(() => setDuration(Math.floor((Date.now() - startedAt) / 1000)), 1000);
    return () => clearInterval(tickRef.current);
  }, [finished, startedAt]);

  if (questions === null) {
    return (
      <div className="fade" style={S.finish}>
        <div style={{ ...S.finishMark, animation: "pulse-glow 1.6s infinite", borderRadius: "50%", width: 56, height: 56, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto" }}>🧠</div>
        <h2 style={{ margin: "12px 0 4px" }}>Building your exam…</h2>
        <p style={S.sub}>Writing realistic answer choices for each question. This takes a few seconds.</p>
      </div>
    );
  }

  if (!questions.length) {
    return (
      <div className="fade" style={S.finish}>
        <div style={S.finishMark}>📊</div>
        <h2 style={{ margin: "8px 0" }}>No cards to test</h2>
        <p style={S.sub}>Add at least one (unsuspended) card to build an exam.</p>
        <button className="primary" onClick={onDone}>Back to decks</button>
      </div>
    );
  }

  const q = questions[idx];
  const picked = answers[q.cardId];
  const pick = (opt) => {
    if (picked != null) return;
    setAnswers({ ...answers, [q.cardId]: opt });
  };
  const next = () => {
    if (idx + 1 < questions.length) setIdx(idx + 1);
    else {
      const correctCount = questions.filter((x) => answers[x.cardId] === x.correct).length;
      const pct = Math.round((correctCount / questions.length) * 100);
      if (onExamResult) onExamResult(pct, questions.length);
      if (pct >= 80) fireConfetti();
      setFinished(true);
    }
  };
  const prev = () => { if (idx > 0) setIdx(idx - 1); };

  if (finished) {
    const correctCount = questions.filter((x) => answers[x.cardId] === x.correct).length;
    const pct = Math.round((correctCount / questions.length) * 100);
    const grade = pct >= 90 ? "A" : pct >= 80 ? "B" : pct >= 70 ? "C" : pct >= 60 ? "D" : "F";
    return (
      <div className="fade">
        <div style={{ ...S.examResultCard, ...(pct >= 80 ? S.examGood : pct >= 60 ? S.examWarn : S.examBad) }}>
          <div style={S.examGrade}>{grade}</div>
          <div style={S.examScore}>{pct}%</div>
          <div style={S.examScoreLine}>{correctCount} of {questions.length} correct</div>
          <div style={S.hint}>Finished in {Math.floor(duration / 60)}m {duration % 60}s</div>
        </div>

        <div className="panel-box" style={S.panelBox}>
          <div style={S.panelTitle}>Question review</div>
          {questions.map((x, i) => {
            const pickedOpt = answers[x.cardId];
            const right = pickedOpt === x.correct;
            return (
              <div key={x.cardId} style={{ ...S.examReviewRow, borderColor: right ? "var(--success-border)" : "var(--danger-border)" }}>
                <div style={S.examReviewQ}>
                  <span style={S.examReviewIdx}>{i + 1}.</span> <MathText text={x.front} />
                </div>
                {x.frontImage && <img src={x.frontImage} alt="" style={{ ...S.cardRowThumb, maxHeight: 80 }} />}
                <div style={{ fontSize: 13, marginTop: 4 }}>
                  Your answer: <b style={{ color: right ? "var(--success-text)" : "var(--danger-text)" }}>{pickedOpt ? <MathText text={pickedOpt} /> : "(skipped)"}</b>
                </div>
                {!right && <div style={{ fontSize: 13, color: "var(--success-text)" }}>Correct: <b><MathText text={x.correct} /></b></div>}
              </div>
            );
          })}
        </div>

        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="ghost" onClick={onDone}>Back to decks</button>
          <button className="primary" onClick={() => setNonce((n) => n + 1)}>New exam</button>
        </div>
      </div>
    );
  }

  return (
    <div className="fade">
      <div style={S.examHeader}>
        <span style={{ color: "var(--muted)", fontSize: 13 }}>
          Exam — {deck.name}
          <span style={{ color: "var(--muted2)", marginLeft: 6 }}>{usedFallback ? "· offline choices" : "· AI choices"}</span>
        </span>
        <span style={{ color: "var(--muted2)", fontSize: 13 }}>Q {idx + 1} / {questions.length} · {Math.floor(duration / 60)}m {duration % 60}s</span>
      </div>
      <div style={S.progress}><div style={{ ...S.progressBar, width: `${(Object.keys(answers).length / questions.length) * 100}%` }} /></div>

      <div className="study-card" style={S.studyCard}>
        <div style={S.faceLabel}>QUESTION {idx + 1}</div>
        {q.frontImage && <img src={q.frontImage} alt="" style={S.studyImg} />}
        <div className="face-text" style={S.faceText}><MathText text={q.front} /></div>
      </div>

      <div className="mc-grid" style={S.mcGrid}>
        {q.options.map((opt, i) => {
          let cls = "mc-opt";
          if (picked != null) {
            if (opt === q.correct) cls += " right";
            else if (opt === picked) cls += " wrong";
          }
          return (
            <button key={i} className={cls} disabled={picked != null} onClick={() => pick(opt)}><MathText text={opt} /></button>
          );
        })}
      </div>

      <div style={{ display: "flex", gap: 8, marginTop: 14, justifyContent: "space-between" }}>
        <button className="ghost" onClick={prev} disabled={idx === 0}>← Previous</button>
        <button className="ghost" onClick={() => { if (confirm("Quit exam? Your progress will be lost.")) onDone(); }}>Quit</button>
        <button className="primary" onClick={next} disabled={picked == null}>
          {idx + 1 === questions.length ? "Finish exam" : "Next →"}
        </button>
      </div>
    </div>
  );
}

/* ---------------- LIBRARY ---------------- */
function Library({ decks, onOpenDeck, onSaveDeck }) {
  const [q, setQ] = useState("");
  const [tagF, setTagF] = useState("");
  const [typeF, setTypeF] = useState("any");
  const [dueF, setDueF] = useState("any");
  const [masteryF, setMasteryF] = useState("any");
  const [statusF, setStatusF] = useState("active");

  const allCards = useMemo(() => {
    const out = [];
    Object.values(decks).forEach((d) => d.cards.forEach((c) => out.push({ ...c, deckId: d.id, deckName: d.name })));
    return out;
  }, [decks]);

  const allTags = useMemo(() => {
    const s = new Set(); allCards.forEach((c) => (c.tags || []).forEach((t) => s.add(t))); return [...s].sort();
  }, [allCards]);

  const now = Date.now();
  const filtered = allCards.filter((c) => {
    if (statusF === "active" && c.suspended) return false;
    if (statusF === "suspended" && !c.suspended) return false;
    if (statusF === "leech" && !isLeech(c)) return false;
    if (q) { const hay = (c.front + " " + c.back + " " + (c.tags || []).join(" ")).toLowerCase(); if (!hay.includes(q.toLowerCase())) return false; }
    if (tagF && !(c.tags || []).includes(tagF)) return false;
    if (typeF !== "any" && (c.type || "basic") !== typeF) return false;
    if (dueF === "due" && !(!c.due || c.due <= now)) return false;
    if (dueF === "later" && (!c.due || c.due <= now)) return false;
    const m = masteryOf(c);
    if (masteryF === "weak" && m >= 0.5) return false;
    if (masteryF === "strong" && m < 0.75) return false;
    return true;
  });

  const toggleSuspend = (card) => {
    const deck = decks[card.deckId];
    onSaveDeck({ ...deck, cards: deck.cards.map((c) => c.id === card.id ? { ...c, suspended: !c.suspended } : c) });
  };

  return (
    <div className="fade">
      <h1 className="app-h1" style={S.h1}>Library</h1>
      <p style={S.sub}>{allCards.length} cards across {Object.keys(decks).length} decks.</p>

      <input style={S.search} placeholder="Search cards…" value={q} onChange={(e) => setQ(e.target.value)} />
      <div style={S.filterRow}>
        <select className="sel" value={tagF} onChange={(e) => setTagF(e.target.value)}>
          <option value="">all tags</option>
          {allTags.map((t) => <option key={t} value={t}>{t}</option>)}
        </select>
        <select className="sel" value={typeF} onChange={(e) => setTypeF(e.target.value)}>
          <option value="any">any type</option><option value="basic">basic</option><option value="cloze">cloze</option>
        </select>
        <select className="sel" value={dueF} onChange={(e) => setDueF(e.target.value)}>
          <option value="any">any due</option><option value="due">due now</option><option value="later">later</option>
        </select>
        <select className="sel" value={masteryF} onChange={(e) => setMasteryF(e.target.value)}>
          <option value="any">any mastery</option><option value="weak">weak</option><option value="strong">strong</option>
        </select>
        <select className="sel" value={statusF} onChange={(e) => setStatusF(e.target.value)}>
          <option value="active">active</option><option value="suspended">suspended</option><option value="leech">leeches</option><option value="all">all</option>
        </select>
      </div>

      <div style={S.libCount}>{filtered.length} matching{filtered.length > 300 ? " · showing first 300 (narrow your filters to see more)" : ""}</div>
      {allCards.length === 0 ? (
        <div className="lib-empty">
          <div className="lib-empty-ic">📚</div>
          <div className="lib-empty-t">Your library is empty</div>
          <div className="lib-empty-d">Cards from every deck show up here, where you can search, filter, and manage them. Create a deck to get started.</div>
        </div>
      ) : filtered.length === 0 ? (
        <div className="lib-empty">
          <div className="lib-empty-ic">🔍</div>
          <div className="lib-empty-t">No cards match these filters</div>
          <div className="lib-empty-d">Try widening your search or clearing the filters.</div>
          <button className="ghost" style={{ marginTop: 14 }} onClick={() => { setQ(""); setTagF(""); setTypeF("any"); setDueF("any"); setMasteryF("any"); setStatusF("active"); }}>Clear filters</button>
        </div>
      ) : (
      <div>
        {filtered.slice(0, 300).map((c) => {
          const faces = c.type === "cloze" ? clozeCardFaces(c) : { front: c.front, back: c.back };
          return (
          <div key={c.id} style={{ ...S.cardRow, opacity: c.suspended ? 0.6 : 1 }}>
            <div style={{ flex: 1 }}>
              <div style={S.cf}><MathText text={faces.front} />
                <span style={S.typeTag}>{c.type || "basic"}{c.type === "cloze" && c.clozeNum ? "·c" + c.clozeNum : ""}</span>
                <PhaseBadge card={c} />
                {isLeech(c) && <span style={{ ...S.tag, background: "var(--warn-bg)", color: "var(--warn-text)" }}>🐛 leech</span>}
                {c.suspended && <span style={{ ...S.tag, background: "var(--surface-2)", color: "var(--muted)" }}>suspended</span>}
                {(c.frontImage || c.backImage) && <span style={S.tag} title="has images">🖼️</span>}
                {(c.frontAudio || c.backAudio) && <span style={S.tag} title="has audio">🔊</span>}
              </div>
              {c.frontImage && <img src={c.frontImage} alt="front" style={S.cardRowThumb} />}
              {c.frontAudio && <button className="ghost" style={{ padding: "3px 9px", fontSize: 12, marginTop: 4 }} onClick={() => playAudio(c.frontAudio)}>▶ front audio</button>}
              <div style={S.cb}><MathText text={faces.back} /></div>
              {c.backImage && <img src={c.backImage} alt="back" style={S.cardRowThumb} />}
              {c.backAudio && <button className="ghost" style={{ padding: "3px 9px", fontSize: 12, marginTop: 4 }} onClick={() => playAudio(c.backAudio)}>▶ back audio</button>}
              <div style={S.tagRow}>
                <span style={S.deckChip} onClick={() => onOpenDeck(c.deckId)}>{c.deckName}</span>
                {(c.tags || []).map((t) => <span key={t} style={S.tag}>{t}</span>)}
                <span style={S.mastChip}>{Math.round(masteryOf(c) * 100)}%</span>
              </div>
            </div>
            <button className="icon" title={c.suspended ? "unsuspend" : "suspend"} onClick={() => toggleSuspend(c)}>{c.suspended ? "▶" : "⏸"}</button>
          </div>
          );
        })}
      </div>
      )}
    </div>
  );
}

/* ---------------- DASHBOARD ---------------- */
function Dashboard({ decks, log, settings, stats, levelInfo, liveStats }) {
  const allCards = useMemo(() => { const o = []; Object.values(decks).forEach((d) => d.cards.forEach((c) => o.push({ ...c, deckId: d.id }))); return o; }, [decks]);
  const now = Date.now();
  const cleanLog = useMemo(() => log.filter((e) => !e.freeze), [log]);
  const [activityRange, setActivityRange] = useState(365); // days shown in the heatmap

  // forecast
  const forecast = new Array(14).fill(0);
  allCards.forEach((c) => {
    if (c.suspended) return;
    if (!c.due) { forecast[0]++; return; }
    const d = Math.floor((c.due - now) / DAY);
    if (d < 0) forecast[0]++; else if (d < 14) forecast[d]++;
  });
  const maxF = Math.max(1, ...forecast);

  const mastery = allCards.length ? Math.round((allCards.reduce((s, c) => s + masteryOf(c), 0) / allCards.length) * 100) : 0;

  // Weakest areas — group by tag when cards are tagged; otherwise fall back to
  // grouping by deck so this always shows something useful (every card has a deck).
  const tagStats = {};
  allCards.forEach((c) => (c.tags || []).forEach((t) => {
    (tagStats[t] = tagStats[t] || []).push(masteryOf(c));
  }));
  const tagGroups = Object.entries(tagStats).filter(([, a]) => a.length >= 2)
    .map(([t, a]) => ({ t, m: a.reduce((s, x) => s + x, 0) / a.length, n: a.length }))
    .sort((a, b) => a.m - b.m);

  let weakAreas, weakBy;
  if (tagGroups.length >= 2) {
    weakAreas = tagGroups.slice(0, 6); weakBy = "tag";
  } else {
    // per-deck fallback
    weakAreas = Object.values(decks).map((d) => {
      const cs = d.cards.filter((c) => !c.suspended);
      if (!cs.length) return null;
      return { t: d.name, m: cs.reduce((s, c) => s + masteryOf(c), 0) / cs.length, n: cs.length };
    }).filter(Boolean).sort((a, b) => a.m - b.m).slice(0, 6);
    weakBy = "deck";
  }

  // year heatmap (last 365 days) — also capture per-day review details for tooltip
  const year = [];
  const dayDetails = {}; // { key: { n, again, hard, good, easy, retention, decksTouched, totalMs } }
  cleanLog.forEach((e) => {
    const k = todayKey(new Date(e.t));
    if (!dayDetails[k]) dayDetails[k] = { n: 0, again: 0, hard: 0, good: 0, easy: 0, totalMs: 0, decks: new Set() };
    const d = dayDetails[k];
    d.n++;
    if (e.q === 0) d.again++; else if (e.q === 1) d.hard++; else if (e.q === 2) d.good++; else if (e.q === 3) d.easy++;
    d.totalMs += e.ms || 0;
    if (e.deckId) d.decks.add(e.deckId);
  });
  for (let i = 364; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = todayKey(d);
    const det = dayDetails[k] || { n: 0, again: 0, hard: 0, good: 0, easy: 0, totalMs: 0, decks: new Set() };
    const correct = det.good + det.easy + det.hard;
    const retention = det.n ? Math.round((correct / det.n) * 100) : null;
    const avgSec = det.n ? Math.round(det.totalMs / det.n / 100) / 10 : null;
    year.push({ k, n: det.n, date: d, again: det.again, hard: det.hard, good: det.good, easy: det.easy, retention, avgSec, deckCount: det.decks.size });
  }
  // the heatmap shows the most recent `activityRange` days
  const activityCells = year.slice(-activityRange);
  const activityMax = Math.max(1, ...activityCells.map((h) => h.n));
  const activityReviews = activityCells.reduce((s, h) => s + h.n, 0);
  const activityActiveDays = activityCells.filter((h) => h.n > 0).length;

  // hardest cards (by lapses, then by recent fail rate)
  const cardReviews = {};
  cleanLog.forEach((e) => { (cardReviews[e.cardId] = cardReviews[e.cardId] || []).push(e); });
  const hardest = allCards
    .map((c) => {
      const reviews = cardReviews[c.id] || [];
      const last20 = reviews.slice(-20);
      const failPct = last20.length ? last20.filter((e) => e.q === 0).length / last20.length : 0;
      return { card: c, lapses: c.lapses || 0, reviews: reviews.length, failPct };
    })
    .filter((x) => x.lapses > 0 || x.failPct > 0.3)
    .sort((a, b) => (b.lapses - a.lapses) || (b.failPct - a.failPct))
    .slice(0, 8);

  // time-of-day distribution (24 buckets)
  const hourBuckets = new Array(24).fill(0);
  cleanLog.forEach((e) => { hourBuckets[new Date(e.t).getHours()]++; });
  const maxHr = Math.max(1, ...hourBuckets);

  // phase breakdown
  const phaseCounts = { new: 0, learning: 0, relearning: 0, review: 0 };
  allCards.forEach((c) => { phaseCounts[c.phase || "new"] = (phaseCounts[c.phase || "new"] || 0) + 1; });
  const phaseOrder = ["new", "learning", "relearning", "review"];

  return (
    <div className="fade">
      <h1 className="app-h1" style={S.h1}>Stats</h1>
      <p style={S.sub}>From {cleanLog.length} reviews logged · Level {levelInfo.lvl}</p>

      <div style={S.statRow}>
        <Stat label="Streak" value={liveStats.streak + (liveStats.streak === 1 ? " day" : " days")} />
        <Stat label="Retention" value={liveStats.retention100 + "%"} hint="last 100 reviews" />
        <Stat label="Mastery" value={mastery + "%"} hint="all cards" />
        <Stat label="Cards" value={allCards.length} />
      </div>

      <div className="panel-box" style={S.panelBox}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
          <div style={{ ...S.panelTitle, marginBottom: 0 }}>Activity — last {activityRange} {activityRange === 1 ? "day" : "days"}</div>
          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
            {[365, 180, 60, 30, 7].map((r) => (
              <button key={r} className={"range-tab" + (activityRange === r ? " on" : "")} onClick={() => setActivityRange(r)}>{r}</button>
            ))}
          </div>
        </div>
        <HeatmapYear year={activityCells} maxYr={activityMax} />
        <div style={{ ...S.hint, marginTop: 8 }}>
          {activityReviews} review{activityReviews === 1 ? "" : "s"} over {activityActiveDays} active {activityActiveDays === 1 ? "day" : "days"} · hover any square for that day's breakdown.
        </div>
      </div>

      <div className="panel-box" style={S.panelBox}>
        <div style={S.panelTitle}>Card states</div>
        <div style={S.segBar}>
          {phaseOrder.map((p) => phaseCounts[p] > 0 && (
            <div key={p} title={`${phaseCounts[p]} ${p}`}
                 style={{ ...S.seg, background: PHASE_META[p].fg, flex: phaseCounts[p] }} />
          ))}
        </div>
        <div style={S.segLegend}>
          {phaseOrder.map((p) => (
            <span key={p}><b style={{ color: PHASE_META[p].fg }}>●</b> {phaseCounts[p]} {PHASE_META[p].label}</span>
          ))}
        </div>
      </div>

      <div className="panel-box" style={S.panelBox}>
        <div style={S.panelTitle}>Due over next 14 days</div>
        <div style={S.barWrap}>
          {forecast.map((n, i) => (
            <div key={i} style={S.barCol} title={`${n} due`}>
              <div style={{ ...S.bar, height: `${(n / maxF) * 70 + (n ? 4 : 0)}px` }} />
              <div style={S.barLabel}>{i === 0 ? "now" : i}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="panel-box" style={S.panelBox}>
        <div style={S.panelTitle}>When you study</div>
        <div style={S.barWrap}>
          {hourBuckets.map((n, i) => (
            <div key={i} style={S.barCol} title={`${i}:00 — ${n} reviews`}>
              <div style={{ ...S.bar, height: `${(n / maxHr) * 60 + (n ? 4 : 0)}px`, background: "var(--success)" }} />
              <div style={S.barLabel}>{i % 6 === 0 ? i : ""}</div>
            </div>
          ))}
        </div>
        <div style={{ ...S.hint, marginTop: 6 }}>Hour of day (00-23). When are you sharpest?</div>
      </div>

      <div className="panel-box" style={S.panelBox}>
        <div style={S.panelTitle}>Hardest cards</div>
        {hardest.length === 0 ? <div style={S.muted2}>No problem cards yet — keep going!</div> : (
          hardest.map((h) => {
            const faces = h.card.type === "cloze" ? clozeCardFaces(h.card) : { front: h.card.front, back: h.card.back };
            return (
              <div key={h.card.id} style={S.hardRow}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{faces.front}</div>
                  <div style={S.cb}>{faces.back}</div>
                </div>
                <div style={S.hardStats}>
                  <span style={{ color: "var(--danger-text)" }}>{h.lapses} lapses</span>
                  <span style={S.muted2}>{h.reviews} reviews</span>
                </div>
              </div>
            );
          })
        )}
      </div>

      <div className="panel-box" style={S.panelBox}>
        <div style={S.panelTitle}>Weakest areas</div>
        {weakAreas.length === 0 ? (
          <div style={S.muted2}>Study a few cards to see which areas need the most work.</div>
        ) : (
          <>
            <div style={{ ...S.hint, marginBottom: 8 }}>{weakBy === "tag" ? "Lowest-mastery tags — focus here next." : "Lowest-mastery decks — focus here next."}</div>
            {weakAreas.map((w) => {
              const pct = Math.round(w.m * 100);
              const col = pct < 50 ? "var(--danger)" : pct < 75 ? "var(--warn)" : "var(--success)";
              return (
                <div key={w.t} style={S.weakRow}>
                  <span style={weakBy === "tag" ? S.tag : { fontWeight: 600, fontSize: 13.5, minWidth: 90, maxWidth: 160, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{w.t}</span>
                  <div style={S.weakBarTrack}><div style={{ ...S.weakBarFill, width: `${pct}%`, background: col }} /></div>
                  <span style={S.weakPct}>{pct}%</span>
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}
function Stat({ label, value, hint }) {
  return (
    <div style={S.stat}>
      <div style={S.statValue}>{value}</div>
      <div style={S.statLabel}>{label}</div>
      {hint && <div style={S.statHint}>{hint}</div>}
    </div>
  );
}

// Rich-hover year heatmap. Hovering a cell pins a tooltip with the
// exact review count plus a breakdown by grade, retention %, decks studied,
// and average time per card for that day.
function HeatmapYear({ year, maxYr }) {
  const [hov, setHov] = useState(null);
  const wrapRef = useRef(null);
  const onEnter = (h, ev) => {
    const wrap = wrapRef.current;
    if (!wrap) return setHov({ ...h });
    const rect = wrap.getBoundingClientRect();
    const cell = ev.currentTarget.getBoundingClientRect();
    setHov({ ...h, x: cell.left - rect.left + cell.width / 2, y: cell.top - rect.top });
  };
  const onLeave = () => setHov(null);
  const fmtDate = (d) => d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric", year: "numeric" });
  const cols = Math.max(1, Math.ceil(year.length / 7)); // 7 rows (days of week), columns = weeks shown
  // Pick a fixed square cell size based on how many weeks we're showing.
  // This keeps squares as squares — never stretched into tall rectangles.
  const cellPx = year.length <= 14 ? 32 : year.length <= 35 ? 24 : year.length <= 70 ? 18 : year.length <= 200 ? 14 : 11;

  return (
    <div ref={wrapRef} style={{ position: "relative", overflowX: "auto" }}>
      <div style={{ display: "grid", gridTemplateColumns: `repeat(${cols}, ${cellPx}px)`, gridTemplateRows: `repeat(7, ${cellPx}px)`, gridAutoFlow: "column", gap: 2, width: "max-content" }}>
        {year.map((h) => (
          <div key={h.k}
               onMouseEnter={(ev) => onEnter(h, ev)}
               onMouseLeave={onLeave}
               style={{ width: cellPx, height: cellPx, borderRadius: 2, cursor: "pointer", background: h.n === 0 ? "var(--border-light)" : `rgba(59,130,196,${0.25 + 0.75 * (h.n / maxYr)})` }} />
        ))}
      </div>
      {hov && (
        <div style={{ ...S.heatTooltip, left: Math.max(8, Math.min((wrapRef.current?.clientWidth || 600) - 200, (hov.x || 0) - 100)), top: (hov.y || 0) - 105 }}>
          <div style={S.heatTooltipDate}>{fmtDate(hov.date)}</div>
          <div style={S.heatTooltipNum}>
            <b>{hov.n}</b> review{hov.n === 1 ? "" : "s"}
          </div>
          {hov.n > 0 ? (
            <>
              <div style={S.heatTooltipRow}>
                <span style={{ color: "var(--danger-text)" }}>Again {hov.again}</span>
                <span style={{ color: "var(--warn-text)" }}>Hard {hov.hard}</span>
                <span style={{ color: "var(--success-text)" }}>Good {hov.good}</span>
                <span style={{ color: "var(--accent)" }}>Easy {hov.easy}</span>
              </div>
              <div style={S.heatTooltipFoot}>
                {hov.retention != null && <span>Retention {hov.retention}%</span>}
                {hov.deckCount > 0 && <span>· {hov.deckCount} deck{hov.deckCount === 1 ? "" : "s"}</span>}
                {hov.avgSec != null && hov.avgSec > 0 && <span>· avg {hov.avgSec}s/card</span>}
              </div>
            </>
          ) : (
            <div style={S.heatTooltipFoot}>No reviews this day.</div>
          )}
        </div>
      )}
    </div>
  );
}

/* ---------------- ACHIEVEMENTS ---------------- */
function Achievements({ stats, earned, levelInfo, xpTotal }) {
  const earnedSet = new Set(earned);
  // Group earned achievements by their "group" field for tidier display
  const unlockedByGroup = {};
  const lockedByGroup = {};
  for (const a of ACHIEVEMENTS) {
    const g = a.group || "Other";
    const bucket = earnedSet.has(a.id) ? unlockedByGroup : lockedByGroup;
    (bucket[g] = bucket[g] || []).push(a);
  }
  // Preferred display order, then append any other groups that exist (so new
  // achievement groups always render even if they're not in this list).
  const preferredOrder = ["Milestones", "Streaks", "Creator", "Mastery", "Habits", "Lifestyle", "Features", "Sharing", "Dedication", "Scholarship", "Other"];
  const allGroups = new Set();
  for (const a of ACHIEVEMENTS) allGroups.add(a.group || "Other");
  const orderedGroups = [
    ...preferredOrder.filter((g) => allGroups.has(g)),
    ...[...allGroups].filter((g) => !preferredOrder.includes(g)),
  ];

  const lvl = levelInfo ? levelInfo.lvl : 1;
  const nextLevelXp = levelInfo ? levelInfo.levelNeeds : 50;
  const xpInto = levelInfo ? levelInfo.intoLevel : 0;
  const pct = Math.min(100, Math.round((xpInto / Math.max(1, nextLevelXp)) * 100));
  const earnedPerks = levelPerksUpTo(lvl);
  const upcomingPerks = levelPerksFuture(lvl).slice(0, 4);

  return (
    <div className="fade">
      <h1 className="app-h1" style={S.h1}>Achievements</h1>
      <p style={S.sub}>{earned.length} of {ACHIEVEMENTS.length} unlocked</p>
      <div style={S.progress}><div style={{ ...S.progressBar, width: `${(earned.length / ACHIEVEMENTS.length) * 100}%`, background: "var(--gold)" }} /></div>

      {/* Level perk panel — shows what your current level grants and what's next */}
      <div style={{ ...S.panelBox, marginTop: 20, borderColor: "var(--gold)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 12, marginBottom: 12 }}>
          <div>
            <div style={S.panelTitle}>Level {lvl} · {titleForLevel(lvl)}</div>
            <div style={S.hint}>{xpTotal != null ? `${xpTotal} XP total` : ""}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={S.hint}>{xpInto} / {nextLevelXp} XP to Level {lvl + 1}</div>
          </div>
        </div>
        <div style={{ height: 10, background: "var(--surface-2)", borderRadius: 10, overflow: "hidden", marginBottom: 14 }}>
          <div style={{ height: "100%", width: `${pct}%`, background: "linear-gradient(90deg, var(--gold), var(--warn))", borderRadius: 10, transition: "width .4s" }} />
        </div>

        <div style={S.subjectLabel}>Perks you've earned</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
          {earnedPerks.length === 0 ? <div style={S.muted2}>Reach Level 1 to start earning perks.</div> : earnedPerks.map((p) => (
            <div key={p.level} style={S.perkRow}>
              <div style={S.perkBadge}>Lv {p.level}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{p.title}</div>
                <div style={S.hint}>{p.perk}</div>
              </div>
              <span style={S.achCheck}>✓</span>
            </div>
          ))}
        </div>

        {upcomingPerks.length > 0 && (
          <>

/* ---------------- GENERATE ---------------- */
const BATCH = 12;            // smaller batches => responses never hit the token cap
const MAX_AVOID = 42;       // how many existing fronts we list as "don't repeat"
function parseCards(text) {
  if (!text) return [];
  let t = text.trim().replace(/```json/gi, "").replace(/```/g, "").trim();
  const s = t.indexOf("["), e = t.lastIndexOf("]");
  if (s !== -1 && e !== -1 && e > s) t = t.slice(s, e + 1);

  const normalize = (arr) => arr
    .filter((c) => c && (c.front ?? c.f ?? c.q) != null && (c.back ?? c.b ?? c.a) != null)
    .map((c) => ({ front: String(c.front ?? c.f ?? c.q).trim(), back: String(c.back ?? c.b ?? c.a).trim() }))
    .filter((c) => c.front && c.back);

  try { return normalize(JSON.parse(t)); } catch (e1) {}
  try {
    const cleaned = t.replace(/[“”]/g, '"').replace(/[‘’]/g, "'").replace(/,\s*([\]}])/g, "$1");
    return normalize(JSON.parse(cleaned));
  } catch (e2) {}

  const out = [];
  const objRe = /\{[^{}]*\}/g;
  const matches = t.match(objRe) || [];
  for (const m of matches) {
    try {
      const cleaned = m.replace(/[“”]/g, '"').replace(/[‘’]/g, "'").replace(/,\s*([\]}])/g, "$1");
      const obj = JSON.parse(cleaned);
      const f = obj.front ?? obj.f ?? obj.q, b = obj.back ?? obj.b ?? obj.a;
      if (f != null && b != null) { const fr = String(f).trim(), bk = String(b).trim(); if (fr && bk) out.push({ front: fr, back: bk }); }
    } catch (e3) {}
  }
  return out;
}

function parseClozeCards(text) {
  if (!text) return [];
  let t = text.trim().replace(/```json/gi, "").replace(/```/g, "").trim();
  const s = t.indexOf("["), e = t.lastIndexOf("]");
  if (s !== -1 && e !== -1 && e > s) t = t.slice(s, e + 1);
  const clean = (x) => x.replace(/[“”]/g, '"').replace(/[‘’]/g, "'").replace(/,\s*([\]}])/g, "$1");
  const take = (arr) => arr
    .map((o) => String(o.text ?? o.front ?? o.sentence ?? "").trim())
    .filter((tx) => hasCloze(tx))
    .map((tx) => ({ type: "cloze", front: tx, back: "" }));
  try { return take(JSON.parse(clean(t))); } catch {}
  const out = [];
  for (const m of (t.match(/\{[^{}]*\}/g) || [])) {
    try { const o = JSON.parse(clean(m)); const tx = String(o.text ?? o.front ?? o.sentence ?? "").trim(); if (hasCloze(tx)) out.push({ type: "cloze", front: tx, back: "" }); } catch {}
  }
  return out;
}

const REVIEW_BATCH = 8;
function sanitizeFlag(raw, byId) {
  if (!raw || typeof raw !== "object") return null;
  const id = String(raw.id ?? raw.cardId ?? "").trim();
  const orig = byId[id];
  if (!orig) return null;
  const issue = String(raw.issue ?? raw.problem ?? "unclear").slice(0, 40);
  const reason = String(raw.reason ?? raw.why ?? "").slice(0, 200);
  let front = raw.front ?? raw.newFront ?? raw.suggestedFront;
  let back = raw.back ?? raw.newBack ?? raw.suggestedBack;
  front = front == null ? null : String(front).trim();
  back = back == null ? null : String(back).trim();

  if (orig.type === "cloze") {
    if (!front || !hasCloze(front)) front = null;
    back = null;
  } else {
    if (!front) front = null;
    if (!back) back = null;
  }
  const sameFront = front == null || front === orig.front;
  const sameBack = back == null || back === orig.back;
  if (sameFront && sameBack) return null;
  if ((front && front.length > 400) || (back && back.length > 400)) return null;

  return { id, issue, reason, front, back, origFront: orig.front, origBack: orig.back, type: orig.type };
}

async function reviewBatch(batch) {
  const byId = {};
  batch.forEach((c) => { byId[c.id] = c; });
  const payload = batch.map((c) => ({
    id: c.id, front: c.front,
    back: c.type === "cloze" ? "(cloze card)" : c.back,
    type: c.type || "basic",
  }));
  const out = await callAI(
    `You are reviewing flashcards for quality. Flag ONLY cards with real problems:\n` +
    `- too vague (untestable, e.g. "Explain the economy")\n` +
    `- too long (more than one idea crammed in)\n` +
    `- double-barreled (tests two things at once)\n` +
    `- confusing or ambiguous wording\n` +
    `For each FLAGGED card, give a short reason and a rewritten version that fixes it WITHOUT losing meaning. ` +
    `For cloze cards (type "cloze") keep the {{braces}} in your rewritten front and do not add a back. ` +
    `Do NOT flag cards that are already good. Echo back each card's exact "id".\n` +
    `Respond ONLY as a JSON array (empty array if all good), no markdown:\n` +
    `[{"id":"<id>","issue":"<short>","reason":"<why>","front":"<rewrite>","back":"<rewrite or omit for cloze>"}]\n\n` +
    `CARDS:\n${JSON.stringify(payload)}`
  );

  let t = out.trim().replace(/```json/gi, "").replace(/```/g, "").trim();
  const s = t.indexOf("["), e = t.lastIndexOf("]");
  if (s !== -1 && e !== -1 && e > s) t = t.slice(s, e + 1);
  let arr = [];
  try { arr = JSON.parse(t.replace(/[“”]/g, '"').replace(/[‘’]/g, "'").replace(/,\s*([\]}])/g, "$1")); }
  catch {
    const ms = t.match(/\{[^{}]*\}/g) || [];
    for (const mm of ms) { try { arr.push(JSON.parse(mm.replace(/,\s*\}/, "}"))); } catch {} }
  }
  if (!Array.isArray(arr)) return [];
  return arr.map((r) => sanitizeFlag(r, byId)).filter(Boolean);
}

function Generate({ onSave, onCancel }) {
  const [prompt, setPrompt] = useState("");
  const [name, setName] = useState("");
  const [cards, setCards] = useState([]);
  const [style, setStyle] = useState("qa");          // "qa" | "cloze" | "reverse"
  const [status, setStatus] = useState("idle");
  const [progress, setProgress] = useState({ have: 0, want: 0 });
  const [error, setError] = useState("");
  const [notice, setNotice] = useState("");          // soft warning (e.g. "got 96 of 100")
  const [topUpBusy, setTopUpBusy] = useState(false);
  const usage = useUsage();
  const cancelRef = useRef(false);
  const styleRef = useRef(style);
  useEffect(() => { styleRef.current = style; }, [style]);

  const EXAMPLES = {
    qa: ["100 cards of simple Japanese to English (common words)", "50 key macroeconomics terms with short definitions",
         "30 accounting vocab cards: term then plain-English meaning"],
    reverse: ["40 Spanish travel phrases ⇄ English", "30 chemical elements ⇄ symbols", "25 capital cities ⇄ countries"],
    cloze: ["20 cloze facts about the French Revolution", "30 cloze cards on cell biology key terms", "15 cloze sentences on the water cycle"],
  };
  const STYLE_BLURB = {
    qa: "Front/back question & answer.",
    reverse: "Two cards per item — tested both directions (term ⇄ meaning).",
    cloze: "Fill-in-the-blank sentences; each {{c1}}/{{c2}} becomes its own card.",
  };

  function buildPrompt(activeStyle, need, basePrompt, avoid) {
    if (activeStyle === "cloze") {
      return (
        `You generate CLOZE-DELETION flashcards.\n` +
        `USER REQUEST: "${basePrompt}"\n` +
        `Create exactly ${need} NEW cloze sentences. Each is ONE short factual sentence with the testable part hidden using numbered cloze syntax: {{c1::hidden answer}} (add {{c2::...}} in the SAME sentence ONLY when two facts naturally belong together).\n` +
        `The un-hidden words must give enough context to recall the answer. Keep sentences short and atomic.\n` +
        `Every sentence must be DISTINCT from each other and from the list below — no paraphrases, no repeats.\n` +
        (avoid ? `ALREADY USED (never repeat these):\n${avoid}\n` : "") +
        `Return EXACTLY ${need} items. Respond ONLY as a JSON array, no markdown, no explanation:\n[{"text":"The capital of France is {{c1::Paris}}."}]`
      );
    }
    if (activeStyle === "reverse") {
      return (
        `You generate REVERSIBLE flashcards (each pair is tested in BOTH directions).\n` +
        `USER REQUEST: "${basePrompt}"\n` +
        `Create exactly ${need} NEW pairs where BOTH front→back and back→front work as a sensible prompt (e.g. term ⇄ definition, word ⇄ translation, symbol ⇄ name, country ⇄ capital). Avoid pairs that only make sense one way.\n` +
        `Keep both sides short. Every pair must be DISTINCT from each other and from the list below — no paraphrases, no repeats.\n` +
        (avoid ? `ALREADY USED (never repeat these fronts):\n${avoid}\n` : "") +
        `Return EXACTLY ${need} items. Respond ONLY as a JSON array, no markdown, no explanation:\n[{"front":"...","back":"..."}]`
      );
    }
    return (
      `You are a flashcard generator. Create exactly ${need} NEW flashcards.\n` +
      `USER REQUEST: "${basePrompt}"\n` +
      `CRITICAL: Follow the user's requested format EXACTLY. If they ask for romanization, include it. If they ask for a specific layout, use it. If they ask for Japanese with romanization (romaji), put the Japanese + romaji on the front, English on the back.\n` +
      `FRONT: whatever the user asked to be on the front\n` +
      `BACK: whatever the user asked to be on the back\n` +
      `If the subject is mathematical/scientific, write formulas as LaTeX wrapped in $…$ (inline) or $$…$$ (block) — e.g. $E = mc^2$. Otherwise use plain text.\n` +
      `Every card must be DISTINCT from each other and from the list below — no paraphrases, no repeats.\n` +
      (avoid ? `ALREADY USED (never repeat these fronts):\n${avoid}\n` : "") +
      `Return EXACTLY ${need} items. Respond ONLY as a JSON array, no explanation, no markdown:\n[{"front":"...","back":"..."}]`
    );
  }

  // Core generator. Appends to `existing` until it reaches `want` (or stalls).
  async function generateInto(existing, want, basePrompt, onTick) {
    const activeStyle = styleRef.current;
    const collected = existing.slice();
    const seen = new Set(collected.map((c) => (c.front || "").toLowerCase()));
    let stalls = 0;            // consecutive rounds that added nothing new
    let batchSize = BATCH;
    let rounds = 0;
    const maxRounds = Math.ceil(want / Math.max(4, Math.floor(BATCH / 2))) + 8;

    while (collected.length < want && rounds < maxRounds && stalls < 4) {
      if (cancelRef.current) break;
      rounds++;
      const need = Math.min(batchSize, want - collected.length);
      const avoid = collected.slice(-MAX_AVOID).map((c) => c.front).join(" | ");

      let text = "", truncated = false;
      try {
        const r = await callAIDetailed(buildPrompt(activeStyle, need, basePrompt, avoid),
          { maxTokens: MAX_OUTPUT_TOKENS, retries: 2 });
        text = r.text; truncated = r.truncated;
      } catch (e) {
        if (collected.length === 0 && rounds >= 3) throw e;
        stalls++;
        continue;
      }

      const parsed = activeStyle === "cloze" ? parseClozeCards(text) : parseCards(text);
      let added = 0;
      for (const c of parsed) {
        if (collected.length >= want) break;
        const k = (c.front || "").toLowerCase();
        if (!k || seen.has(k)) continue;
        seen.add(k);
        collected.push(activeStyle === "reverse" ? { ...c, type: "reverse" } : c);
        added++;
      }
      if (onTick) onTick(collected.slice());

      if (truncated && batchSize > 4) batchSize = Math.max(4, Math.floor(batchSize / 2));
      if (added === 0) { stalls++; if (batchSize > 6) batchSize = Math.max(6, Math.floor(batchSize * 0.75)); }
      else stalls = 0;
    }
    return collected;
  }

  const run = async () => {
    cancelRef.current = false;
    setStatus("working"); setError(""); setNotice(""); setCards([]);
    let want = 20, deckName = "AI deck";

    const explicit = (prompt.match(/\b(\d{1,4})\b/) || [])[1];
    if (explicit) {
      // The user told us the count — no need to spend an API round-trip on it.
      // Derive a tidy deck name locally from the prompt instead.
      want = parseInt(explicit, 10);
      let nm = prompt
        .replace(/\b\d{1,4}\b/, "")
        .replace(/\b(cards?|flashcards?|of|about|on|for|the|a|an)\b/gi, " ")
        .replace(/[(){}\[\]]/g, " ")          // drop brackets so we never leave a dangling one
        .replace(/\s+/g, " ").trim();
      if (nm.length > 40) nm = nm.slice(0, 40).replace(/\s+\S*$/, "");  // trim to a word boundary
      nm = (nm || prompt.slice(0, 40) || "AI deck").trim();
      deckName = nm.charAt(0).toUpperCase() + nm.slice(1);
    } else {
      // No explicit number — ask the AI for both count and a name.
      try {
        const meta = await callAI(
          `Extract the flashcard count and a short deck name from this request: "${prompt}". ` +
          `Respond ONLY as JSON: {"count": <integer the user asked for, default 20>, "name": "<short deck name>"}`,
          { maxTokens: 200, retries: 1 }
        );
        const m = JSON.parse(meta.replace(/```json|```/g, "").trim());
        if (m.count) want = parseInt(m.count, 10);
        if (m.name) deckName = m.name;
      } catch {
        deckName = prompt.slice(0, 40) || "AI deck";
      }
    }
    want = Math.min(300, Math.max(1, want || 20));

    setName(deckName); setProgress({ have: 0, want });

    try {
      const collected = await generateInto([], want, prompt, (cur) => {
        setCards(cur); setProgress({ have: cur.length, want });
      });
      setCards(collected); setProgress({ have: collected.length, want });
      if (!collected.length) { setStatus("error"); setError("No cards returned. Try rephrasing your request, or pick a different card style."); return; }
      if (cancelRef.current) setNotice(`Stopped — kept ${collected.length} card${collected.length === 1 ? "" : "s"}.`);
      else if (collected.length < want) {
        setNotice(`Generated ${collected.length} of ${want} unique cards. The topic may not have ${want} truly distinct items — use “Generate more” to try for the rest, or save what's here.`);
      }
      setStatus("done");
    } catch (e) {
      setStatus("error");
      if (e && e.code === "DAILY_LIMIT") setError("You've reached today's AI limit. It resets tomorrow — your decks and progress are unaffected.");
      else setError("Couldn't reach the AI: " + (e.message || "unknown error"));
    }
  };

  const stop = () => { cancelRef.current = true; };

  const topUp = async () => {
    setTopUpBusy(true); setNotice(""); cancelRef.current = false;
    const want = progress.want;
    try {
      const collected = await generateInto(cards, want, prompt, (cur) => {
        setCards(cur); setProgress({ have: cur.length, want });
      });
      setCards(collected); setProgress({ have: collected.length, want });
      if (collected.length < want) setNotice(`Now at ${collected.length} of ${want}. Couldn't find more unique cards for this topic.`);
    } catch (e) { setNotice("Couldn't generate more right now: " + (e.message || "AI error")); }
    setTopUpBusy(false);
  };

  const editCard = (i, f, v) => { const n = [...cards]; n[i] = { ...n[i], [f]: v }; setCards(n); };
  const removeCard = (i) => { const n = cards.slice(); n.splice(i, 1); setCards(n); setProgress((p) => ({ ...p, have: n.length })); };

  // count actual cards that will be saved (cloze + reverse expand)
  const savedCount = cards.reduce((n, c) =>
    n + (c.type === "cloze" ? Math.max(1, clozeNumbers(c.front).length) : c.type === "reverse" ? 2 : 1), 0);
  const working = status === "working";

  return (
    <div className="fade">
      <h1 className="app-h1" style={S.h1}>Generate a deck</h1>
      <p style={S.sub}>Describe what you want, pick a card style, then edit before saving.</p>
      {!WORKER_CONFIGURED && (
        <div style={{ ...S.errorBox, background: "var(--warn-bg)", borderColor: "var(--warn-border)", color: "var(--warn-text)" }}>
          AI isn’t connected yet. Open this file and set <b>WORKER_URL</b> (near the top) to your Cloudflare Worker URL. Setup steps are in the comment at the bottom of the file.
        </div>
      )}
      {WORKER_CONFIGURED && (
        <div style={{ marginTop: 8, maxWidth: 320 }}>
          <UsageBar usage={usage} />
        </div>
      )}
      <div style={{ ...S.addBox, marginTop: 18 }}>
        <textarea className="ta" rows={3} value={prompt} disabled={working}
                  placeholder="e.g. 100 cards of simple Japanese to English" onChange={(e) => setPrompt(e.target.value)} />
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
          <span style={S.hint}>Card style:</span>
          <button className={"type-chip" + (style === "qa" ? " on" : "")} disabled={working} onClick={() => setStyle("qa")}>Q&amp;A</button>
          <button className={"type-chip" + (style === "reverse" ? " on" : "")} disabled={working} onClick={() => setStyle("reverse")}>Reverse ⇄</button>
          <button className={"type-chip" + (style === "cloze" ? " on" : "")} disabled={working} onClick={() => setStyle("cloze")}>Cloze</button>
          <span style={S.hint}>{STYLE_BLURB[style]}</span>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", gap: 10, flexWrap: "wrap" }}>
          <span style={S.hint}>Mention a number to set the size.</span>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="ghost" onClick={onCancel}>Cancel</button>
            {working
              ? <button className="ghost" onClick={stop}>Stop</button>
              : <button className="primary" onClick={run} disabled={!prompt.trim()}>Generate</button>}
          </div>
        </div>
      </div>
      {status === "idle" && (
        <div><div style={S.hint}>Try one of these:</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 8 }}>
            {EXAMPLES[style].map((ex) => <button key={ex} className="example-chip" onClick={() => setPrompt(ex)}>{ex}</button>)}</div></div>
      )}
      {error && <div style={S.errorBox}>{error}</div>}
      {(working || status === "done") && progress.want > 0 && (
        <><div style={S.progress}><div style={{ ...S.progressBar, width: `${Math.min(100, (progress.have / progress.want) * 100)}%` }} /></div>
          <div style={S.remaining}>
            {working
              ? `Building ${progress.have} of ${progress.want}…`
              : (cards.length >= progress.want
                  ? `All ${progress.want} ready — review & save`
                  : `${cards.length} of ${progress.want} ready — review & save`)}
          </div></>
      )}
      {notice && status === "done" && (
        <div style={{ ...S.errorBox, background: "var(--warn-bg)", borderColor: "var(--warn-border)", color: "var(--warn-text)" }}>{notice}</div>
      )}
      {cards.length > 0 && (
        <>
          {status === "done" && (
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 14, flexWrap: "wrap" }}>
              <input style={{ ...S.titleInput, marginBottom: 0, flex: 1, minWidth: 180 }} value={name} onChange={(e) => setName(e.target.value)} />
              {cards.length < progress.want && (
                <button className="ghost" onClick={topUp} disabled={topUpBusy}>{topUpBusy ? "Generating…" : `Generate more (${progress.want - cards.length} to go)`}</button>
              )}
              <button className="primary" onClick={() => onSave(name || "AI deck", cards)}>Save deck ({savedCount})</button>
            </div>
          )}
          {cards.some((c) => c.type === "cloze") && (
            <p style={S.tinyNote}>Each numbered blank (c1, c2…) becomes its own card when saved.</p>
          )}
          {cards.some((c) => c.type === "reverse") && (
            <p style={S.tinyNote}>Reverse cards save as two cards each — front→back and back→front.</p>
          )}
          <div>{cards.map((c, i) => (
            <div key={i} style={S.cardRow}>
              {c.type === "cloze" ? (
                <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 4 }}>
                  <input className="gen-in front" value={c.front} onChange={(e) => editCard(i, "front", e.target.value)} />
                  <span style={S.hint}>{(clozeNumbers(c.front).length || 1)} card{(clozeNumbers(c.front).length || 1) === 1 ? "" : "s"} · preview: {renderCloze(c.front, clozeNumbers(c.front)[0] || 1, false)}</span>
                </div>
              ) : (
                <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 4 }}>
                  <input className="gen-in front" value={c.front} onChange={(e) => editCard(i, "front", e.target.value)} />
                  <input className="gen-in back" value={c.back} onChange={(e) => editCard(i, "back", e.target.value)} />
                  {c.type === "reverse" && <span style={S.hint}>⇄ also tested back → front</span>}
                </div>
              )}
              <button className="icon danger" onClick={() => removeCard(i)}>✕</button>
            </div>))}
          </div>
        </>
      )}
    </div>
  );
}

// Split text into chunks of at most `size` chars, breaking on paragraph then
// sentence boundaries so cards never straddle an awkward mid-sentence cut.
function chunkText(text, size = 8000) {
  const t = String(text || "").trim();
  if (t.length <= size) return t ? [t] : [];
  const paras = t.split(/\n\s*\n/);
  const chunks = [];
  let cur = "";
  const push = () => { if (cur.trim()) chunks.push(cur.trim()); cur = ""; };
  for (let para of paras) {
    if (para.length > size) {
      // very long paragraph: break on sentence ends
      const sentences = para.match(/[^.!?]+[.!?]+|\S+$/g) || [para];
      for (const sen of sentences) {
        if ((cur + sen).length > size) push();
        if (sen.length > size) { // pathological: hard-split
          for (let i = 0; i < sen.length; i += size) chunks.push(sen.slice(i, i + size));
        } else cur += sen;
      }
    } else {
      if ((cur + "\n\n" + para).length > size) push();
      cur += (cur ? "\n\n" : "") + para;
    }
  }
  push();
  return chunks;
}

// ============================================================
//  File reading helpers — PDFs (text + OCR fallback) and images (OCR).
//  Returns a string of extracted text, or throws Error with a clear msg.
// ============================================================
async function ocrImageBitmap(source, onProgress) {
  if (!window.Tesseract) throw new Error("OCR library didn't load. Check your connection and refresh.");
  const { data } = await window.Tesseract.recognize(source, "eng", {
    logger: (m) => {
      if (onProgress && m.status === "recognizing text") onProgress(Math.round((m.progress || 0) * 100));
    },
  });
  return (data && data.text) ? data.text : "";
}

async function renderPdfPageToCanvas(page, scale = 2) {
  const viewport = page.getViewport({ scale });
  const canvas = document.createElement("canvas");
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext("2d");
  await page.render({ canvasContext: ctx, viewport }).promise;
  return canvas;
}

async function extractPdfText(file, onMsg) {
  if (!window.pdfjsLib) throw new Error("PDF library didn't load. Check your connection and refresh.");
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
  let textPart = "";
  for (let p = 1; p <= pdf.numPages; p++) {
    onMsg && onMsg(`Reading PDF text… page ${p} of ${pdf.numPages}`);
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const pageText = content.items.map((it) => it.str).join(" ");
    textPart += pageText + "\n\n";
    if (textPart.length > 120000) { textPart = textPart.slice(0, 120000); break; }
  }
  textPart = textPart.trim();
  // If we got very little text, treat as scanned and OCR each page.
  if (textPart.length < 80) {
    onMsg && onMsg("PDF has no selectable text — running OCR on each page…");
    let ocrText = "";
    const maxPages = Math.min(pdf.numPages, 30); // cap for speed
    for (let p = 1; p <= maxPages; p++) {
      onMsg && onMsg(`Running OCR on page ${p} of ${maxPages}…`);
      const page = await pdf.getPage(p);
      const canvas = await renderPdfPageToCanvas(page, 2);
      try {
        const t = await ocrImageBitmap(canvas, (pct) => onMsg && onMsg(`OCR page ${p}/${maxPages} — ${pct}%`));
        ocrText += t + "\n\n";
      } catch (e) { /* skip page on OCR failure */ }
      if (ocrText.length > 120000) { ocrText = ocrText.slice(0, 120000); break; }
    }
    ocrText = ocrText.trim();
    if (!ocrText) throw new Error("Couldn't extract any readable text from this PDF, even with OCR. The pages may be blank, encrypted, or extremely low resolution.");
    return ocrText;
  }
  return textPart;
}

async function extractImageText(file, onMsg) {
  if (!file.type || !file.type.startsWith("image/")) throw new Error("This file isn't a recognised image format.");
  onMsg && onMsg("Reading image…");
  // load into a bitmap so Tesseract gets a clean source
  const dataUrl = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(String(r.result));
    r.onerror = () => rej(new Error("Couldn't read that image file."));
    r.readAsDataURL(file);
  });
  const img = await new Promise((res, rej) => {
    const im = new Image();
    im.onload = () => res(im);
    im.onerror = () => rej(new Error("That image couldn't be decoded — it may be corrupted or an unsupported format."));
    im.src = dataUrl;
  });
  onMsg && onMsg("Running OCR on image…");
  const text = await ocrImageBitmap(img, (pct) => onMsg && onMsg(`OCR — ${pct}%`));
  const clean = (text || "").trim();
  if (!clean) {
    throw new Error("OCR couldn't read any words from this image. Try a clearer/higher-resolution photo, or paste text manually.");
  }
  return clean;
}

function ImportDoc({ onSave, onCancel }) {
  const [text, setText] = useState("");
  const [name, setName] = useState("");
  const [cards, setCards] = useState([]);
  const [style, setStyle] = useState("qa");
  const [status, setStatus] = useState("idle");
  const [error, setError] = useState("");
  const [notice, setNotice] = useState("");
  const [chunkMsg, setChunkMsg] = useState("");
  const [pdfMsg, setPdfMsg] = useState("");
  const [fromPdf, setFromPdf] = useState(false);
  const [fromImage, setFromImage] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef();
  const pdfRef = useRef();
  const imgRef = useRef();
  const anyRef = useRef();

  const loadTextFile = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => { setText(String(r.result).slice(0, 120000)); if (!name) setName(f.name.replace(/\.[^.]+$/, "")); };
    r.readAsText(f); e.target.value = "";
  };

  // Unified file handler: routes by type so drag-drop works for any supported file.
  const handleFile = async (f) => {
    if (!f) return;
    setError(""); setPdfMsg("");
    const lower = (f.name || "").toLowerCase();
    const isPdf = f.type === "application/pdf" || lower.endsWith(".pdf");
    const isImage = (f.type && f.type.startsWith("image/")) || /\.(png|jpe?g|webp|gif|bmp|tiff?)$/.test(lower);
    const isText = (f.type && f.type.startsWith("text/")) || /\.(txt|md|markdown|csv)$/.test(lower);

    if (isPdf) {
      setPdfMsg("Reading PDF…");
      try {
        const extracted = await extractPdfText(f, (m) => setPdfMsg(m));
        setText(extracted);
        if (!name) setName(f.name.replace(/\.[^.]+$/, ""));
        setFromPdf(true); setFromImage(false);
        setPdfMsg(`Loaded ${extracted.length} characters. Now click "Make cards".`);
      } catch (err) { setError(err.message || "Couldn't read that PDF."); setPdfMsg(""); }
      return;
    }
    if (isImage) {
      setPdfMsg("Reading image…");
      try {
        const extracted = await extractImageText(f, (m) => setPdfMsg(m));
        setText(extracted);
        if (!name) setName(f.name.replace(/\.[^.]+$/, ""));
        setFromImage(true); setFromPdf(false);
        setPdfMsg(`OCR done — extracted ${extracted.length} characters. Now click "Make cards".`);
      } catch (err) { setError(err.message || "Couldn't read that image."); setPdfMsg(""); }
      return;
    }
    if (isText) {
      const r = new FileReader();
      r.onload = () => {
        setText(String(r.result).slice(0, 120000));
        if (!name) setName(f.name.replace(/\.[^.]+$/, ""));
        setPdfMsg(`Loaded text file (${String(r.result).length} chars).`);
      };
      r.onerror = () => setError("Couldn't read that text file.");
      r.readAsText(f);
      return;
    }
    setError(`Unsupported file type: ${f.type || "unknown"}. Supported: PDF, image (PNG/JPG/etc), or plain text.`);
  };

  const loadPdf = (e) => { const f = e.target.files[0]; e.target.value = ""; handleFile(f); };
  const loadImage = (e) => { const f = e.target.files[0]; e.target.value = ""; handleFile(f); };

  // Drag-and-drop
  const onDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) handleFile(f);
  };

  const run = async () => {
    if (!text.trim()) return;
    setStatus("working"); setError(""); setNotice(""); setCards([]); setChunkMsg("");

    // Split into ~8k-char chunks on paragraph/sentence boundaries so nothing
    // past the old 12k cap gets silently dropped, and each AI call stays well
    // under the output-token limit.
    const chunks = chunkText(text, 8000);
    const collected = [];
    const seen = new Set();
    let failures = 0;

    try {
      for (let i = 0; i < chunks.length; i++) {
        if (chunks.length > 1) setChunkMsg(`Processing section ${i + 1} of ${chunks.length}…`);
        const material = chunks[i];
        let out;
        try {
          if (style === "cloze") {
            out = await callAI(
              `You turn study material into CLOZE-DELETION flashcards.\n` +
              `For each key fact, write one short factual sentence and hide the testable part(s) using numbered cloze syntax:\n` +
              `  {{c1::hidden answer}}   and a second blank in the SAME sentence as {{c2::...}}\n` +
              `Rules:\n- Hide the single most important term per blank (a name, number, date, or key word)\n` +
              `- Keep sentences short; the un-hidden words must give enough context to recall the answer\n` +
              `- Prefer one blank per sentence; use c1/c2 only when two facts naturally belong together\n` +
              `- Cover all key facts in the material; one sentence per fact\n` +
              `Respond ONLY as a JSON array, no markdown, no explanation:\n[{"text":"The capital of France is {{c1::Paris}}."}]\n\nMATERIAL:\n${material}`,
              { maxTokens: MAX_OUTPUT_TOKENS, retries: 2 }
            );
          } else {
            out = await callAI(
              `You are a flashcard generator. Turn the study material below into atomic flashcards.\n` +
              `Rules:\n- ONE fact per card\n- Front = a question or prompt\n- Back = the answer, definition, or translation\n` +
              `- Keep both sides short and clear\n- Break long ideas into multiple small cards\n- Cover all key facts in the material\n` +
              `Respond ONLY as a JSON array, no markdown, no explanation:\n[{"front":"...","back":"..."}]\n\nMATERIAL:\n${material}`,
              { maxTokens: MAX_OUTPUT_TOKENS, retries: 2 }
            );
          }
        } catch (e) { if (e && e.code === "DAILY_LIMIT") throw e; failures++; continue; }

        const parsed = style === "cloze" ? parseClozeCards(out) : parseCards(out);
        for (const c of parsed) {
          const key = (c.front || "").toLowerCase().trim();
          if (!key || seen.has(key)) continue;
          seen.add(key); collected.push(c);
        }
        setCards(collected.slice());
      }
    } catch (e) {
      setChunkMsg("");
      if (e && e.code === "DAILY_LIMIT") {
        if (collected.length) { setNotice(`Reached today's AI limit — kept the ${collected.length} cards made so far. The limit resets tomorrow.`); if (!name) setName("Imported notes"); setStatus("done"); return; }
        setStatus("error"); setError("You've reached today's AI limit. It resets tomorrow."); return;
      }
      setStatus("error"); setError("Couldn't reach the AI: " + (e.message || "unknown error")); return;
    }

    setChunkMsg("");
    if (!collected.length) {
      setStatus("error");
      setError(style === "cloze"
        ? "Couldn't extract cloze cards. Try Q&A style, or shorter/clearer text."
        : "Couldn't extract cards from this text — it may be too short, too dense, or in a format the AI can't parse. Try a cleaner section.");
      return;
    }
    if (failures && chunks.length > 1) setNotice(`${failures} of ${chunks.length} sections couldn't be processed and were skipped. You still got ${collected.length} cards.`);
    if (!name) setName("Imported notes");
    setStatus("done");
  };
  const editCard = (i, f, v) => { const n = [...cards]; n[i] = { ...n[i], [f]: v }; setCards(n); };
  const removeCard = (i) => { const n = cards.slice(); n.splice(i, 1); setCards(n); };

  return (
    <div className="fade">
      <h1 className="app-h1" style={S.h1}>From notes, PDF, or image</h1>
      <p style={S.sub}>Drag a file in, browse, or paste notes. The AI breaks it into atomic cards.</p>
      {!WORKER_CONFIGURED && (
        <div style={{ ...S.errorBox, background: "var(--warn-bg)", borderColor: "var(--warn-border)", color: "var(--warn-text)" }}>
          AI isn’t connected yet. Set <b>WORKER_URL</b> near the top of this file to your Cloudflare Worker URL. (Reading PDFs/images still works; making cards needs the AI.)
        </div>
      )}

      <div className={"dropzone" + (dragOver ? " over" : "")} style={S.dropzone}
           onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
           onDragLeave={() => setDragOver(false)}
           onDrop={onDrop}
           onClick={() => anyRef.current.click()}>
        <div style={S.dropzoneIcon}>📥</div>
        <div style={S.dropzoneTitle}>{dragOver ? "Drop to read…" : "Drop a PDF, image, or text file here"}</div>
        <div style={S.hint}>or click to browse · PDF, image (OCR), .txt / .md</div>
        <input ref={anyRef} type="file" accept=".pdf,application/pdf,image/*,.txt,.md,.markdown,.csv" hidden
               onChange={(e) => { const f = e.target.files[0]; e.target.value = ""; handleFile(f); }} />
      </div>

      <div style={{ ...S.addBox, marginTop: 18 }}>
        <textarea className="ta" rows={7} value={text} disabled={status === "working"}
                  placeholder="Paste lecture notes, definitions, a study guide… or drop a file above." onChange={(e) => setText(e.target.value)} />
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
          <span style={S.hint}>Card style:</span>
          <button className={"type-chip" + (style === "qa" ? " on" : "")} onClick={() => setStyle("qa")}>Q&amp;A</button>
          <button className={"type-chip" + (style === "cloze" ? " on" : "")} onClick={() => setStyle("cloze")}>Cloze</button>
          <span style={S.hint}>{style === "cloze" ? "Fill-in-the-blank sentences (great for context-heavy facts)." : "Front/back question & answer."}</span>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", gap: 10, flexWrap: "wrap" }}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button className="ghost" onClick={() => pdfRef.current.click()}>Load PDF</button>
            <input ref={pdfRef} type="file" accept=".pdf,application/pdf" hidden onChange={loadPdf} />
            <button className="ghost" onClick={() => imgRef.current.click()}>Load image (OCR)</button>
            <input ref={imgRef} type="file" accept="image/*" hidden onChange={loadImage} />
            <button className="ghost" onClick={() => fileRef.current.click()}>Load .txt/.md</button>
            <input ref={fileRef} type="file" accept=".txt,.md,.markdown,.csv" hidden onChange={loadTextFile} />
            <span style={S.hint}>{text.length} chars</span>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="ghost" onClick={onCancel}>Cancel</button>
            <button className="primary" onClick={run} disabled={!text.trim() || status === "working"}>{status === "working" ? "Reading…" : "Make cards"}</button>
          </div>
        </div>
      </div>
      {pdfMsg && <p style={S.tinyNote}>{pdfMsg}</p>}
      <p style={S.tinyNote}>PDFs with selectable text work instantly; scanned PDFs fall back to OCR (slower). Images use OCR — best on clear, high-contrast scans. Long documents are processed in sections; files are trimmed to ~120,000 characters.</p>
      {status === "working" && chunkMsg && (
        <div style={S.remaining}>{chunkMsg}{cards.length ? ` · ${cards.length} cards so far` : ""}</div>
      )}
      {error && <div style={S.errorBox}>{error}</div>}
      {notice && status === "done" && (
        <div style={{ ...S.errorBox, background: "var(--warn-bg)", borderColor: "var(--warn-border)", color: "var(--warn-text)" }}>{notice}</div>
      )}
      {cards.length > 0 && (
        <>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 14, flexWrap: "wrap" }}>
            <input style={{ ...S.titleInput, marginBottom: 0, flex: 1, minWidth: 180 }} value={name} onChange={(e) => setName(e.target.value)} />
            <button className="primary" onClick={() => onSave(name || "Imported notes", cards, fromPdf, fromImage)}>
              Save deck ({cards.reduce((n, c) => n + (c.type === "cloze" ? Math.max(1, clozeNumbers(c.front).length) : 1), 0)})
            </button>
          </div>
          {cards.some((c) => c.type === "cloze") && (
            <p style={S.tinyNote}>Each numbered blank (c1, c2…) becomes its own card when saved.</p>
          )}
          <div>{cards.map((c, i) => (
            <div key={i} style={S.cardRow}>
              {c.type === "cloze" ? (
                <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 4 }}>
                  <input className="gen-in front" value={c.front} onChange={(e) => editCard(i, "front", e.target.value)} />
                  <span style={S.hint}>{clozeNumbers(c.front).length || 1} card{(clozeNumbers(c.front).length || 1) === 1 ? "" : "s"} · preview: {renderCloze(c.front, clozeNumbers(c.front)[0] || 1, false)}</span>
                </div>
              ) : (
                <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 4 }}>
                  <input className="gen-in front" value={c.front} onChange={(e) => editCard(i, "front", e.target.value)} />
                  <input className="gen-in back" value={c.back} onChange={(e) => editCard(i, "back", e.target.value)} />
                </div>
              )}
              <button className="icon danger" onClick={() => removeCard(i)}>✕</button>
            </div>))}
          </div>
        </>
      )}
    </div>
  );
}

   2. ExamSim       — adaptive AI mock exams (SAT/AP/MCAT/finals)
   3. Worlds        — multiplayer "brain linking": knowledge worlds, deck trading
